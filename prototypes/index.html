<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Equinox — Dependency Graph</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #ccc; font-family: 'SF Mono', 'Fira Code', monospace; overflow: hidden; }

#toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  background: #111118; border-bottom: 1px solid #2a2a35;
  padding: 8px 16px; display: flex; align-items: center; gap: 16px;
  font-size: 12px;
}
#toolbar select, #toolbar input { background: #1a1a25; color: #ccc; border: 1px solid #333; border-radius: 4px; padding: 4px 8px; font-family: inherit; font-size: 12px; }
#toolbar label { color: #888; cursor: pointer; user-select: none; }
#toolbar .sep { width: 1px; height: 20px; background: #333; }
#status { color: #555; margin-left: auto; }
#status.live { color: #4a4; }

#info-panel {
  position: fixed; top: 44px; right: 0; width: 320px; bottom: 0; z-index: 5;
  background: #111118ee; border-left: 1px solid #2a2a35;
  padding: 16px; overflow-y: auto; font-size: 12px;
  transform: translateX(100%); transition: transform 0.2s;
}
#info-panel.open { transform: translateX(0); }
#info-panel h3 { color: #e8e8f0; margin-bottom: 8px; font-size: 14px; }
#info-panel .section { margin-bottom: 12px; }
#info-panel .section-title { color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
#info-panel .tag { display: inline-block; background: #222; border-radius: 3px; padding: 2px 6px; margin: 2px; font-size: 11px; }
#info-panel .tag.read { border-left: 2px solid #6af; }
#info-panel .tag.write { border-left: 2px solid #f66; }
#info-panel .tag.call { border-left: 2px solid #af6; }
#info-panel .tag.called-by { border-left: 2px solid #f6a; }
#info-panel .tag.rw { border-left: 2px solid #fa6; }

#legend {
  position: fixed; bottom: 16px; left: 16px; z-index: 5;
  background: #111118dd; border: 1px solid #2a2a35; border-radius: 6px;
  padding: 12px; font-size: 11px;
}
#legend .item { display: flex; align-items: center; gap: 8px; margin: 4px 0; cursor: pointer; }
#legend .item:hover { color: #fff; }
#legend .dot { width: 10px; height: 10px; border-radius: 50%; }

#styles {
  position: fixed; bottom: 16px; right: 16px; z-index: 5;
  background: #111118dd; border: 1px solid #2a2a35; border-radius: 6px;
  padding: 10px 14px; font-size: 11px; display: flex; flex-direction: column; gap: 6px;
}
#styles label { color: #888; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }

#focus-panel {
  position: fixed; top: 50px; left: 50%; transform: translateX(-50%); z-index: 15;
  background: #111118ee; border: 1px solid #3a3a50; border-radius: 8px;
  padding: 10px 18px; font-size: 12px; max-width: 600px;
  opacity: 0; transition: opacity 0.4s; pointer-events: none;
}
#focus-panel.active { opacity: 1; pointer-events: auto; }
#focus-panel .focus-desc { color: #aab; margin-bottom: 6px; }
#focus-panel .focus-step { color: #7af; font-weight: 600; }
#focus-panel .focus-targets { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
#focus-panel .focus-tag {
  display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px;
  background: #1a1a2a; border: 1px solid #333;
}
#focus-panel .focus-tag.high { border-color: #7af; color: #7af; }
#focus-panel .focus-tag.med { border-color: #5a8; color: #5a8; }
#focus-panel .focus-tag.low { border-color: #555; color: #888; }

#arr-nav {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 5;
  background: #111118dd; border: 1px solid #2a2a35; border-radius: 6px;
  padding: 6px 14px; font-size: 11px; display: flex; align-items: center; gap: 10px;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
#arr-nav.visible { opacity: 1; pointer-events: auto; }
#arr-nav button {
  background: #1a1a25; color: #888; border: 1px solid #333; border-radius: 4px;
  padding: 3px 10px; font-family: inherit; font-size: 11px; cursor: pointer;
}
#arr-nav button:hover { color: #ccc; border-color: #555; }
#arr-nav button:disabled { opacity: 0.3; cursor: default; }
#arr-nav .arr-label { color: #666; }

#lock-btn {
  background: #1a1a25; color: #888; border: 1px solid #333; border-radius: 4px;
  padding: 2px 8px; font-family: inherit; font-size: 11px; cursor: pointer;
}
#lock-btn:hover { color: #ccc; border-color: #555; }
#lock-btn.active { color: #ff0; border-color: #ff0; }

#comparison-badge {
  position: fixed; top: 50px; right: 16px; z-index: 15;
  background: #2a1a3a; border: 1px solid #7a4af0; border-radius: 6px;
  padding: 6px 14px; font-size: 11px; color: #b088f0;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
#comparison-badge.visible { opacity: 1; pointer-events: auto; }

svg { position: fixed; top: 44px; left: 0; right: 0; bottom: 0; }
.link { transition: none; }
.meta-link { transition: none; }
.node circle { cursor: pointer; stroke-width: 1.5; }
.node text { fill: #999; font-size: 10px; pointer-events: none; user-select: none; }
.label { pointer-events: none; user-select: none; }
.node.highlighted circle { stroke-width: 3; }
.hull { fill-opacity: 0.04; stroke-opacity: 0.15; stroke-width: 1.5; }
.cluster-label { font-weight: 600; fill-opacity: 0.6; text-anchor: middle; dominant-baseline: central; cursor: grab; }
.cluster-label:active { cursor: grabbing; }
.hull-label { font-weight: 600; letter-spacing: 2px; cursor: grab; }
.hull-label:active { cursor: grabbing; }
.node circle.focus-glow { filter: drop-shadow(0 0 6px currentColor); }
.node circle.attractor-glow { filter: drop-shadow(0 0 8px #fff) drop-shadow(0 0 20px currentColor); stroke-width: 3; }
.node circle.selected-glow { filter: drop-shadow(0 0 6px #ff0) drop-shadow(0 0 12px #ff0); stroke: #ff0 !important; stroke-width: 2.5; }
</style>

<script src="https://cdn.jsdelivr.net/npm/acorn@8.14.1/dist/acorn.js"></script>
<script src="https://cdn.jsdelivr.net/npm/acorn-walk@8.3.4/dist/walk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
let SRC = '/target/src';
let CODEMAP_SRC = '';
const REFRESH_MS = 3000;
const CLUSTER_GAP = 40;
const LAYOUT_ITERS = 180;
const CLUSTER_PACK_ITERS = 120;
const ARRANGEMENT_CAP = 50;
const SPATIAL_DECAY_MS = 7 * 24 * 3600 * 1000; // 1 week half-life

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let lastHash = null;
let codemapSections = null;
let codemapImportance = new Map();
let analysisResult = null;
let savedPositions = new Map();
let stickyNodes = new Set();
let lockedNodes = new Set(); // explicitly locked nodes (pinned in place)
let selectedNode = null;
let currentK = 0.8;
let currentGraph = null;
let currentClusterNames = new Map();
let currentNodes = null;
let initialLayoutPositions = new Map(); // immutable T0 positions from layout
let currentLinks = null;
let currentHullClusterIds = null;

// Attractor
let attractorNode = null;
let attractorStartTime = 0;
let attractorRAF = null;
let attractorHoldStrength = 0;
let lastAttractorDuration = 0;
let forcePressDragNode = null; // node being dragged when force press activates
let hasForceTouch = false; // webkit force events detected (Safari)
let hasPressure = false; // pointer events pressure detected (Chrome)
let pressureActive = false; // currently above pressure threshold
const PRESSURE_THRESHOLD = 0.75; // above default 0.5 that mice report
let shiftAttractorTimer = null; // fallback shift-hold delay for non-Force Touch/pressure

// Animation
let animationRAF = null;

// Multi-select
let selectedNodes = new Set();

// Click-pull animation
let clickPullRAF = null;

// X-key spread forces
let xKeyHeld = false;
let xKeyDown = false; // tracks physical X key state
let spaceKeyDown = false; // tracks physical Space key state
let xKeyRAF = null;
let xDismissRAFs = new Map(); // per-node dismiss animations

// Z-key time travel (backwards through arrangement history)
let zKeyHeld = false;
let zKeyDown = false;
let zKeyRAF = null;
let zTravelStartIndex = -1; // arrangement index when Z was pressed

// Group move (shift+drag) — disables all gather while active
let groupMoveActive = false;

// Space-pull (pull selected nodes together)
let spacePullRAF = null;
let spacePullHeld = false;

// Neighbor-gather (pull neighbors toward a clicked node)
let neighborGatherRAF = null;
let neighborGatherHeld = false;

// Cluster-gather (pull connected clusters toward a clicked cluster label)
let clusterGatherRAF = null;
let clusterGatherHeld = false;
let clusterGatherAnchorCid = null;

// User-defined clusters (parsed from codemap <!-- user-cluster --> sections)
let userClusterSections = []; // [{name, nodeIds: [...]}] — derived from codemap

// Cluster label placement caches
let clusterMemberCache = new Map(); // cid -> Node[]
let clusterLabelPlacement = new Map(); // cid -> { dx, dy, angle } — nudged each tick
let labelPlacementTimer = null;

async function createUserCluster(nodeIds) {
  const existingClusters = currentClusterNames ? [...currentClusterNames.values()] : [];

  const nodeDetails = {};
  for (const id of nodeIds) {
    const node = currentGraph?.nodeMap?.get(id);
    if (node && node.info) {
      nodeDetails[id] = {
        system: node.clusterName || 'unknown',
        reads: [...(node.info.reads || [])].join(', ') || 'none',
        writes: [...(node.info.writes || [])].join(', ') || 'none',
        calls: [...(node.info.calls || [])].join(', ') || 'none',
      };
    }
  }

  // Ask server — it writes placeholder to codemap immediately, names via Claude in background
  try {
    const resp = await fetch('/cluster', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nodeIds, existingClusters, nodeDetails }),
    });
    const data = await resp.json();
    if (data.name) {
      console.log(`[cluster] placeholder created: ${data.name}`);
      // Force reload to show the new section immediately
      lastHash = null;
      await loadAndAnalyze(true);
    }
  } catch (e) {
    console.warn('[user-cluster] creation failed:', e);
  }
}

async function deleteUserCluster(sectionName) {
  try {
    const resp = await fetch('/cluster', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sectionName }),
    });
    const data = await resp.json();
    if (data.deleted) {
      console.log(`[cluster] deleted: ${sectionName}`);
      lastHash = null;
      loadAndAnalyze(true);
    }
  } catch (e) {
    console.warn('[user-cluster] deletion failed:', e);
  }
}

// SVG layers
let svg, gLinks, gMetaLinks, gNodes, gHulls, gLabels, gClusterLabels, svgDefs;
let width, height;

// ═══════════════════════════════════════════════════════
// SPATIAL MEMORY
// ═══════════════════════════════════════════════════════
let SPATIAL_KEY = 'depgraph-spatial';

let spatialMemory = {
  arrangements: [],
  spatialEdges: {},
  clickLog: [],
};
let arrangementIndex = -1;
let comparisonMode = false;
let comparisonA = null, comparisonB = null;
let navTimestamps = []; // for oscillation detection

function loadSpatialMemory() {
  try {
    const raw = localStorage.getItem(SPATIAL_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      spatialMemory = data;
      // Decay old spatial edges
      const now = Date.now();
      for (const key in spatialMemory.spatialEdges) {
        const edge = spatialMemory.spatialEdges[key];
        const age = now - new Date(edge.lastSeen).getTime();
        const decay = Math.pow(0.5, age / SPATIAL_DECAY_MS);
        edge.weight *= decay;
        if (edge.weight < 0.05) delete spatialMemory.spatialEdges[key];
      }
      // Trim click log
      if (spatialMemory.clickLog.length > 500) {
        spatialMemory.clickLog = spatialMemory.clickLog.slice(-500);
      }
      // Trim arrangements
      if (spatialMemory.arrangements.length > ARRANGEMENT_CAP) {
        spatialMemory.arrangements = spatialMemory.arrangements.slice(-ARRANGEMENT_CAP);
      }
      arrangementIndex = spatialMemory.arrangements.length - 1;
    }
  } catch (e) {
    console.warn('[spatial] Failed to load:', e);
  }
}

function saveSpatialMemory() {
  try {
    localStorage.setItem(SPATIAL_KEY, JSON.stringify(spatialMemory));
  } catch (e) {
    console.warn('[spatial] Failed to save:', e);
  }
}

function pushArrangement(trigger, focalNodes) {
  if (!currentNodes) return;
  const positions = {};
  for (const n of currentNodes) {
    if (n.x != null && n.y != null) positions[n.id] = [Math.round(n.x), Math.round(n.y)];
  }
  const focal = focalNodes || (selectedNode ? [selectedNode.id] : []);
  const label = generateArrangementLabel(focal, trigger);
  const arr = {
    id: Math.random().toString(36).slice(2, 8),
    timestamp: new Date().toISOString(),
    positions,
    focal,
    label,
    trigger,
  };
  // If we navigated back and then make a new arrangement, truncate forward history
  if (arrangementIndex < spatialMemory.arrangements.length - 1) {
    spatialMemory.arrangements = spatialMemory.arrangements.slice(0, arrangementIndex + 1);
  }
  spatialMemory.arrangements.push(arr);
  if (spatialMemory.arrangements.length > ARRANGEMENT_CAP) {
    spatialMemory.arrangements.shift();
  }
  arrangementIndex = spatialMemory.arrangements.length - 1;
  updateArrNav();
  saveSpatialMemory();
}

function generateArrangementLabel(focal, trigger) {
  if (focal.length > 0) {
    const names = focal.slice(0, 3).join(', ');
    return `${trigger}: ${names}`;
  }
  return trigger || 'layout';
}

function navigateArrangement(delta) {
  const newIdx = arrangementIndex + delta;
  if (newIdx < 0 || newIdx >= spatialMemory.arrangements.length) return;

  // Oscillation detection for comparison mode
  const now = Date.now();
  navTimestamps.push({ time: now, idx: newIdx });
  if (navTimestamps.length > 4) navTimestamps.shift();

  if (!comparisonMode && navTimestamps.length >= 3) {
    const recent = navTimestamps.slice(-3);
    const span = recent[2].time - recent[0].time;
    if (span < 3000 && recent[0].idx === recent[2].idx && recent[0].idx !== recent[1].idx) {
      enterComparisonMode(recent[0].idx, recent[1].idx);
      return;
    }
  }

  if (comparisonMode) {
    exitComparisonMode();
  }

  arrangementIndex = newIdx;
  const arr = spatialMemory.arrangements[arrangementIndex];
  const targetPositions = new Map();
  for (const [id, pos] of Object.entries(arr.positions)) {
    targetPositions.set(id, { x: pos[0], y: pos[1] });
  }
  animateToPositions(targetPositions, 300);
  updateArrNav();
}

function enterComparisonMode(idxA, idxB) {
  comparisonMode = true;
  comparisonA = spatialMemory.arrangements[idxA];
  comparisonB = spatialMemory.arrangements[idxB];
  document.getElementById('comparison-badge').classList.add('visible');

  const merged = computeComparisonPositions(comparisonA, comparisonB);
  animateToPositions(merged, 400);
}

function exitComparisonMode() {
  comparisonMode = false;
  comparisonA = null;
  comparisonB = null;
  document.getElementById('comparison-badge').classList.remove('visible');
}

function computeComparisonPositions(arrA, arrB) {
  const result = new Map();
  const allIds = new Set([...Object.keys(arrA.positions), ...Object.keys(arrB.positions)]);
  for (const id of allIds) {
    const a = arrA.positions[id];
    const b = arrB.positions[id];
    if (a && b) {
      const mx = (a[0] + b[0]) / 2;
      const my = (a[1] + b[1]) / 2;
      const dx = b[0] - a[0], dy = b[1] - a[1];
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 5) {
        result.set(id, { x: mx, y: my });
      } else {
        result.set(id, { x: mx + dx * 0.75, y: my + dy * 0.75 });
      }
    } else if (a) {
      result.set(id, { x: a[0], y: a[1] });
    } else if (b) {
      result.set(id, { x: b[0], y: b[1] });
    }
  }
  return result;
}

function trackClickCoOccurrence(nodeId) {
  const now = Date.now();
  spatialMemory.clickLog.push({ node: nodeId, t: now });

  // Check co-occurrence: previous click within 30s
  const log = spatialMemory.clickLog;
  if (log.length >= 2) {
    const prev = log[log.length - 2];
    if (now - prev.t < 30000 && prev.node !== nodeId) {
      const key = [prev.node, nodeId].sort().join('\0');
      const edge = spatialMemory.spatialEdges[key] || { weight: 0, lastSeen: '' };
      edge.weight = Math.min(1.0, edge.weight + 0.1);
      edge.lastSeen = new Date().toISOString();
      spatialMemory.spatialEdges[key] = edge;
    }
  }
  saveSpatialMemory();
}

function trackDragProximity(draggedId) {
  if (!currentNodes) return;
  const dragged = currentNodes.find(n => n.id === draggedId);
  if (!dragged) return;
  for (const n of currentNodes) {
    if (n.id === draggedId) continue;
    const dx = n.x - dragged.x, dy = n.y - dragged.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 60) {
      const key = [draggedId, n.id].sort().join('\0');
      const edge = spatialMemory.spatialEdges[key] || { weight: 0, lastSeen: '' };
      edge.weight = Math.min(1.0, edge.weight + 0.15);
      edge.lastSeen = new Date().toISOString();
      spatialMemory.spatialEdges[key] = edge;
    }
  }
  saveSpatialMemory();
}

function updateArrNav() {
  const nav = document.getElementById('arr-nav');
  const total = spatialMemory.arrangements.length;
  if (total <= 1) { nav.classList.remove('visible'); return; }
  nav.classList.add('visible');
  document.getElementById('arr-first').disabled = arrangementIndex <= 0;
  document.getElementById('arr-back').disabled = arrangementIndex <= 0;
  document.getElementById('arr-fwd').disabled = arrangementIndex >= total - 1;
  document.getElementById('arr-last').disabled = arrangementIndex >= total - 1;
  document.getElementById('arr-label').textContent = `${arrangementIndex + 1} / ${total}`;
}

function navigateToArrangement(targetIdx) {
  if (targetIdx < 0 || targetIdx >= spatialMemory.arrangements.length) return;
  if (targetIdx === arrangementIndex) return;
  if (comparisonMode) exitComparisonMode();
  arrangementIndex = targetIdx;
  const arr = spatialMemory.arrangements[arrangementIndex];
  const targetPositions = new Map();
  for (const [id, pos] of Object.entries(arr.positions)) {
    targetPositions.set(id, { x: pos[0], y: pos[1] });
  }
  animateToPositions(targetPositions, 300);
  updateArrNav();
}

// ═══════════════════════════════════════════════════════
// UTILITY
// ═══════════════════════════════════════════════════════
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return h;
}

// ═══════════════════════════════════════════════════════
// CODEMAP PARSING
// ═══════════════════════════════════════════════════════
function parseCodemap(md) {
  const sections = new Map();
  codemapImportance = new Map();
  userClusterSections = [];
  let currentSection = null;
  let isUserCluster = false;
  const lines = md.split('\n');
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const secMatch = line.match(/^## (.+)/);
    if (secMatch) {
      currentSection = secMatch[1].trim();
      if (currentSection === 'Controls' || currentSection === 'Constants') { currentSection = null; continue; }
      // Check if next line marks this as a user cluster
      isUserCluster = (lines[i + 1] || '').trim() === '<!-- user-cluster -->';
      if (isUserCluster) {
        userClusterSections.push({ name: currentSection, nodeIds: [] });
        i++; // skip the marker line
      } else {
        if (!sections.has(currentSection)) sections.set(currentSection, []);
      }
      continue;
    }
    if (!currentSection) continue;
    const funcMatch = line.match(/^- `(\w+)`/);
    if (funcMatch) {
      const name = funcMatch[1];
      if (isUserCluster) {
        userClusterSections[userClusterSections.length - 1].nodeIds.push(name);
      } else if (sections.has(currentSection)) {
        sections.get(currentSection).push(name);
      }
      const impMatch = line.match(/importance:(\d+)/);
      if (impMatch) codemapImportance.set(name, parseInt(impMatch[1]));
    }
  }
  return sections;
}

// ═══════════════════════════════════════════════════════
// AST ANALYSIS
// ═══════════════════════════════════════════════════════
function extractJS(html) {
  const match = html.match(/<script(?:\s+type="module")?>([\s\S]*)<\/script>/);
  if (!match) return { code: '', lineOffset: 0 };
  const tagStart = html.indexOf(match[0]);
  const lineOffset = html.substring(0, tagStart).split('\n').length;
  const code = match[1]
    .replace(/^\s*import\s+.*$/gm, '/* import */')
    .replace(/^\s*export\s+.*$/gm, '/* export */');
  return { code, lineOffset };
}

function analyzeCode(code, lineOffset) {
  let ast;
  try {
    ast = acorn.parse(code, {
      ecmaVersion: 2022,
      sourceType: 'script',
      locations: true,
      allowImportExportEverywhere: true,
    });
  } catch (e) {
    console.error('Parse error:', e.message);
    return null;
  }

  const globals = new Map();
  const functions = new Map();

  // Pass 1: collect top-level declarations
  for (const node of ast.body) {
    if (node.type === 'VariableDeclaration') {
      for (const decl of node.declarations) {
        collectDeclNames(decl.id).forEach(name => {
          globals.set(name, { kind: node.kind, line: node.loc.start.line + lineOffset });
        });
      }
    }
    if (node.type === 'FunctionDeclaration' && node.id) {
      globals.set(node.id.name, { kind: 'function', line: node.loc.start.line + lineOffset });
    }
  }

  // Pass 2: analyze each function
  for (const node of ast.body) {
    if (node.type === 'FunctionDeclaration' && node.id) {
      const info = analyzeFunction(node, globals);
      info.line = node.loc.start.line + lineOffset;
      info.endLine = node.loc.end.line + lineOffset;
      info.lines = info.endLine - info.line + 1;
      functions.set(node.id.name, info);
    }
  }

  return { globals, functions };
}

function collectDeclNames(pattern) {
  const names = [];
  if (pattern.type === 'Identifier') names.push(pattern.name);
  else if (pattern.type === 'ObjectPattern') {
    pattern.properties.forEach(p => names.push(...collectDeclNames(p.value || p.key)));
  } else if (pattern.type === 'ArrayPattern') {
    pattern.elements.forEach(e => e && names.push(...collectDeclNames(e)));
  }
  return names;
}

function analyzeFunction(funcNode, globals) {
  const params = new Set();
  funcNode.params.forEach(p => collectDeclNames(p).forEach(n => params.add(n)));
  const locals = new Set(params);
  const reads = new Set();
  const writes = new Set();
  const calls = new Set();

  acorn.walk.simple(funcNode.body, {
    VariableDeclaration(node) {
      for (const decl of node.declarations) {
        collectDeclNames(decl.id).forEach(n => locals.add(n));
      }
    },
    FunctionDeclaration(node) { if (node.id) locals.add(node.id.name); },
  });

  acorn.walk.ancestor(funcNode.body, {
    Identifier(node, ancestors) {
      const name = node.name;
      if (locals.has(name) || !globals.has(name)) return;
      const parent = ancestors[ancestors.length - 2];
      // Property key (non-computed): { foo: val } — skip the key (but not shorthand { foo })
      if (parent && parent.type === 'Property' && parent.key === node && !parent.computed && !parent.shorthand) return;
      // Member property (non-computed): obj.foo — foo is not a global reference
      if (parent && parent.type === 'MemberExpression' && parent.property === node && !parent.computed) return;
      // Label identifiers
      if (parent && (parent.type === 'LabeledStatement' || parent.type === 'BreakStatement' || parent.type === 'ContinueStatement')) return;
      if (parent && parent.type === 'AssignmentExpression' && parent.left === node) {
        writes.add(name);
      } else if (parent && parent.type === 'UpdateExpression') {
        writes.add(name);
      } else {
        reads.add(name);
      }
    },
    CallExpression(node) {
      if (node.callee.type === 'Identifier' && globals.has(node.callee.name)) {
        calls.add(node.callee.name);
      } else if (node.callee.type === 'MemberExpression' && node.callee.object.type === 'Identifier') {
        const name = node.callee.object.name;
        if (!locals.has(name) && globals.has(name)) reads.add(name);
      }
    },
    MemberExpression(node, ancestors) {
      if (node.object.type === 'Identifier') {
        const name = node.object.name;
        if (locals.has(name) || !globals.has(name)) return;
        const parent = ancestors[ancestors.length - 2];
        if (parent && parent.type === 'AssignmentExpression' && parent.left === node) {
          writes.add(name);
        } else {
          reads.add(name);
        }
      }
    },
  });

  const rw = new Set();
  for (const n of reads) { if (writes.has(n)) rw.add(n); }
  for (const n of rw) { reads.delete(n); writes.delete(n); }

  return { params, locals, reads, writes, rw, calls, line: 0, endLine: 0, lines: 0 };
}

const AFFINITY_STOPWORDS = new Set([
  'get', 'set', 'update', 'draw', 'create', 'is', 'has', 'find',
  'init', 'spawn', 'apply', 'handle', 'resolve', 'remove', 'rebuild',
  'pick', 'move', 'check', 'clear', 'start', 'stop', 'push', 'pop',
  'nearest', 'current', 'effective', 'smooth', 'exact', 'idx', 'key',
]);

function tokenizeName(name) {
  return name
    .replace(/([a-z])([A-Z])/g, '$1_$2')
    .split(/[_\d]+/)
    .map(t => t.toLowerCase())
    .filter(t => t.length > 1 && !AFFINITY_STOPWORDS.has(t));
}

function clusterFunctions(analysis) {
  const { functions } = analysis;
  const result = new Map();

  if (codemapSections && codemapSections.size > 0) {
    let clusterId = 0;
    for (const [, funcs] of codemapSections) {
      for (const fname of funcs) {
        if (functions.has(fname)) result.set(fname, clusterId);
      }
      clusterId++;
    }
    for (const fname of functions.keys()) {
      if (!result.has(fname)) result.set(fname, clusterId);
    }
    return result;
  }

  // Fallback: shared-state affinity clustering
  const names = [...functions.keys()];
  const n = names.length;
  if (n === 0) return result;
  function stateSet(info) {
    const s = new Set();
    info.reads.forEach(v => s.add(v));
    info.writes.forEach(v => s.add(v));
    info.rw.forEach(v => s.add(v));
    return s;
  }
  const states = names.map(name => stateSet(functions.get(name)));
  const cluster = new Array(n);
  for (let i = 0; i < n; i++) cluster[i] = i;
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      let shared = 0;
      for (const v of states[i]) { if (states[j].has(v)) shared++; }
      const fi = functions.get(names[i]), fj = functions.get(names[j]);
      if (fi.calls.has(names[j])) shared += 2;
      if (fj.calls.has(names[i])) shared += 2;
      if (shared >= 3) {
        const ci = cluster[i], cj = cluster[j];
        if (ci !== cj) { for (let k = 0; k < n; k++) { if (cluster[k] === cj) cluster[k] = ci; } }
      }
    }
  }
  const clusterMap = new Map();
  let nextId = 0;
  for (let i = 0; i < n; i++) {
    if (!clusterMap.has(cluster[i])) clusterMap.set(cluster[i], nextId++);
    result.set(names[i], clusterMap.get(cluster[i]));
  }
  return result;
}

function nameClusters(analysis, clusters) {
  const clusterNames = new Map();
  if (codemapSections && codemapSections.size > 0) {
    let clusterId = 0;
    for (const [section] of codemapSections) {
      clusterNames.set(clusterId, section);
      clusterId++;
    }
    const maxId = Math.max(...clusters.values());
    if (!clusterNames.has(maxId)) clusterNames.set(maxId, 'Other');
    return clusterNames;
  }
  const systemHints = [
    [/npc|villager|corn|farm/i, 'NPCs'],
    [/squirrel|plant|acorn/i, 'Squirrels'],
    [/wraith|ghost|night|combat|ashen|contam/i, 'Night/Combat'],
    [/terrain|height|noise|fbm/i, 'Terrain'],
    [/tree|rock|building|settlement|wall/i, 'World Gen'],
    [/camera|hud|project|axis/i, 'Camera/HUD'],
    [/wind|smoke|chimney/i, 'Wind/Smoke'],
    [/light|moon|sun|shadow|deferred/i, 'Lighting'],
    [/path|tramp|trail/i, 'Paths'],
    [/turret|zap|stone/i, 'Turrets'],
    [/player/i, 'Player'],
    [/animate|clock|dt/i, 'Main Loop'],
  ];
  for (const [cid] of new Set(clusters.values())) {
    const members = [...clusters.entries()].filter(([, c]) => c === cid).map(([f]) => f);
    const allText = members.join(' ');
    let name = null;
    for (const [re, label] of systemHints) {
      if (re.test(allText)) { name = label; break; }
    }
    clusterNames.set(cid, name || `system_${cid}`);
  }
  return clusterNames;
}

function computeAffinities(analysis, clusters, clusterNames) {
  const { functions } = analysis;
  const sectionToId = new Map();
  for (const [cid, name] of clusterNames) sectionToId.set(name, cid);

  const calledBy = new Map();
  for (const [fname, info] of functions) {
    for (const callee of info.calls) {
      if (!calledBy.has(callee)) calledBy.set(callee, new Set());
      calledBy.get(callee).add(fname);
    }
  }

  function tokenToCluster(token) {
    const section = SYSTEM_KEYWORDS.get(token);
    if (!section) return null;
    return sectionToId.get(section) ?? null;
  }

  const allAffinities = new Map();
  for (const [fname, info] of functions) {
    const scores = new Map();
    const addScore = (cid, w) => scores.set(cid, (scores.get(cid) || 0) + w);

    const primary = clusters.get(fname);
    if (primary != null) addScore(primary, 5.0);
    for (const token of tokenizeName(fname)) {
      const cid = tokenToCluster(token);
      if (cid != null) addScore(cid, 1.5);
    }
    for (const globals of [info.reads, info.writes, info.rw]) {
      for (const g of globals) {
        for (const token of tokenizeName(g)) {
          const cid = tokenToCluster(token);
          if (cid != null) addScore(cid, 0.5);
        }
      }
    }
    for (const callee of info.calls) {
      const cid = clusters.get(callee);
      if (cid != null) addScore(cid, 0.3);
    }
    const callers = calledBy.get(fname);
    if (callers) {
      for (const caller of callers) {
        const cid = clusters.get(caller);
        if (cid != null) addScore(cid, 0.2);
      }
    }

    const total = [...scores.values()].reduce((a, b) => a + b, 0);
    if (total > 0) {
      const normalized = new Map();
      for (const [cid, w] of scores) {
        const nw = w / total;
        if (nw >= 0.05) normalized.set(cid, nw);
      }
      allAffinities.set(fname, normalized);
    }
  }
  return allAffinities;
}

// ═══════════════════════════════════════════════════════
// EDGE LAYERS
// ═══════════════════════════════════════════════════════

// Each layer: { id, label, color, dash, defaultOn, defaultThreshold, maxThreshold,
//   compute(a, b, nameA, nameB) → edge[] where edge = { source, target, weight } }
// Returning an array lets directed layers emit edges in specific directions.
const EDGE_LAYERS = [
  {
    id: 'calls',
    label: 'Calls',
    color: '#af6',
    dash: null,
    defaultOn: true,
    defaultThreshold: 1,
    maxThreshold: 10,
    compute(a, b, nameA, nameB) {
      const edges = [];
      if (a.calls.has(nameB)) edges.push({ source: nameA, target: nameB, weight: 3 });
      if (b.calls.has(nameA)) edges.push({ source: nameB, target: nameA, weight: 3 });
      return edges;
    },
  },
  {
    id: 'calledBy',
    label: 'Called by',
    color: '#f6a',
    dash: '4,2',
    defaultOn: true,
    defaultThreshold: 1,
    maxThreshold: 10,
    compute(a, b, nameA, nameB) {
      // Reverse of calls: if A calls B, emit edge from B←A (B is called by A)
      const edges = [];
      if (a.calls.has(nameB)) edges.push({ source: nameB, target: nameA, weight: 3 });
      if (b.calls.has(nameA)) edges.push({ source: nameA, target: nameB, weight: 3 });
      return edges;
    },
  },
  {
    id: 'shared',
    label: 'Shared state',
    color: '#4a9eff',
    dash: null,
    defaultOn: true,
    defaultThreshold: 3,
    maxThreshold: 15,
    compute(a, b, nameA, nameB) {
      const aState = new Set([...a.reads, ...a.writes, ...a.rw]);
      const bState = new Set([...b.reads, ...b.writes, ...b.rw]);
      let w = 0;
      for (const v of aState) { if (bState.has(v)) w++; }
      return w > 0 ? [{ source: nameA, target: nameB, weight: w }] : [];
    },
  },
];

// Runtime state for layer toggles/thresholds (populated by initEdgeLayerUI)
const edgeLayerState = new Map();

function initEdgeLayerUI() {
  const container = document.getElementById('edge-layers-ui');
  container.innerHTML = '';
  for (const layer of EDGE_LAYERS) {
    const state = { enabled: layer.defaultOn, threshold: layer.defaultThreshold };
    edgeLayerState.set(layer.id, state);

    const wrap = document.createElement('span');
    wrap.style.cssText = 'margin-right:10px;white-space:nowrap;';

    const lbl = document.createElement('label');
    lbl.style.cssText = 'cursor:pointer;';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = state.enabled;
    cb.addEventListener('change', () => { state.enabled = cb.checked; rebuild(); });
    const swatch = document.createElement('span');
    swatch.style.cssText = `display:inline-block;width:8px;height:8px;border-radius:50%;background:${layer.color};margin:0 3px;vertical-align:middle;`;
    lbl.appendChild(cb);
    lbl.appendChild(swatch);
    lbl.appendChild(document.createTextNode(layer.label));
    wrap.appendChild(lbl);

    if (layer.maxThreshold > 1) {
      const slider = document.createElement('input');
      slider.type = 'range';
      slider.min = 1;
      slider.max = layer.maxThreshold;
      slider.value = state.threshold;
      slider.style.cssText = 'width:50px;vertical-align:middle;margin-left:4px;';
      const valSpan = document.createElement('span');
      valSpan.style.cssText = 'font-size:10px;margin-left:2px;color:#888;';
      valSpan.textContent = state.threshold;
      slider.addEventListener('input', () => {
        state.threshold = parseInt(slider.value);
        valSpan.textContent = state.threshold;
        rebuild();
      });
      wrap.appendChild(slider);
      wrap.appendChild(valSpan);
    }
    container.appendChild(wrap);
  }
}

function getEnabledEdgeLayers() {
  return EDGE_LAYERS.filter(l => edgeLayerState.get(l.id)?.enabled);
}

// ═══════════════════════════════════════════════════════
// GRAPH BUILDING
// ═══════════════════════════════════════════════════════
function buildGraph(analysis, clusters, clusterNames, affinities, opts) {
  const { functions } = analysis;
  const nodes = [];
  const links = [];
  const nodeMap = new Map();
  const { viewMode } = opts;
  const enabledLayers = getEnabledEdgeLayers();
  const sectionToId = new Map();
  for (const [cid, name] of clusterNames) sectionToId.set(name, cid);

  // Function nodes
  for (const [name, info] of functions) {
    const clusterId = clusters.get(name) ?? 0;
    const nodeAffinities = affinities.get(name) || new Map([[clusterId, 1.0]]);
    nodes.push({
      id: name,
      type: 'function',
      cluster: clusterId,
      clusterName: clusterNames.get(clusterId) || 'misc',
      affinities: nodeAffinities,
      info,
      radius: Math.max(4, (codemapImportance.get(name) || 3) * 2),
      color: CLUSTER_COLORS[clusterId % CLUSTER_COLORS.length],
    });
    nodeMap.set(name, nodes[nodes.length - 1]);
  }

  if (viewMode === 'hypergraph') {
    // Add global variable nodes
    const globalUsage = new Map();
    for (const [fname, info] of functions) {
      for (const s of [info.reads, info.writes, info.rw]) {
        for (const g of s) {
          if (!globalUsage.has(g)) globalUsage.set(g, new Set());
          globalUsage.get(g).add(fname);
        }
      }
    }
    for (const [gname, users] of globalUsage) {
      if (users.size < 2 || nodeMap.has(gname)) continue;
      const gScores = new Map();
      const addGScore = (cid, w) => gScores.set(cid, (gScores.get(cid) || 0) + w);
      for (const token of tokenizeName(gname)) {
        const section = SYSTEM_KEYWORDS.get(token);
        if (section) {
          const cid = sectionToId.get(section);
          if (cid != null) addGScore(cid, 2.0);
        }
      }
      for (const fname of users) {
        addGScore(clusters.get(fname) ?? 0, 1.0);
      }
      const gTotal = [...gScores.values()].reduce((a, b) => a + b, 0);
      const gAffinities = new Map();
      let bestCluster = 0, bestWeight = 0;
      if (gTotal > 0) {
        for (const [cid, w] of gScores) {
          const nw = w / gTotal;
          if (nw >= 0.05) gAffinities.set(cid, nw);
          if (nw > bestWeight) { bestCluster = cid; bestWeight = nw; }
        }
      }
      const node = {
        id: gname, type: 'global', cluster: bestCluster,
        clusterName: clusterNames.get(bestCluster) || 'misc',
        affinities: gAffinities,
        radius: Math.max(3, Math.sqrt(users.size) * 2),
        color: '#555',
      };
      nodes.push(node);
      nodeMap.set(gname, node);
      for (const fname of users) {
        links.push({ source: fname, target: gname, type: 'uses', weight: 1 });
      }
    }
  }

  // Function-to-function edges — one pass per enabled layer (all view modes)
  {
    const names = [...functions.keys()];
    for (const layer of enabledLayers) {
      const threshold = edgeLayerState.get(layer.id)?.threshold ?? 1;
      for (let i = 0; i < names.length; i++) {
        for (let j = i + 1; j < names.length; j++) {
          const a = functions.get(names[i]);
          const b = functions.get(names[j]);
          const edges = layer.compute(a, b, names[i], names[j]);
          for (const e of edges) {
            if (e.weight >= threshold) {
              links.push({ source: e.source, target: e.target, type: layer.id, weight: e.weight });
            }
          }
        }
      }
    }
  }

  // Build adjacency
  const adjacency = new Map();
  const nodeDegree = new Map();
  for (const n of nodes) { adjacency.set(n.id, new Set()); nodeDegree.set(n.id, 0); }
  const edgeWeights = new Map();
  for (const l of links) {
    adjacency.get(l.source)?.add(l.target);
    adjacency.get(l.target)?.add(l.source);
    nodeDegree.set(l.source, (nodeDegree.get(l.source) || 0) + 1);
    nodeDegree.set(l.target, (nodeDegree.get(l.target) || 0) + 1);
    edgeWeights.set(l.source + '\0' + l.target, l.weight || 1);
    edgeWeights.set(l.target + '\0' + l.source, l.weight || 1);
  }

  return { nodes, links, nodeMap, adjacency, nodeDegree, edgeWeights };
}

// ═══════════════════════════════════════════════════════
// LAYOUT ENGINE
// ═══════════════════════════════════════════════════════
function computeLayout(nodes, links, opts = {}) {
  const { isWarmRestart, spatialEdgesMap } = opts;

  if (isWarmRestart) {
    warmRestart(nodes, links);
    return;
  }

  // Group nodes by cluster
  const clusterGroups = new Map();
  for (const n of nodes) {
    const cid = n.cluster ?? -1;
    if (!clusterGroups.has(cid)) clusterGroups.set(cid, []);
    clusterGroups.get(cid).push(n);
  }

  const nodeMap = new Map(nodes.map(n => [n.id, n]));

  // Phase 1: Intra-cluster layout
  for (const [cid, members] of clusterGroups) {
    layoutClusterInternal(members, links, nodeMap);
  }

  // Phase 2: Compute cluster bounding circles
  const clusterBounds = new Map();
  for (const [cid, members] of clusterGroups) {
    let maxR = 0;
    for (const n of members) {
      const d = Math.sqrt(n.x * n.x + n.y * n.y) + (n.radius || 4);
      if (d > maxR) maxR = d;
    }
    clusterBounds.set(cid, { radius: maxR + 25, cx: 0, cy: 0 });
  }

  // Phase 3: Pack clusters
  packClusters(clusterBounds, links, nodeMap, clusterGroups);

  // Phase 4: Apply cluster offsets to all nodes
  for (const [cid, bounds] of clusterBounds) {
    const members = clusterGroups.get(cid);
    if (!members) continue;
    for (const n of members) {
      n.x += bounds.cx;
      n.y += bounds.cy;
    }
  }

  // Phase 5: Apply spatial affinity nudges
  if (spatialEdgesMap) {
    for (let iter = 0; iter < 10; iter++) {
      for (const [key, edge] of Object.entries(spatialEdgesMap)) {
        const [idA, idB] = key.split('\0');
        const a = nodeMap.get(idA), b = nodeMap.get(idB);
        if (!a || !b) continue;
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const pull = edge.weight * 0.5;
        if (dist > 50) {
          a.x += (dx / dist) * pull;
          a.y += (dy / dist) * pull;
          b.x -= (dx / dist) * pull;
          b.y -= (dy / dist) * pull;
        }
      }
    }
  }

  // Zero velocities
  for (const n of nodes) { n.vx = 0; n.vy = 0; }
}

function layoutClusterInternal(members, allLinks, nodeMap) {
  if (members.length === 0) return;
  if (members.length === 1) { members[0].x = 0; members[0].y = 0; return; }
  if (members.length === 2) {
    members[0].x = -20; members[0].y = 0;
    members[1].x = 20; members[1].y = 0;
    return;
  }

  // Extract intra-cluster links
  const memberSet = new Set(members.map(n => n.id));
  const intraLinks = allLinks.filter(l => memberSet.has(l.source) && memberSet.has(l.target));

  // Sort by importance (large nodes first, near center)
  const sorted = [...members].sort((a, b) => (b.radius || 4) - (a.radius || 4));

  // Initialize in a circle
  const spacing = Math.max(25, Math.sqrt(members.length) * 15);
  for (let i = 0; i < sorted.length; i++) {
    const angle = (2 * Math.PI * i) / sorted.length;
    const r = spacing * (0.2 + 0.8 * (i / sorted.length));
    sorted[i].x = Math.cos(angle) * r;
    sorted[i].y = Math.sin(angle) * r;
    sorted[i].vx = 0;
    sorted[i].vy = 0;
  }

  const localMap = new Map(members.map(n => [n.id, n]));

  // Mini force simulation
  for (let iter = 0; iter < LAYOUT_ITERS; iter++) {
    const alpha = 1 - iter / LAYOUT_ITERS;
    const a2 = alpha * alpha;

    // Node-node repulsion
    for (let i = 0; i < members.length; i++) {
      for (let j = i + 1; j < members.length; j++) {
        const a = members[i], b = members[j];
        let dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
        const minDist = (a.radius || 4) + (b.radius || 4) + 10;
        if (dist < minDist * 2.5) {
          const force = -a2 * 3 / (dist * dist + 1);
          a.vx += dx * force;
          a.vy += dy * force;
          b.vx -= dx * force;
          b.vy -= dy * force;
        }
      }
    }

    // Link attraction
    for (const link of intraLinks) {
      const s = localMap.get(link.source);
      const t = localMap.get(link.target);
      if (!s || !t) continue;
      const dx = t.x - s.x, dy = t.y - s.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
      const targetDist = (s.radius || 4) + (t.radius || 4) + 15;
      const force = (dist - targetDist) * a2 * 0.04 * Math.min(3, (link.weight || 1));
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      s.vx += fx; s.vy += fy;
      t.vx -= fx; t.vy -= fy;
    }

    // Center gravity (importance-weighted: important nodes pulled more toward center)
    for (const n of members) {
      const imp = (n.radius || 4) / 20;
      n.vx -= n.x * a2 * 0.02 * (1 + imp);
      n.vy -= n.y * a2 * 0.02 * (1 + imp);
    }

    // Update positions
    for (const n of members) {
      n.x += n.vx;
      n.y += n.vy;
      n.vx *= 0.5;
      n.vy *= 0.5;
    }

    // Hard collision resolution
    for (let i = 0; i < members.length; i++) {
      for (let j = i + 1; j < members.length; j++) {
        const a = members[i], b = members[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
        const minDist = (a.radius || 4) + (b.radius || 4) + 6;
        if (dist < minDist) {
          const push = (minDist - dist) * 0.5;
          const nx = (dx / dist) * push;
          const ny = (dy / dist) * push;
          a.x -= nx; a.y -= ny;
          b.x += nx; b.y += ny;
        }
      }
    }
  }

  // Center the cluster at origin
  let cx = 0, cy = 0;
  for (const n of members) { cx += n.x; cy += n.y; }
  cx /= members.length; cy /= members.length;
  for (const n of members) { n.x -= cx; n.y -= cy; }
}

function packClusters(clusterBounds, links, nodeMap, clusterGroups) {
  const clusters = [...clusterBounds.entries()].map(([cid, info]) => ({
    cid, radius: info.radius, x: 0, y: 0,
  }));

  if (clusters.length <= 1) {
    if (clusters.length === 1) clusterBounds.get(clusters[0].cid).cx = 0;
    return;
  }

  // Sort by size descending
  clusters.sort((a, b) => b.radius - a.radius);

  // Compute inter-cluster link weights (which clusters should be near each other)
  const clusterLinkWeights = new Map();
  for (const l of links) {
    const sNode = nodeMap.get(l.source);
    const tNode = nodeMap.get(l.target);
    if (!sNode || !tNode || sNode.cluster === tNode.cluster) continue;
    const key = [sNode.cluster, tNode.cluster].sort().join(',');
    clusterLinkWeights.set(key, (clusterLinkWeights.get(key) || 0) + (l.weight || 1));
  }

  // Golden angle spiral initial placement
  const goldenAngle = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < clusters.length; i++) {
    const angle = i * goldenAngle;
    const r = clusters[0].radius + clusters[i].radius + i * 25;
    clusters[i].x = Math.cos(angle) * r;
    clusters[i].y = Math.sin(angle) * r;
  }

  // Iterative: overlap resolution + inter-cluster link attraction + center pull
  for (let iter = 0; iter < CLUSTER_PACK_ITERS; iter++) {
    const alpha = 1 - iter / CLUSTER_PACK_ITERS;

    // Overlap resolution (hard constraint)
    for (let i = 0; i < clusters.length; i++) {
      for (let j = i + 1; j < clusters.length; j++) {
        const a = clusters[i], b = clusters[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
        const minDist = a.radius + b.radius + CLUSTER_GAP;
        if (dist < minDist) {
          const push = (minDist - dist) * 0.5;
          const nx = (dx / dist) * push;
          const ny = (dy / dist) * push;
          a.x -= nx; a.y -= ny;
          b.x += nx; b.y += ny;
        }
      }
    }

    // Inter-cluster link attraction
    for (const [key, weight] of clusterLinkWeights) {
      const [cidA, cidB] = key.split(',').map(Number);
      const ca = clusters.find(c => c.cid === cidA);
      const cb = clusters.find(c => c.cid === cidB);
      if (!ca || !cb) continue;
      const dx = cb.x - ca.x, dy = cb.y - ca.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const targetDist = ca.radius + cb.radius + CLUSTER_GAP + 10;
      if (dist > targetDist) {
        const pull = Math.min(weight * 0.02, 3) * alpha;
        ca.x += (dx / dist) * pull;
        ca.y += (dy / dist) * pull;
        cb.x -= (dx / dist) * pull;
        cb.y -= (dy / dist) * pull;
      }
    }

    // Center attraction
    for (const c of clusters) {
      c.x *= 0.997;
      c.y *= 0.997;
    }
  }

  // Store results
  for (const c of clusters) {
    const b = clusterBounds.get(c.cid);
    b.cx = c.x;
    b.cy = c.y;
  }
}

function warmRestart(nodes, links) {
  const newNodes = [];
  for (const n of nodes) {
    if (savedPositions.has(n.id)) {
      const p = savedPositions.get(n.id);
      n.x = p.x;
      n.y = p.y;
    } else {
      newNodes.push(n);
    }
  }

  if (newNodes.length === 0) return;

  // Place new nodes near their cluster center
  for (const n of newNodes) {
    const siblings = nodes.filter(m => m.cluster === n.cluster && m !== n && m.x != null);
    if (siblings.length > 0) {
      let cx = 0, cy = 0;
      for (const m of siblings) { cx += m.x; cy += m.y; }
      cx /= siblings.length; cy /= siblings.length;
      n.x = cx + (Math.random() - 0.5) * 50;
      n.y = cy + (Math.random() - 0.5) * 50;
    } else {
      n.x = (Math.random() - 0.5) * 300;
      n.y = (Math.random() - 0.5) * 300;
    }
  }

  // Brief collision resolution
  for (let iter = 0; iter < 20; iter++) {
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        if (a.x == null || b.x == null) continue;
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
        const minDist = (a.radius || 4) + (b.radius || 4) + 6;
        if (dist < minDist) {
          const push = (minDist - dist) * 0.4;
          const nx = (dx / dist) * push;
          const ny = (dy / dist) * push;
          // Only move new nodes
          if (newNodes.includes(a) && newNodes.includes(b)) {
            a.x -= nx; a.y -= ny;
            b.x += nx; b.y += ny;
          } else if (newNodes.includes(a)) {
            a.x -= nx * 2; a.y -= ny * 2;
          } else if (newNodes.includes(b)) {
            b.x += nx * 2; b.y += ny * 2;
          }
        }
      }
    }
  }
}

// ═══════════════════════════════════════════════════════
// ANIMATION
// ═══════════════════════════════════════════════════════
function animateToPositions(targetPositions, duration = 300) {
  if (animationRAF) cancelAnimationFrame(animationRAF);
  if (!currentNodes) return;

  const startPositions = new Map();
  for (const n of currentNodes) {
    startPositions.set(n.id, { x: n.x, y: n.y });
  }

  const startTime = performance.now();
  function step(now) {
    const t = Math.min(1, (now - startTime) / duration);
    const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; // ease-in-out

    for (const n of currentNodes) {
      const from = startPositions.get(n.id);
      const to = targetPositions.get(n.id);
      if (from && to) {
        n.x = from.x + (to.x - from.x) * ease;
        n.y = from.y + (to.y - from.y) * ease;
      }
    }
    renderPositions();
    if (t < 1) {
      animationRAF = requestAnimationFrame(step);
    } else {
      animationRAF = null;
      // Save final positions
      for (const n of currentNodes) {
        if (n.x != null) savedPositions.set(n.id, { x: n.x, y: n.y });
      }
    }
  }
  animationRAF = requestAnimationFrame(step);
}

// ═══════════════════════════════════════════════════════
// SVG INIT & RENDERING
// ═══════════════════════════════════════════════════════
function initSVG() {
  svg = d3.select('#graph');
  width = window.innerWidth;
  height = window.innerHeight - 44;
  svg.attr('width', width).attr('height', height);

  svgDefs = svg.append('defs');
  gHulls = svg.append('g').attr('class', 'hulls');
  gMetaLinks = svg.append('g').attr('class', 'meta-links');
  gLinks = svg.append('g').attr('class', 'links');
  gNodes = svg.append('g').attr('class', 'nodes');
  gLabels = svg.append('g').attr('class', 'labels');
  gClusterLabels = svg.append('g').attr('class', 'cluster-labels');

  const zoom = d3.zoom()
    .scaleExtent([0.1, 12])
    .on('zoom', e => {
      gHulls.attr('transform', e.transform);
      gMetaLinks.attr('transform', e.transform);
      gLinks.attr('transform', e.transform);
      gNodes.attr('transform', e.transform);
      gLabels.attr('transform', e.transform);
      gClusterLabels.attr('transform', e.transform);
      currentK = e.transform.k;
      applySemanticZoom();
    });
  svg.call(zoom);
  svg.call(zoom.transform, d3.zoomIdentity.translate(width / 2, height / 2).scale(0.8));
}

function expandHull(hull, pad) {
  let cx = 0, cy = 0;
  for (const [x, y] of hull) { cx += x; cy += y; }
  cx /= hull.length; cy /= hull.length;
  return hull.map(([x, y]) => {
    const dx = x - cx, dy = y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    return [x + (dx / dist) * pad, y + (dy / dist) * pad];
  });
}

function applySemanticZoom() {
  const k = currentK;
  document.getElementById('zoom-debug').textContent = `zoom: ${k.toFixed(2)}`;

  gLabels.selectAll('text').each(function(d) {
    const el = d3.select(this);
    const r = d.radius || 4;
    const screenRadius = r * k;
    if (screenRadius < 8) { el.attr('opacity', 0); return; }
    const opacity = Math.min(1, (screenRadius - 8) / 10);
    const maxFontForWidth = (r * 1.8) / Math.max(1, d.id.length * 0.55);
    const maxFontForHeight = r * 0.9;
    const fontSize = Math.max(2, Math.min(maxFontForWidth, maxFontForHeight));
    el.attr('opacity', opacity)
      .attr('font-size', fontSize)
      .attr('dominant-baseline', 'central')
      .attr('dy', 0)
      .attr('fill', '#fff');
  });

  // Floating cluster labels: fade out as textPath labels fade in (k 2.5→3.5)
  const showClusterLabels = document.getElementById('show-cluster-labels').checked;
  const floatingLabelOpacity = !showClusterLabels ? 0
    : k < 0.7 ? 0.4 : k < 2.5 ? 0.7 : Math.max(0.2, 0.7 - (k - 2.5) * 0.7);
  // Font stays constant on screen up to k=2, then shrinks very gently
  const clusterFontSize = k <= 2 ? 13 / k : 13 / (2 * Math.pow(k / 2, 0.75));
  gClusterLabels.selectAll('text').each(function() {
    d3.select(this).attr('font-size', clusterFontSize).attr('opacity', floatingLabelOpacity);
  });

  // TextPath boundary labels: fade in from k=3, full at k=4
  const showBoundaryLabels = document.getElementById('show-boundary-labels').checked;
  const textPathOpacity = !showBoundaryLabels ? 0
    : Math.min(0.45, Math.max(0, (k - 3) * 0.45));
  const hullFontSize = Math.max(1.5, Math.min(5, 4 / k));
  gHulls.selectAll('.hull-label')
    .attr('fill-opacity', textPathOpacity)
    .attr('font-size', hullFontSize);

  // Recompute label placement on zoom (font size changes bbox)
  if (showClusterLabels && clusterMemberCache.size > 0) {
    if (labelPlacementTimer) clearTimeout(labelPlacementTimer);
    labelPlacementTimer = setTimeout(() => {
      computeClusterLabelPlacement();
    }, 150);
  }

  const showEdges = document.getElementById('show-edges').checked;
  const showMetaEdges = document.getElementById('show-meta-edges').checked;
  const zoomedIn = k > 3.5;
  const metaZoom = k < 1.5; // zoomed out enough for meta-edges

  // ── Meta-edges vs individual edges ──
  if (metaZoom && !showEdges && showMetaEdges) {
    // Zoomed out: show meta-edges, hide individual edges (except important ones)
    gMetaLinks.style('display', null);
    const metaOpacity = k < 0.3 ? 0.25 : k < 0.7 ? 0.45 : 0.6;
    gMetaLinks.attr('opacity', metaOpacity);

    // Hide individual edges, but keep edges between two high-importance nodes
    gLinks.attr('opacity', 1);
    gLinks.selectAll('.link').each(function(d) {
      const sImp = codemapImportance.get(d.source) || 0;
      const tImp = codemapImportance.get(d.target) || 0;
      const important = sImp > 8 && tImp > 8;
      d3.select(this)
        .style('display', important ? null : 'none')
        .attr('stroke-opacity', important ? 0.35 : null);
    });
  } else {
    // Zoomed in or edges toggled on: hide meta-edges, show individual edges
    gMetaLinks.style('display', 'none');

    if (showEdges || zoomedIn) {
      gLinks.selectAll('.link').style('display', null);
    } else {
      gLinks.selectAll('.link').style('display', 'none');
    }
    if (showEdges) {
      gLinks.selectAll('.link').attr('stroke-opacity', 0.45);
      gLinks.attr('opacity', 1);
    } else {
      const edgeOpacity = k < 0.3 ? 0.02 : k < 0.6 ? 0.1 : k < 2.5 ? 1 : Math.min(1, 1 + (k - 2.5) * 0.5);
      gLinks.attr('opacity', edgeOpacity);
    }
  }

  const hullOpacity = k < 0.5 ? 0.15 : k < 1.5 ? 0.08 : 0.04;
  gHulls.selectAll('.hull').attr('fill-opacity', hullOpacity);
}

// Distance-based mid-edge opacity: solid when close, fading when far
function edgeMidOpacity(dist) {
  const CLOSE = 60, FAR = 250;
  if (dist <= CLOSE) return 1.0;
  if (dist >= FAR) return 0.08;
  const t = (dist - CLOSE) / (FAR - CLOSE);
  return 1.0 - t * 0.92; // lerp from 1.0 to 0.08
}

function renderGraph(graph, analysis, clusters, clusterNames) {
  const { nodes, links, nodeDegree } = graph;
  const showHulls = document.getElementById('show-hulls').checked;

  // Save current positions before clearing (unless just reset)
  if (currentNodes && savedPositions.size > 0) {
    for (const n of currentNodes) {
      if (n.x != null && n.y != null) savedPositions.set(n.id, { x: n.x, y: n.y });
    }
  }

  // Compute layout
  const isWarmRestart = savedPositions.size > nodes.length * 0.3;
  computeLayout(nodes, links, {
    isWarmRestart,
    spatialEdgesMap: spatialMemory.spatialEdges,
  });

  // Snapshot T0 layout positions BEFORE sticky overrides (only for new nodes)
  // Existing T0 positions are preserved across reloads so X always returns to the original layout
  for (const n of nodes) {
    if (n.x != null && !initialLayoutPositions.has(n.id)) {
      initialLayoutPositions.set(n.id, { x: n.x, y: n.y });
    }
  }

  // Apply sticky positions (user-dragged nodes override layout)
  for (const n of nodes) {
    if (stickyNodes.has(n.id) && savedPositions.has(n.id)) {
      const p = savedPositions.get(n.id);
      n.x = p.x;
      n.y = p.y;
    }
  }

  // Save computed positions
  for (const n of nodes) {
    if (n.x != null) savedPositions.set(n.id, { x: n.x, y: n.y });
  }

  // Store references
  currentNodes = nodes;
  currentLinks = links;
  currentGraph = graph;

  // Clear SVG
  gLinks.selectAll('*').remove();
  gNodes.selectAll('*').remove();
  gClusterLabels.selectAll('*').remove();
  gHulls.selectAll('*').remove();
  gLabels.selectAll('*').remove();

  // Density-adaptive edge styling helpers
  function baseEdgeOpacity(l) {
    const maxDeg = Math.max(nodeDegree.get(l.source) || 1, nodeDegree.get(l.target) || 1);
    return Math.max(0.03, 0.15 / Math.sqrt(maxDeg));
  }
  function baseEdgeWidth(l) {
    const maxDeg = Math.max(nodeDegree.get(l.source) || 1, nodeDegree.get(l.target) || 1);
    const w = 0.5 + (l.weight || 1) * 0.3;
    return Math.min(3, w / Math.max(1, Math.sqrt(maxDeg) * 0.4));
  }

  // Render links (using source/target as IDs since we don't use d3-force)
  const nodeMap = graph.nodeMap;

  // Proximity-based gradient: solid when close, fades in the middle when far
  svgDefs.selectAll('.edge-grad').remove();
  links.forEach((d, i) => {
    const gradId = `edge-grad-${i}`;
    d._gradId = gradId;
    const sn = nodeMap.get(d.source);
    const tn = nodeMap.get(d.target);
    const sx = sn?.x || 0, sy = sn?.y || 0;
    const tx = tn?.x || 0, ty = tn?.y || 0;
    const layer = EDGE_LAYERS.find(l => l.id === d.type);
    const color = layer ? layer.color : '#4a9eff';
    d._edgeColor = color;

    const dist = Math.hypot(tx - sx, ty - sy);
    const midOp = edgeMidOpacity(dist);

    const grad = svgDefs.append('linearGradient')
      .attr('class', 'edge-grad')
      .attr('id', gradId)
      .attr('gradientUnits', 'userSpaceOnUse')
      .attr('x1', sx).attr('y1', sy)
      .attr('x2', tx).attr('y2', ty);

    grad.append('stop').attr('offset', '0%')
      .attr('stop-color', color).attr('stop-opacity', 1);
    grad.append('stop').attr('offset', '25%')
      .attr('stop-color', color).attr('stop-opacity', midOp);
    grad.append('stop').attr('offset', '50%')
      .attr('stop-color', color).attr('stop-opacity', midOp * 0.7);
    grad.append('stop').attr('offset', '75%')
      .attr('stop-color', color).attr('stop-opacity', midOp);
    grad.append('stop').attr('offset', '100%')
      .attr('stop-color', color).attr('stop-opacity', 1);
  });

  gLinks.selectAll('line')
    .data(links)
    .join('line')
    .attr('class', 'link')
    .attr('stroke', d => `url(#${d._gradId})`)
    .attr('stroke-width', d => baseEdgeWidth(d))
    .attr('stroke-opacity', d => baseEdgeOpacity(d))
    .attr('stroke-dasharray', d => { const l = EDGE_LAYERS.find(l => l.id === d.type); return l ? (l.dash || null) : d.type === 'uses' ? '3,3' : null; })
    .style('display', document.getElementById('show-edges').checked ? null : 'none')
    .attr('x1', d => nodeMap.get(d.source)?.x || 0)
    .attr('y1', d => nodeMap.get(d.source)?.y || 0)
    .attr('x2', d => nodeMap.get(d.target)?.x || 0)
    .attr('y2', d => nodeMap.get(d.target)?.y || 0);

  // Render nodes
  const node = gNodes.selectAll('g')
    .data(nodes)
    .join('g')
    .attr('class', 'node')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .call(d3.drag()
      .on('start', (e, d) => {
        d._dragStart = { x: d.x, y: d.y };
        d._dragStartTime = Date.now();
        d._isDragging = true;
        forcePressDragNode = d;
        // Stop centroid pull if dragging a selected node while space is held
        if (spacePullRAF && selectedNodes.has(d.id)) {
          cancelAnimationFrame(spacePullRAF);
          spacePullRAF = null;
        }
        // Shift-hold fallback for non-pressure devices: start attractor after 550ms delay
        if (!hasForceTouch && !hasPressure && e.sourceEvent && e.sourceEvent.shiftKey) {
          if (shiftAttractorTimer) clearTimeout(shiftAttractorTimer);
          shiftAttractorTimer = setTimeout(() => {
            shiftAttractorTimer = null;
            if (d._isDragging && !attractorNode && !groupMoveActive) {
              startAttractor(d);
            }
          }, 550);
        }
      })
      .on('drag', (e, d) => {
        if (xKeyRAF) return; // X step animation controls position
        if (e.sourceEvent && e.sourceEvent.shiftKey && selectedNodes.has(d.id) && selectedNodes.size >= 2) {
          // Shift+drag selected node: move all selected nodes together
          if (!groupMoveActive) {
            groupMoveActive = true;
            // Cancel attractor timer — group move takes priority
            if (shiftAttractorTimer) { clearTimeout(shiftAttractorTimer); shiftAttractorTimer = null; }
            if (attractorNode) lockAttractor();
          }
          const dx = e.x - d.x, dy = e.y - d.y;
          for (const n of currentNodes) {
            if (!selectedNodes.has(n.id)) continue;
            n.x += dx;
            n.y += dy;
          }
        } else if (e.sourceEvent && e.sourceEvent.shiftKey) {
          return; // shift-drag on unselected node, don't move
        } else {
          d.x = e.x; d.y = e.y;
        }
        renderPositions();
      })
      .on('end', (e, d) => {
        d._isDragging = false;
        forcePressDragNode = null;
        groupMoveActive = false;
        if (shiftAttractorTimer) { clearTimeout(shiftAttractorTimer); shiftAttractorTimer = null; }
        if (xKeyHeld) stopXForces(); // release during X relaxation — stop and keep position
        const dx = d.x - d._dragStart.x, dy = d.y - d._dragStart.y;
        const moved = Math.sqrt(dx * dx + dy * dy) > 5;
        if (moved) {
          // If shift+drag moved all selected nodes, save all their positions
          if (e.sourceEvent && e.sourceEvent.shiftKey && selectedNodes.has(d.id) && selectedNodes.size >= 2) {
            for (const n of currentNodes) {
              if (!selectedNodes.has(n.id)) continue;
              stickyNodes.add(n.id);
              savedPositions.set(n.id, { x: n.x, y: n.y });
            }
          } else {
            stickyNodes.add(d.id);
            savedPositions.set(d.id, { x: d.x, y: d.y });
          }
          trackDragProximity(d.id);
          pushArrangement('drag', [d.id]);
        }
        if (attractorNode) lockAttractor();
      })
    );

  node.append('circle')
    .attr('r', d => d.radius)
    .attr('fill', d => d.type === 'global' ? '#333' : d.color)
    .attr('stroke', d => d.type === 'global' ? '#666' : d3.color(d.color).brighter(0.8))
    .on('click', (e, d) => {
      e.stopPropagation();
      const dragDuration = d._dragStartTime ? Date.now() - d._dragStartTime : 0;
      d._dragStartTime = null;
      if (dragDuration < 300) {
        // Clear cluster focus so node-based gathers take priority
        if (focusedClusterId != null) {
          focusedClusterId = null;
          applyMetaLinkFocus();
        }
        // Shift+X+click or Ctrl+click: dismiss node to T0
        if ((e.shiftKey && xKeyDown) || (e.ctrlKey || e.metaKey)) {
          selectedNodes.delete(d.id);
          lockedNodes.delete(d.id);
          d3.select(e.target).classed('selected-glow', false);
          updateLockUI();
          dismissNodeToT0(d);
          return;
        }
        if (e.shiftKey) {
          // Shift-click: toggle multi-select
          if (selectedNodes.has(d.id)) {
            selectedNodes.delete(d.id);
            lockedNodes.delete(d.id);
            d3.select(e.target).classed('selected-glow', false);
          } else {
            selectedNodes.add(d.id);
            lockedNodes.add(d.id);
            stickyNodes.add(d.id);
            savedPositions.set(d.id, { x: d.x, y: d.y });
            d3.select(e.target).classed('selected-glow', true);
          }
          updateLockUI();
          return;
        }
        selectNode(d, analysis);
        trackClickCoOccurrence(d.id);
        // clickPull(d); — disabled: single click should not pull neighbors
      }
    })
    .on('contextmenu', (e, d) => {
      e.preventDefault();
      // Ctrl+click on Mac fires contextmenu, not click — handle dismiss here
      selectedNodes.delete(d.id);
      lockedNodes.delete(d.id);
      gNodes.selectAll('.node').filter(n => n.id === d.id)
        .select('circle').classed('selected-glow', false);
      updateLockUI();
      dismissNodeToT0(d);
    })
    .on('mouseenter', (e, d) => { if (!attractorNode) highlightNeighbors(d, graph); })
    .on('mouseleave', () => { if (!attractorNode) clearHighlight(); })
    .each(function(d) {
      // Force Touch events for attractor (Safari)
      this.addEventListener('webkitmouseforcewillbegin', (e) => {
        e.preventDefault();
        hasForceTouch = true;
      });
      this.addEventListener('webkitmouseforcedown', (e) => {
        if (!attractorNode) startAttractor(d);
      });
      this.addEventListener('webkitmouseforceup', (e) => {
        if (attractorNode) lockAttractor();
      });
      // Pointer Events pressure fallback (Chrome/Firefox)
      this.addEventListener('pointerdown', (e) => {
        pressureActive = false;
      });
      this.addEventListener('pointermove', (e) => {
        if (hasForceTouch) return; // webkit events take priority
        if (e.pressure > 0 && e.pressure !== 0.5) hasPressure = true;
        if (!hasPressure) return;
        if (e.pressure >= PRESSURE_THRESHOLD && !pressureActive) {
          pressureActive = true;
          if (!attractorNode) startAttractor(d);
        } else if (e.pressure < PRESSURE_THRESHOLD && pressureActive) {
          pressureActive = false;
          if (attractorNode) lockAttractor();
        }
      });
      this.addEventListener('pointerup', () => {
        if (pressureActive) {
          pressureActive = false;
          if (attractorNode) lockAttractor();
        }
      });
    });

  // Secondary affinity rings
  node.filter(d => {
    if (!d.affinities || d.affinities.size < 2) return false;
    const sorted = [...d.affinities.entries()].sort((a, b) => b[1] - a[1]);
    return sorted[1][1] >= 0.15;
  }).append('circle')
    .attr('r', d => d.radius + 2.5)
    .attr('fill', 'none')
    .attr('stroke', d => {
      const sorted = [...d.affinities.entries()].sort((a, b) => b[1] - a[1]);
      return CLUSTER_COLORS[sorted[1][0] % CLUSTER_COLORS.length];
    })
    .attr('stroke-width', d => {
      const sorted = [...d.affinities.entries()].sort((a, b) => b[1] - a[1]);
      return Math.max(1, sorted[1][1] * 4);
    })
    .attr('stroke-opacity', d => {
      const sorted = [...d.affinities.entries()].sort((a, b) => b[1] - a[1]);
      return 0.4 + sorted[1][1] * 0.6;
    })
    .style('pointer-events', 'none');

  // Labels
  gLabels.selectAll('text')
    .data(nodes)
    .join('text')
    .attr('class', 'label')
    .attr('fill', '#fff')
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'central')
    .attr('opacity', 0)
    .style('pointer-events', 'none')
    .style('user-select', 'none')
    .text(d => d.id)
    .attr('x', d => d.x)
    .attr('y', d => d.y);

  // Hulls
  currentHullClusterIds = showHulls
    ? [...new Set(nodes.filter(n => n.cluster != null && n.cluster >= 0).map(n => n.cluster))]
    : null;
  renderHulls();

  // Cluster labels (floating — always visible)
  const allClusterIds = [...new Set(nodes.filter(n => n.type === 'function').map(n => n.cluster))];
  gClusterLabels.selectAll('text')
    .data(allClusterIds.map(cid => ({
      cid, name: clusterNames.get(cid) || `cluster_${cid}`,
      color: CLUSTER_COLORS[cid % CLUSTER_COLORS.length],
    })))
    .join('text')
    .attr('class', 'cluster-label')
    .attr('fill', d => d.color)
    .text(d => d.name)
    .call(clusterLabelDrag(d => currentNodes.filter(n => n.cluster === d.cid)));
  rebuildClusterMemberCache();
  computeClusterLabelPlacement();

  // Legend
  document.getElementById('legend').innerHTML = [...clusterNames.entries()]
    .sort((a, b) => a[0] - b[0])
    .map(([id, name]) => `<div class="item"><div class="dot" style="background:${CLUSTER_COLORS[id % CLUSTER_COLORS.length]}"></div>${name} (${[...clusters.entries()].filter(([, c]) => c === id).length})</div>`)
    .join('');

  // Meta-edges between clusters
  computeMetaLinks();
  renderMetaLinks();

  applySemanticZoom();

  // Render user-defined clusters
  renderUserClusters();
  renderUserClusterLegend();

  // Push initial arrangement
  pushArrangement('layout');
}

function hullPerimeter(pts) {
  let len = 0;
  for (let i = 0; i < pts.length; i++) {
    const j = (i + 1) % pts.length;
    len += Math.hypot(pts[j][0] - pts[i][0], pts[j][1] - pts[i][1]);
  }
  return len;
}

function buildRepeatedLabel(name, perimeter, fontSize) {
  const charW = fontSize * 0.65;
  const sep = '  \u00b7  '; // " · "
  const unit = name + sep;
  const unitW = unit.length * charW;
  const reps = Math.max(1, Math.ceil(perimeter / unitW));
  return unit.repeat(reps);
}

function renderHulls() {
  if (!currentHullClusterIds || !currentNodes) return;
  gHulls.selectAll('.hull').remove();
  gHulls.selectAll('.hull-label').remove();
  svgDefs.selectAll('.hull-path-def').remove();

  for (const cid of currentHullClusterIds) {
    const members = currentNodes.filter(n => n.cluster === cid);
    if (members.length < 3) continue;
    const points = members.map(d => [d.x, d.y]);
    const hull = d3.polygonHull(points);
    if (!hull) continue;
    const expanded = expandHull(hull, 20);
    const color = CLUSTER_COLORS[cid % CLUSTER_COLORS.length];
    const pathD = `M${expanded.join('L')}Z`;
    const pathId = `hull-path-${cid}`;

    // Hull fill + stroke
    gHulls.append('path')
      .attr('class', 'hull')
      .attr('d', pathD)
      .attr('fill', color)
      .attr('stroke', color);

    // Path def for textPath reference
    svgDefs.append('path')
      .attr('class', 'hull-path-def')
      .attr('id', pathId)
      .attr('d', pathD);

    // TextPath boundary label — always created, visibility controlled by applySemanticZoom
    const name = currentClusterNames?.get(cid) || `cluster_${cid}`;
    const perim = hullPerimeter(expanded);
    // Generate enough text for smallest expected font size (max zoom k=12)
    const label = buildRepeatedLabel(name, perim, Math.max(4, 10 / 12));

    const text = gHulls.append('text')
      .attr('class', 'hull-label')
      .datum({ cid })
      .attr('fill', color)
      .attr('fill-opacity', 0)
      .attr('font-size', 10);

    text.append('textPath')
      .attr('href', `#${pathId}`)
      .text(label);

    text.call(clusterLabelDrag(d => currentNodes.filter(n => n.cluster === d.cid)));
  }
  // Also render user clusters on top
  renderUserClusters();
  // Apply current zoom styling to newly created elements
  applySemanticZoom();
}

function renderUserClusters() {
  if (!currentNodes) return;
  const nodeMap = currentGraph?.nodeMap;
  if (!nodeMap) return;

  // Remove previous user cluster hulls (but not labels during drag — they'd be destroyed mid-drag)
  gHulls.selectAll('.user-hull').remove();
  if (!clusterDragActive) gClusterLabels.selectAll('.user-cluster-label').remove();

  for (let i = 0; i < userClusterSections.length; i++) {
    const uc = userClusterSections[i];
    // Pick color based on position after system clusters
    const colorIdx = (currentClusterNames?.size || 0) + i;
    const color = CLUSTER_COLORS[colorIdx % CLUSTER_COLORS.length];
    const members = uc.nodeIds.map(id => nodeMap.get(id)).filter(n => n && n.x != null);
    if (members.length < 3) {
      if (members.length > 0) {
        const cx = members.reduce((s, n) => s + n.x, 0) / members.length;
        const cy = members.reduce((s, n) => s + n.y, 0) / members.length;
        const r = members.length === 1 ? 30 : Math.hypot(members[0].x - members[1].x, members[0].y - members[1].y) / 2 + 25;
        gHulls.append('circle')
          .attr('class', 'user-hull')
          .attr('cx', cx).attr('cy', cy).attr('r', r)
          .attr('fill', color).attr('fill-opacity', 0.08)
          .attr('stroke', color).attr('stroke-opacity', 0.3)
          .attr('stroke-width', 2).attr('stroke-dasharray', '6,3');
        if (!clusterDragActive) {
          gClusterLabels.append('text')
            .datum({ ucIndex: i })
            .attr('class', 'user-cluster-label cluster-label')
            .attr('x', cx).attr('y', cy - r - 8)
            .attr('fill', color)
            .text(uc.name)
            .call(clusterLabelDrag(d => {
              const sec = userClusterSections[d.ucIndex];
              if (!sec || !currentGraph?.nodeMap) return [];
              return sec.nodeIds.map(id => currentGraph.nodeMap.get(id)).filter(n => n && n.x != null);
            }));
        }
      }
      continue;
    }
    const points = members.map(d => [d.x, d.y]);
    const hull = d3.polygonHull(points);
    if (!hull) continue;
    const expanded = expandHull(hull, 25);
    gHulls.append('path')
      .attr('class', 'user-hull')
      .attr('d', `M${expanded.join('L')}Z`)
      .attr('fill', color).attr('fill-opacity', 0.08)
      .attr('stroke', color).attr('stroke-opacity', 0.3)
      .attr('stroke-width', 2).attr('stroke-dasharray', '6,3');
    if (!clusterDragActive) {
      const centroid = d3.polygonCentroid(hull);
      const topY = Math.min(...hull.map(p => p[1]));
      gClusterLabels.append('text')
        .datum({ ucIndex: i })
        .attr('class', 'user-cluster-label cluster-label')
        .attr('x', centroid[0]).attr('y', topY - 12)
        .attr('fill', color)
        .text(uc.name)
        .call(clusterLabelDrag(d => {
          const sec = userClusterSections[d.ucIndex];
          if (!sec || !currentGraph?.nodeMap) return [];
          return sec.nodeIds.map(id => currentGraph.nodeMap.get(id)).filter(n => n && n.x != null);
        }));
    }
  }
}

function renderUserClusterLegend() {
  const legendEl = document.getElementById('legend');
  legendEl.querySelectorAll('.user-cluster-item').forEach(el => el.remove());
  if (userClusterSections.length === 0) return;
  for (let i = 0; i < userClusterSections.length; i++) {
    const uc = userClusterSections[i];
    const colorIdx = (currentClusterNames?.size || 0) + i;
    const color = CLUSTER_COLORS[colorIdx % CLUSTER_COLORS.length];
    const item = document.createElement('div');
    item.className = 'item user-cluster-item';
    item.style.cssText = 'display:flex;align-items:center;gap:8px;margin:4px 0;cursor:pointer';
    const label = document.createElement('span');
    label.style.cssText = 'display:flex;align-items:center;gap:8px;flex:1';
    label.innerHTML = `<div class="dot" style="background:${color};border:1px dashed #888"></div>${uc.name} (${uc.nodeIds.length})`;
    label.addEventListener('click', () => {
      if (currentGraph?.nodeMap) {
        selectedNodes.clear();
        for (const id of uc.nodeIds) selectedNodes.add(id);
        gNodes.selectAll('circle').classed('selected-glow', d => selectedNodes.has(d.id));
      }
    });
    const delBtn = document.createElement('span');
    delBtn.textContent = '\u00d7';
    delBtn.title = 'Delete cluster';
    delBtn.style.cssText = 'color:#666;cursor:pointer;font-size:14px;line-height:1;padding:0 2px';
    delBtn.addEventListener('mouseenter', () => { delBtn.style.color = '#f66'; });
    delBtn.addEventListener('mouseleave', () => { delBtn.style.color = '#666'; });
    delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteUserCluster(uc.name); });
    item.appendChild(label);
    item.appendChild(delBtn);
    legendEl.appendChild(item);
  }
}

let clusterDragActive = false;
let focusedClusterId = null; // cluster being dragged — boosts its meta-edge opacity
function clusterLabelDrag(getMembersFn) {
  return d3.drag()
    .on('start', function(e, d) {
      d._clusterMembers = getMembersFn(d);
      d._clusterGathering = false;
      d._clusterDragged = false;
      clusterDragActive = true;
      focusedClusterId = d.cid ?? null;
      applyMetaLinkFocus();
      // If space is already held, start cluster gather instead of drag
      if (spaceKeyDown && d.cid != null) {
        d._clusterGathering = true;
        startClusterGather(d.cid);
      }
      d3.select(this).style('cursor', 'grabbing');
    })
    .on('drag', function(e, d) {
      d._clusterDragged = true;
      if (!d._clusterMembers || !d._clusterMembers.length) return;
      for (const n of d._clusterMembers) {
        n.x += e.dx;
        n.y += e.dy;
      }
      // Update saved positions so the gather loop's anchor pin tracks the drag
      if (d._clusterGathering || clusterGatherHeld) {
        for (const n of d._clusterMembers) {
          savedPositions.set(n.id, { x: n.x, y: n.y });
        }
      }
      renderPositions();
    })
    .on('end', function(e, d) {
      clusterDragActive = false;
      // Only clear focusedClusterId if user actually dragged (not a click)
      // so that "click cluster label + Space" can trigger cluster gather
      if (d._clusterDragged) {
        focusedClusterId = null;
        applyMetaLinkFocus();
      }
      d3.select(this).style('cursor', null);
      if (d._clusterMembers) {
        for (const n of d._clusterMembers) {
          stickyNodes.add(n.id);
          savedPositions.set(n.id, { x: n.x, y: n.y });
        }
        pushArrangement('cluster-drag', d._clusterMembers.slice(0, 5).map(n => n.id));
        d._clusterMembers = null;
      }
      renderPositions();
    });
}

function applyMetaLinkFocus() {
  for (const d of currentMetaLinks) {
    const grad = svgDefs.select(`#${d.gradId}`);
    if (!grad.node()) continue;
    const involved = focusedClusterId != null &&
      (d.sourceCluster === focusedClusterId || d.targetCluster === focusedClusterId);
    const mult = involved ? 5 : 1;
    const stops = grad.selectAll('stop');
    // Base opacities: [0.7, 0.08, 0.05, 0.08, 0.7]
    const baseOps = [0.7, 0.08, 0.05, 0.08, 0.7];
    stops.each(function(_, i) {
      d3.select(this).attr('stop-opacity', Math.min(1, baseOps[i] * mult));
    });
  }
}

function rebuildClusterMemberCache() {
  clusterMemberCache.clear();
  if (!currentNodes) return;
  for (const n of currentNodes) {
    if (n.cid != null || n.cluster != null) {
      const cid = n.cluster;
      if (!clusterMemberCache.has(cid)) clusterMemberCache.set(cid, []);
      clusterMemberCache.get(cid).push(n);
    }
  }
}

function estimateLabelBBox(text, fontSize) {
  const w = text.length * fontSize * 0.62;
  const h = fontSize * 1.3;
  return { w, h };
}

function computeClusterLabelPlacement() {
  if (!currentNodes || currentNodes.length === 0) return;

  const fontSize = (currentK <= 2 ? 13 / currentK : 13 / (2 * Math.pow(currentK / 2, 0.75)));
  const nudgeStrength = 0.15; // how far to nudge per tick (fraction of force)

  // Collect labels and their current positions
  const labelData = [];
