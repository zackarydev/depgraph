  for (const dn of deepNodes) {
    if (dn.x != null && dn.x !== 0 && dn.y != null && dn.y !== 0) continue;
    // Already placed by arg/param logic — check if it has meaningful coordinates
    const neighbors = edgeNeighbors.get(dn.id) || [];
    let parentNode = null;
    for (const nid of neighbors) {
      const nn = nodeMap.get(nid);
      if (nn && nn.x != null) { parentNode = nn; break; }
    }
    if (parentNode) {
      const angle = Math.random() * Math.PI * 2;
      const r = (parentNode.radius || 4) + 4 + Math.random() * 6;
      dn.x = parentNode.x + Math.cos(angle) * r;
      dn.y = parentNode.y + Math.sin(angle) * r;
    } else {
      dn.x = (Math.random() - 0.5) * 10;
      dn.y = (Math.random() - 0.5) * 10;
    }
    dn.vx = 0;
    dn.vy = 0;
  }
}

function packClusters(clusterBounds, links, nodeMap, clusterGroups) {
  const clusters = [...clusterBounds.entries()].map(([cid, info]) => ({
    cid, radius: info.radius, x: 0, y: 0,
  }));

  if (clusters.length <= 1) {
    if (clusters.length === 1) clusterBounds.get(clusters[0].cid).cx = 0;
    return;
  }

  // Sort by size descending
  clusters.sort((a, b) => b.radius - a.radius);

  // Compute inter-cluster link weights (which clusters should be near each other)
  const clusterLinkWeights = new Map();
  for (const l of links) {
    const sNode = nodeMap.get(l.source);
    const tNode = nodeMap.get(l.target);
    if (!sNode || !tNode || sNode.cluster === tNode.cluster) continue;
    const key = [sNode.cluster, tNode.cluster].sort().join(',');
    clusterLinkWeights.set(key, (clusterLinkWeights.get(key) || 0) + (l.weight || 1));
  }

  // Golden angle spiral initial placement
  const goldenAngle = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < clusters.length; i++) {
    const angle = i * goldenAngle;
    const r = clusters[0].radius + clusters[i].radius + i * 25;
    clusters[i].x = Math.cos(angle) * r;
    clusters[i].y = Math.sin(angle) * r;
  }

  // Iterative: overlap resolution + inter-cluster link attraction + center pull
  for (let iter = 0; iter < CLUSTER_PACK_ITERS; iter++) {
    const alpha = 1 - iter / CLUSTER_PACK_ITERS;

    // Overlap resolution (hard constraint)
    for (let i = 0; i < clusters.length; i++) {
      for (let j = i + 1; j < clusters.length; j++) {
        const a = clusters[i], b = clusters[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
        const minDist = a.radius + b.radius + CLUSTER_GAP;
        if (dist < minDist) {
          const push = (minDist - dist) * 0.5;
          const nx = (dx / dist) * push;
          const ny = (dy / dist) * push;
          a.x -= nx; a.y -= ny;
          b.x += nx; b.y += ny;
        }
      }
    }

    // Inter-cluster link attraction
    for (const [key, weight] of clusterLinkWeights) {
      const [cidA, cidB] = key.split(',').map(Number);
      const ca = clusters.find(c => c.cid === cidA);
      const cb = clusters.find(c => c.cid === cidB);
      if (!ca || !cb) continue;
      const dx = cb.x - ca.x, dy = cb.y - ca.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const targetDist = ca.radius + cb.radius + CLUSTER_GAP + 10;
      if (dist > targetDist) {
        const pull = Math.min(weight * 0.02, 3) * alpha;
        ca.x += (dx / dist) * pull;
        ca.y += (dy / dist) * pull;
        cb.x -= (dx / dist) * pull;
        cb.y -= (dy / dist) * pull;
      }
    }

    // Center attraction
    for (const c of clusters) {
      c.x *= 0.997;
      c.y *= 0.997;
    }
  }

  // Store results
  for (const c of clusters) {
    const b = clusterBounds.get(c.cid);
    b.cx = c.x;
    b.cy = c.y;
  }
}

function warmRestart(nodes, links) {
  const newNodes = [];
  for (const n of nodes) {
    if (savedPositions.has(n.id)) {
      const p = savedPositions.get(n.id);
      n.x = p.x;
      n.y = p.y;
    } else {
      newNodes.push(n);
    }
  }

  if (newNodes.length === 0) return;

  // Compute cluster centers for placement and tethering
  const clusterCenter = new Map();
  const clusterCounts = new Map();
  for (const n of nodes) {
    if (n.cluster == null || newNodes.includes(n)) continue;
    if (n.x == null) continue;
    const c = n.cluster;
    if (!clusterCenter.has(c)) { clusterCenter.set(c, { x: 0, y: 0 }); clusterCounts.set(c, 0); }
    clusterCenter.get(c).x += n.x;
    clusterCenter.get(c).y += n.y;
    clusterCounts.set(c, clusterCounts.get(c) + 1);
  }
  for (const [c, center] of clusterCenter) {
    const cnt = clusterCounts.get(c);
    center.x /= cnt;
    center.y /= cnt;
  }

  // Place new nodes near their cluster center
  for (const n of newNodes) {
    const center = clusterCenter.get(n.cluster);
    if (center) {
      const angle = Math.random() * 2 * Math.PI;
      const r = 10 + Math.random() * 20;
      n.x = center.x + Math.cos(angle) * r;
      n.y = center.y + Math.sin(angle) * r;
    } else {
      // No existing cluster members — find overall center of all placed nodes
      let ox = 0, oy = 0, cnt = 0;
      for (const m of nodes) {
        if (m.x != null && !newNodes.includes(m)) { ox += m.x; oy += m.y; cnt++; }
      }
      if (cnt > 0) { ox /= cnt; oy /= cnt; }
      const angle = Math.random() * 2 * Math.PI;
      const r = 80 + Math.random() * 60;
      n.x = ox + Math.cos(angle) * r;
      n.y = oy + Math.sin(angle) * r;
    }
  }

  // Collision resolution with cluster tethering to prevent drift
  const newNodeSet = new Set(newNodes);
  for (let iter = 0; iter < 30; iter++) {
    // Collision pushes
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        if (a.x == null || b.x == null) continue;
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
        const minDist = (a.radius || 4) + (b.radius || 4) + 6;
        if (dist < minDist) {
          const push = (minDist - dist) * 0.3;
          const nx = (dx / dist) * push;
          const ny = (dy / dist) * push;
          if (newNodeSet.has(a) && newNodeSet.has(b)) {
            a.x -= nx; a.y -= ny;
            b.x += nx; b.y += ny;
          } else if (newNodeSet.has(a)) {
            a.x -= nx * 2; a.y -= ny * 2;
          } else if (newNodeSet.has(b)) {
            b.x += nx * 2; b.y += ny * 2;
          }
        }
      }
    }
    // Pull new nodes back toward their cluster center to counteract drift
    for (const n of newNodes) {
      const center = clusterCenter.get(n.cluster);
      if (!center) continue;
      const dx = center.x - n.x, dy = center.y - n.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 30) {
        const pull = 0.1;
        n.x += dx * pull;
        n.y += dy * pull;
      }
    }
  }
}

// ═══════════════════════════════════════════════════════
// GRAPH PHYSICS — Unified force-directed layout engine
// ═══════════════════════════════════════════════════════
//
// Operates directly on currentNodes objects (reading/writing .x, .y).
// Stores physics state (.vx, .vy, .mass) on the same node objects.
// Shares rendering with the main graph — no separate SVG layer.

const GraphPhysics = (function () {
  // ── Constants ────────────────────────────────────
  const DAMPING = 0.7;
  const MAX_VELOCITY = 8;
  const MASS_GROWTH = 0.02;
  const MAX_MASS = 5.0;
  const INITIAL_MASS = 0.3;

  const REPULSION_K = 800;
  const REPULSION_MAX_DIST = 200;

  const ATTRACT_K = 0.015;
  const ATTRACT_REST = 20;

  // Plan 2 Option E: user DISTANCE rows become springs with per-pair rest
  // lengths. Slightly stronger than structural edge attraction so that user
  // intent wins over the algorithmic layout when they conflict, but not so
  // strong that over-constrained nodes oscillate.
  const USER_DISTANCE_K = 0.025;

  const CLUSTER_PULL = 0.004;
  const CENTER_GRAVITY = 0.0005;

  const COLLISION_PAD = 6;

  // ── Spatial grid for O(n) repulsion + collision ──
  const GRID_CELL = REPULSION_MAX_DIST; // one cell = repulsion range
  let _gridMap = null;   // Map<cellKey, number[]> — indices into nodes array
  let _gridNodes = null; // reference to the nodes array used to build the grid

  function _cellKey(cx, cy) { return cx * 100003 + cy; }

  function _buildGrid(nodes) {
    const map = new Map();
    for (let i = 0; i < nodes.length; i++) {
      const nd = nodes[i];
      const cx = Math.floor(nd.x / GRID_CELL);
      const cy = Math.floor(nd.y / GRID_CELL);
      const key = _cellKey(cx, cy);
      let bucket = map.get(key);
      if (!bucket) { bucket = []; map.set(key, bucket); }
      bucket.push(i);
    }
    _gridMap = map;
    _gridNodes = nodes;
  }

  // Iterate all node indices within `range` of (x, y).
  // Calls cb(index) for each candidate. Caller does final distance check.
  function _gridNeighbors(x, y, range, cb) {
    const r = Math.ceil(range / GRID_CELL);
    const cx0 = Math.floor(x / GRID_CELL);
    const cy0 = Math.floor(y / GRID_CELL);
    for (let dx = -r; dx <= r; dx++) {
      for (let dy = -r; dy <= r; dy++) {
        const bucket = _gridMap.get(_cellKey(cx0 + dx, cy0 + dy));
        if (bucket) for (let k = 0; k < bucket.length; k++) cb(bucket[k]);
      }
    }
  }

  const EDGE_TYPE_MULT = {
    calls: 3.0, calledBy: 3.0,
    shared: 1.5, sharedWrites: 2.0,
    importance: 1.0, uses: 1.0, writesTo: 1.5,
  };

  const SETTLED_KE = 0.3;
  const SETTLED_FRAMES_NEEDED = 90;

  // ── State ────────────────────────────────────────
  let running = false;
  let rafId = null;
  let lastTime = 0;
  let streamEnded = false;
  let onSettled = null;
  let settledFrames = 0;
  let hullFrameCounter = 0;
  const HULL_EVERY_N_FRAMES = 4;

  // ── Cluster centroids (maintained incrementally) ──
  let clusterCentroids = new Map(); // clusterName → { sx, sy, count }

  function rebuildCentroids() {
    clusterCentroids.clear();
    if (!currentNodes) return;
    for (const n of currentNodes) {
      // Skip invisible nodes so centroids reflect visible cluster center
      if (n.minZoom && currentK < n.minZoom) continue;
      if (_hiddenNodes.has(n.id)) continue;
      const name = n.clusterName;
      if (!name) continue;
      if (!clusterCentroids.has(name)) clusterCentroids.set(name, { sx: 0, sy: 0, count: 0 });
      const c = clusterCentroids.get(name);
      c.sx += n.x || 0;
      c.sy += n.y || 0;
      c.count++;
    }
  }

  // ── Placement logic for new streaming nodes ──────
  function placeNewNode(node) {
    let px = 0, py = 0;
    let placed = false;

    // Deep nodes (arg/param): position along caller→callee edge vector
    if (node.type === 'argument' || node.type === 'parameter') {
      const positioned = placeDeepNodeOnEdge(node);
      if (positioned) {
        node.vx = 0; node.vy = 0;
        node.mass = INITIAL_MASS;
        return;
      }
    }

    // Try near connected neighbors
    if (currentGraph && currentGraph.adjacency) {
      const nbrs = currentGraph.adjacency.get(node.id);
      if (nbrs && nbrs.size > 0) {
        let sx = 0, sy = 0, cnt = 0;
        for (const nid of nbrs) {
          const n = currentGraph.nodeMap.get(nid);
          if (n && n.x != null) { sx += n.x; sy += n.y; cnt++; }
        }
        if (cnt > 0) { px = sx / cnt; py = sy / cnt; placed = true; }
      }
    }

    // Try near cluster centroid
    if (!placed && node.clusterName && clusterCentroids.has(node.clusterName)) {
      const c = clusterCentroids.get(node.clusterName);
      if (c.count > 0) { px = c.sx / c.count; py = c.sy / c.count; placed = true; }
    }

    // Jitter
    const angle = Math.random() * Math.PI * 2;
    const jitter = 15 + Math.random() * 25;
    node.x = px + Math.cos(angle) * jitter;
    node.y = py + Math.sin(angle) * jitter;
    node.vx = 0;
    node.vy = 0;
    node.mass = INITIAL_MASS;
  }

  // Place an argument or parameter node along the caller→callee edge.
  // Returns true if positioned successfully.
  function placeDeepNodeOnEdge(node) {
    const nm = currentGraph?.nodeMap;
    if (!nm) return false;

    let callerNode = null, calleeNode = null;
    let t = 0.5;

    if (node.type === 'argument') {
      // ID: "caller>callee@line:index"
      const match = node.id.match(/^([^>]+)>([^@]+)@\d+:(\d+)$/);
      if (!match) return false;
      callerNode = nm.get(match[1]);
      calleeNode = nm.get(match[2]);
      const idx = parseInt(match[3]);
      t = 0.25 + idx * 0.03;
    } else if (node.type === 'parameter') {
      // ID: "funcName:paramName"
      const colonIdx = node.id.indexOf(':');
      if (colonIdx < 0) return false;
      const funcName = node.id.substring(0, colonIdx);
      calleeNode = nm.get(funcName);
      // Find any caller that calls this function via 'calls' edges
      for (const link of currentLinks) {
        if (link.type === 'calls' && link.target === funcName) {
          callerNode = nm.get(link.source);
          if (callerNode) break;
        }
      }
      t = 0.75;
    }

    if (!callerNode || !calleeNode || callerNode.x == null || calleeNode.x == null) return false;

    const dx = calleeNode.x - callerNode.x;
    const dy = calleeNode.y - callerNode.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const px = -dy / dist, py = dx / dist;
    const matchIdx = node.id.match(/:(\d+)$/);
    const idx = matchIdx ? parseInt(matchIdx[1]) : 0;
    const perpOffset = (idx - 0.5) * 4;
    node.x = callerNode.x + dx * t + px * perpOffset;
    node.y = callerNode.y + dy * t + py * perpOffset;
    return true;
  }

  // ── Force tick ───────────────────────────────────

  function tick(now) {
    if (!running) return;
    rafId = requestAnimationFrame(tick);

    const rawDt = (now - lastTime) / 16.67;
    const dt = Math.min(rawDt, 2.0);
    lastTime = now;

    if (!currentNodes || currentNodes.length === 0) return;
    const nodes = currentNodes;
    const n = nodes.length;

    // Skip physics for nodes being dragged or locked
    const isDragged = new Set();
    if (forcePressDragNode) isDragged.add(forcePressDragNode.id);

    // Grow mass (inertia)
    for (let i = 0; i < n; i++) {
      const nd = nodes[i];
      if (nd.mass == null) nd.mass = INITIAL_MASS;
      nd.mass = Math.min(MAX_MASS, nd.mass + MASS_GROWTH * dt);
    }

    // Adaptive scaling
    const nScale = 1 / Math.max(1, Math.sqrt(n / 20));

    // ── 1. Repulsion (spatial-grid accelerated) ─────
    _buildGrid(nodes);
    const repMaxSq = REPULSION_MAX_DIST * REPULSION_MAX_DIST;

    for (let i = 0; i < n; i++) {
      const a = nodes[i];
      const aFixed = isDragged.has(a.id) || lockedNodes.has(a.id);
      if (a.minZoom && currentK < a.minZoom) continue;
      if (_hiddenNodes.has(a.id)) continue;
      const ax = a.x, ay = a.y;
      const am = a.mass || 1;

      _gridNeighbors(ax, ay, REPULSION_MAX_DIST, (j) => {
        if (j <= i) return; // only process each pair once (j > i)
        const b = nodes[j];
        if (b.minZoom && currentK < b.minZoom) return;
        if (_hiddenNodes.has(b.id)) return;
        const dx = b.x - ax;
        const dy = b.y - ay;
        const distSq = dx * dx + dy * dy;
        if (distSq > repMaxSq) return;

        const dist = Math.sqrt(distSq) || 0.01;
        const F = REPULSION_K * nScale / (distSq + 10);
        const fx = (dx / dist) * F * dt;
        const fy = (dy / dist) * F * dt;
        const bm = b.mass || 1;

        if (!aFixed) {
          a.vx = (a.vx || 0) - fx / am;
          a.vy = (a.vy || 0) - fy / am;
        }
        if (!isDragged.has(b.id) && !lockedNodes.has(b.id)) {
          b.vx = (b.vx || 0) + fx / bm;
          b.vy = (b.vy || 0) + fy / bm;
        }
      });
    }

    // ── 2. Edge attraction ──────────────────────────
    if (currentLinks) {
      for (const e of currentLinks) {
        const a = currentGraph.nodeMap.get(e.source);
        const b = currentGraph.nodeMap.get(e.target);
        if (!a || !b) continue;
        // Skip forces for edges where either node is invisible (below minZoom)
        if ((a.minZoom && currentK < a.minZoom) || (b.minZoom && currentK < b.minZoom)) continue;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
        const rest = (a.radius || 4) + (b.radius || 4) + ATTRACT_REST;
        const displacement = dist - rest;
        const typeMult = EDGE_TYPE_MULT[e.type] || 1;
        const w = Math.min(3, (e.weight || 1) * typeMult);
        const F = ATTRACT_K * w * displacement * dt;
        const fx = (dx / dist) * F;
        const fy = (dy / dist) * F;
        const am = a.mass || 1;
        const bm = b.mass || 1;

        if (!isDragged.has(a.id) && !lockedNodes.has(a.id)) {
          a.vx = (a.vx || 0) + fx / am;
          a.vy = (a.vy || 0) + fy / am;
        }
        if (!isDragged.has(b.id) && !lockedNodes.has(b.id)) {
          b.vx = (b.vx || 0) - fx / bm;
          b.vy = (b.vy || 0) - fy / bm;
        }
      }
    }

    // ── 2b. User-authored distance springs (Plan 2 Option E) ─
    // Iterate the user-distances module's stored rest-lengths via its
    // zero-allocation callback. Rest-lengths are raw Euclidean center-to-
    // center distances, so no radius adjustment is applied here.
    if (useUserDistances && userDistancesModule.edgeCount() > 0 && currentGraph) {
      const nm = currentGraph.nodeMap;
      userDistancesModule.forEachEdge((aId, bId, rest) => {
        const a = nm.get(aId);
        const b = nm.get(bId);
        if (!a || !b) return;
        if ((a.minZoom && currentK < a.minZoom) || (b.minZoom && currentK < b.minZoom)) return;
        if (_hiddenNodes.has(a.id) || _hiddenNodes.has(b.id)) return;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const curr = Math.sqrt(dx * dx + dy * dy) || 0.01;
        const displacement = curr - rest;
        const F = USER_DISTANCE_K * displacement * dt;
        const fx = (dx / curr) * F;
        const fy = (dy / curr) * F;
        const am = a.mass || 1;
        const bm = b.mass || 1;
        if (!isDragged.has(a.id) && !lockedNodes.has(a.id)) {
          a.vx = (a.vx || 0) + fx / am;
          a.vy = (a.vy || 0) + fy / am;
        }
        if (!isDragged.has(b.id) && !lockedNodes.has(b.id)) {
          b.vx = (b.vx || 0) - fx / bm;
          b.vy = (b.vy || 0) - fy / bm;
        }
      });
    }

    // ── 3. Cluster drift ────────────────────────────
    for (let i = 0; i < n; i++) {
      const nd = nodes[i];
      if (isDragged.has(nd.id) || lockedNodes.has(nd.id)) continue;
      if (nd.minZoom && currentK < nd.minZoom) continue;
      const name = nd.clusterName;
      if (!name) continue;
      const c = clusterCentroids.get(name);
      if (!c || c.count <= 1) continue;
      const cx = c.sx / c.count;
      const cy = c.sy / c.count;
      const dx = cx - nd.x;
      const dy = cy - nd.y;
      const m = nd.mass || 1;
      nd.vx = (nd.vx || 0) + (dx * CLUSTER_PULL * dt) / m;
      nd.vy = (nd.vy || 0) + (dy * CLUSTER_PULL * dt) / m;
    }

    // ── 4. Center gravity ───────────────────────────
    for (let i = 0; i < n; i++) {
      const nd = nodes[i];
      if (isDragged.has(nd.id) || lockedNodes.has(nd.id)) continue;
      if (nd.minZoom && currentK < nd.minZoom) continue;
      nd.vx = (nd.vx || 0) - nd.x * CENTER_GRAVITY * dt;
      nd.vy = (nd.vy || 0) - nd.y * CENTER_GRAVITY * dt;
    }

    // ── 5. Damping + velocity integration ───────────
    let totalKE = 0;
    for (let i = 0; i < n; i++) {
      const nd = nodes[i];
      if (isDragged.has(nd.id) || lockedNodes.has(nd.id)) continue;
      nd.vx = (nd.vx || 0) * DAMPING;
      nd.vy = (nd.vy || 0) * DAMPING;
      const speed = Math.sqrt(nd.vx * nd.vx + nd.vy * nd.vy);
      if (speed > MAX_VELOCITY) {
        nd.vx = (nd.vx / speed) * MAX_VELOCITY;
        nd.vy = (nd.vy / speed) * MAX_VELOCITY;
      }
      nd.x += nd.vx * dt;
      nd.y += nd.vy * dt;
      totalKE += nd.vx * nd.vx + nd.vy * nd.vy;
    }

    // ── 6. Hard collision (spatial-grid accelerated) ─
    // Rebuild grid after velocity integration moved nodes
    _buildGrid(nodes);
    const MAX_COLLIDE_RANGE = 30; // max possible (radius+radius+pad)

    for (let i = 0; i < n; i++) {
      const a = nodes[i];
      const aFixed = isDragged.has(a.id) || lockedNodes.has(a.id);

      _gridNeighbors(a.x, a.y, MAX_COLLIDE_RANGE, (j) => {
        if (j <= i) return;
        const b = nodes[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
        const minDist = (a.radius || 4) + (b.radius || 4) + COLLISION_PAD;
        if (dist >= minDist) return;

        const overlap = minDist - dist;
        const nx = dx / dist, ny = dy / dist;
        const am = a.mass || 1, bm = b.mass || 1;
        const totalM = am + bm;

        const bFixed = isDragged.has(b.id) || lockedNodes.has(b.id);

        if (!aFixed && !bFixed) {
          a.x -= nx * overlap * (bm / totalM);
          a.y -= ny * overlap * (bm / totalM);
          b.x += nx * overlap * (am / totalM);
          b.y += ny * overlap * (am / totalM);
        } else if (!aFixed) {
          a.x -= nx * overlap;
          a.y -= ny * overlap;
        } else if (!bFixed) {
          b.x += nx * overlap;
          b.y += ny * overlap;
        }

        // Kill approach velocity
        const dvx = (b.vx || 0) - (a.vx || 0);
        const dvy = (b.vy || 0) - (a.vy || 0);
        const approach = dvx * nx + dvy * ny;
        if (approach < 0) {
          if (!aFixed) {
            a.vx = (a.vx || 0) + nx * approach * (bm / totalM);
            a.vy = (a.vy || 0) + ny * approach * (bm / totalM);
          }
          if (!bFixed) {
            b.vx = (b.vx || 0) - nx * approach * (am / totalM);
            b.vy = (b.vy || 0) - ny * approach * (am / totalM);
          }
        }
      });
    }

    // ── 7. Rebuild centroids ────────────────────────
    rebuildCentroids();

    // ── 8. Render using main graph's renderer ───────
    renderPositions();

    // Hulls + cluster labels (throttled during physics)
    hullFrameCounter++;
    if (hullFrameCounter >= HULL_EVERY_N_FRAMES) {
      hullFrameCounter = 0;
      renderHulls();
      renderClusterLabels();
    }

    // ── 9. Settle detection ─────────────────────────
    if (streamEnded) {
      if (totalKE < SETTLED_KE * n) {
        settledFrames++;
        if (settledFrames >= SETTLED_FRAMES_NEEDED) {
          settledFrames = 0;
          streamEnded = false;
          stop();
          if (onSettled) {
            const cb = onSettled;
            onSettled = null;
            cb();
          }
        }
      } else {
        settledFrames = 0;
      }
    }
  }

  // ── Public API ───────────────────────────────────

  function start() {
    if (running) return;
    running = true;
    lastTime = performance.now();
    hullFrameCounter = 0;
    rebuildCentroids();
    rafId = requestAnimationFrame(tick);
  }

  function stop() {
    running = false;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  }

  function endStream(callback) {
    streamEnded = true;
    settledFrames = 0;
    onSettled = callback;
  }

  function isRunning() { return running; }

  return { start, stop, endStream, isRunning, placeNewNode, rebuildCentroids };
})();

// ═══════════════════════════════════════════════════════
// STREAM PLACEMENT — positions new nodes without physics
// ═══════════════════════════════════════════════════════
// Decoupled from GraphPhysics. No forces, no weights, no velocity.
// New nodes with an edge to an existing node are placed near that node.
// New nodes with no edges yet go to the outskirts of the current graph.
// Edges are added to the data model only — no positional side-effects.

const StreamPlacement = (function () {
  let rafId = null;
  let hullCounter = 0;

  function graphBounds() {
    if (!currentNodes || currentNodes.length === 0) return { cx: 0, cy: 0, r: 200 };
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const n of currentNodes) {
      if (n.x < minX) minX = n.x;
      if (n.x > maxX) maxX = n.x;
      if (n.y < minY) minY = n.y;
      if (n.y > maxY) maxY = n.y;
    }
    const cx = (minX + maxX) / 2;
    const cy = (minY + maxY) / 2;
    const r = Math.max(80, Math.sqrt((maxX - minX) ** 2 + (maxY - minY) ** 2) / 2);
    return { cx, cy, r };
  }

  // Place a new node. If it has a connected neighbor already in the graph,
  // position near that neighbor. Otherwise, place on the outskirts.
  function placeNode(node) {
    // Check for a connected neighbor already in the graph
    const adj = currentGraph?.adjacency?.get(node.id);
    if (adj && adj.size > 0) {
      let sx = 0, sy = 0, cnt = 0;
      for (const nid of adj) {
        const n = currentGraph.nodeMap.get(nid);
        if (n && n.x != null) { sx += n.x; sy += n.y; cnt++; }
      }
      if (cnt > 0) {
        const angle = Math.random() * Math.PI * 2;
        const jitter = 12 + Math.random() * 18;
        node.x = sx / cnt + Math.cos(angle) * jitter;
        node.y = sy / cnt + Math.sin(angle) * jitter;
        node.vx = 0; node.vy = 0;
        return;
      }
    }

    // No neighbor — place on the outskirts
    const { cx, cy, r } = graphBounds();
    const angle = Math.random() * Math.PI * 2;
    const dist = r + 30 + Math.random() * 40;
    node.x = cx + Math.cos(angle) * dist;
    node.y = cy + Math.sin(angle) * dist;
    node.vx = 0; node.vy = 0;
  }

  // Called when an edge is added that connects to a node placed on the outskirts.
  // If the node was orphaned and now has a neighbor, reposition it.
  function repositionIfOrphaned(nodeName) {
    const node = currentGraph?.nodeMap?.get(nodeName);
    if (!node) return;
    // Only reposition nodes that were added during this stream session
    if (!node._streamAdded) return;
    // If the node already had edges when placed, don't move it
    if (node._hadEdgesOnPlace) return;

    const adj = currentGraph.adjacency.get(nodeName);
    if (!adj || adj.size === 0) return;

    // Find the first neighbor with a position
    for (const nid of adj) {
      const n = currentGraph.nodeMap.get(nid);
      if (n && n.x != null) {
        const angle = Math.random() * Math.PI * 2;
        const jitter = 12 + Math.random() * 18;
        node.x = n.x + Math.cos(angle) * jitter;
        node.y = n.y + Math.sin(angle) * jitter;
        node._hadEdgesOnPlace = true;
        return;
      }
    }
  }

  function renderLoop() {
    rafId = requestAnimationFrame(renderLoop);
    // renderPositions already calls renderHulls + renderClusterLabels
    renderPositions();
  }

  function begin() {
    if (rafId) return;
    hullCounter = 0;
    rafId = requestAnimationFrame(renderLoop);
  }

  function end(callback) {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    // No settle needed — positions are final. Call back immediately.
    if (callback) callback();
  }

  return { placeNode, repositionIfOrphaned, begin, end };
})();

// ═══════════════════════════════════════════════════════
// ANIMATION
// ═══════════════════════════════════════════════════════
function animateToPositions(targetPositions, duration = 300) {
  if (animationRAF) cancelAnimationFrame(animationRAF);
  if (!currentNodes) return;

  const startPositions = new Map();
  for (const n of currentNodes) {
    startPositions.set(n.id, { x: n.x, y: n.y });
  }

  const startTime = performance.now();
  function step(now) {
    const t = Math.min(1, (now - startTime) / duration);
    const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; // ease-in-out

    for (const n of currentNodes) {
      const from = startPositions.get(n.id);
      const to = targetPositions.get(n.id);
      if (from && to) {
        n.x = from.x + (to.x - from.x) * ease;
        n.y = from.y + (to.y - from.y) * ease;
      }
    }
    renderPositions();
    if (t < 1) {
      animationRAF = requestAnimationFrame(step);
    } else {
      animationRAF = null;
      // Save final positions
      for (const n of currentNodes) {
        if (n.x != null) savedPositions.set(n.id, { x: n.x, y: n.y });
      }
    }
  }
  animationRAF = requestAnimationFrame(step);
}

// ═══════════════════════════════════════════════════════
// SVG INIT & RENDERING
// ═══════════════════════════════════════════════════════
function initSVG() {
  svg = d3.select('#graph');
  width = window.innerWidth;
  height = window.innerHeight - 44;
  svg.attr('width', width).attr('height', height);

  svgDefs = svg.append('defs');

  gHulls = svg.append('g').attr('class', 'hulls');
  gMetaLinks = svg.append('g').attr('class', 'meta-links');
  gLinks = svg.append('g').attr('class', 'links');
  gNodes = svg.append('g').attr('class', 'nodes');
  gLabels = svg.append('g').attr('class', 'labels');
  gClusterLabels = svg.append('g').attr('class', 'cluster-labels');

  _zoomBehavior = d3.zoom()
    .scaleExtent([0.1, 12])
    .on('zoom', e => {
      gHulls.attr('transform', e.transform);
      gMetaLinks.attr('transform', e.transform);
      gLinks.attr('transform', e.transform);
      gNodes.attr('transform', e.transform);
      gLabels.attr('transform', e.transform);
      gClusterLabels.attr('transform', e.transform);
      currentK = e.transform.k;
      applySemanticZoom();
    });
  svg.call(_zoomBehavior);
  svg.call(_zoomBehavior.transform, d3.zoomIdentity.translate(width / 2, height / 2).scale(0.8));
}

function expandHull(hull, pad) {
  let cx = 0, cy = 0;
  for (const [x, y] of hull) { cx += x; cy += y; }
  cx /= hull.length; cy /= hull.length;
  return hull.map(([x, y]) => {
    const dx = x - cx, dy = y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    return [x + (dx / dist) * pad, y + (dy / dist) * pad];
  });
}

function applySemanticZoom() {
  const k = currentK;

  // ── Zoom breakpoints: auto-adjust edge layer opacities ──
  if (zoomBreakpointsEnabled) {
    let layerChanged = false;
    for (const layer of EDGE_LAYERS) {
      const target = getZoomBreakpointOpacity(layer.id);
      if (target == null) continue;
      const current = pullLayerState.get(layer.id) || 0;
      if (Math.abs(current - target) > 0.01) {
        pullLayerState.set(layer.id, target);
        layerChanged = true;
      }
    }
    if (layerChanged) {
      syncPullLayerSliders();
      applyNodeHiding();
    }
    // Update breakpoint name in zoom debug and sync dropdown
    const bpName = getActiveBreakpointName();
    if (bpName !== _lastBreakpointName) {
      _lastBreakpointName = bpName;
      const levelSelect = document.getElementById('zoom-level');
      if (levelSelect) levelSelect.value = bpName.toLowerCase();
    }
    document.getElementById('zoom-debug').textContent = `zoom: ${k.toFixed(2)} [${bpName}]`;
  } else {
    document.getElementById('zoom-debug').textContent = `zoom: ${k.toFixed(2)}`;
  }

  gLabels.selectAll('text').each(function(d) {
    const el = d3.select(this);
    const r = d.radius || 4;
    const screenRadius = r * k;
    if (screenRadius < 8) { el.attr('opacity', 0); return; }
    const opacity = Math.min(1, (screenRadius - 8) / 10);
    const maxFontForWidth = (r * 1.8) / Math.max(1, d.id.length * 0.55);
    const maxFontForHeight = r * 0.9;
    let fontSize = Math.max(2, Math.min(maxFontForWidth, maxFontForHeight));
    // Shrink labels when deeply zoomed in (k >= 10) so they don't dominate
    if (k >= 10) fontSize *= 5 / k;
    // Deep nodes: override opacity based on zoom threshold
    const deepOp = d.minZoom ? Math.max(0, Math.min(1, (k - d.minZoom) / 2)) : 1;
    el.attr('opacity', opacity * deepOp)
      .attr('font-size', fontSize)
      .attr('dominant-baseline', 'central')
      .attr('dy', 0)
      .attr('fill', '#fff');
  });

  // Deep nodes (value, parameter, property): fade in at high zoom
  gNodes.selectAll('.node').each(function(d) {
    if (!d.minZoom) return;
    const deepOp = Math.max(0, Math.min(1, (k - d.minZoom) / 2));
    d3.select(this).select('circle').attr('opacity', deepOp);
    d3.select(this).style('pointer-events', deepOp > 0.1 ? 'all' : 'none');
  });

  // Floating cluster labels: fade out as textPath labels fade in (k 2.5→3.5)
  const showClusterLabels = document.getElementById('show-cluster-labels').checked;
  const floatingLabelOpacity = !showClusterLabels ? 0
    : k < 0.7 ? 0.4 : k < 2.5 ? 0.7 : Math.max(0.2, 0.7 - (k - 2.5) * 0.7);
  // Font stays constant on screen up to k=2, then shrinks very gently
  const clusterFontSize = k <= 2 ? 13 / k : 13 / (2 * Math.pow(k / 2, 0.75));
  gClusterLabels.selectAll('text').each(function(d) {
    const imp = d && d.cid != null ? getClusterImportance(d.cid) : 1;
    d3.select(this).attr('font-size', clusterFontSize).attr('opacity', floatingLabelOpacity * imp);
  });

  // TextPath boundary labels: fade in from k=3, full at k=4
  const showBoundaryLabels = document.getElementById('show-boundary-labels').checked;
  const textPathOpacity = !showBoundaryLabels ? 0
    : Math.min(0.45, Math.max(0, (k - 3) * 0.45));
  const hullFontSize = Math.max(1.5, Math.min(5, 4 / k));
  gHulls.selectAll('.hull-label')
    .attr('fill-opacity', textPathOpacity)
    .attr('font-size', hullFontSize);

  // Recompute label placement on zoom (font size changes bbox)
  if (showClusterLabels && clusterMemberCache.size > 0) {
    if (labelPlacementTimer) clearTimeout(labelPlacementTimer);
    labelPlacementTimer = setTimeout(() => {
      computeClusterLabelPlacement();
    }, 150);
  }

  const showEdges = document.getElementById('show-edges').checked;
  const showMetaEdges = document.getElementById('show-meta-edges').checked;
  const zoomedIn = k > 3.5;
  const metaZoom = k < 1.5; // zoomed out enough for meta-edges

  // ── Meta-edges vs individual edges ──
  if (metaZoom && showMetaEdges) {
    gMetaLinks.style('display', null);
    const metaOpacity = k < 0.3 ? 0.25 : k < 0.7 ? 0.45 : 0.6;
    gMetaLinks.attr('opacity', metaOpacity);
  } else {
    gMetaLinks.style('display', 'none');
  }

  // Individual edges: only show when Edges checkbox is on
  if (showEdges) {
    gLinks.selectAll('.link').style('display', null);
    gLinks.selectAll('.arrow').style('display', null);
    gLinks.attr('opacity', 1);
    // Recompute per-edge opacity (proximity depends on zoom)
    if (currentGraph) {
      const nd = currentGraph.nodeDegree;
      gLinks.selectAll('.link').attr('stroke-opacity', l => edgeOpacity(l, nd));
      gLinks.selectAll('.arrow').attr('fill-opacity', l => edgeOpacity(l, nd));
    }
  } else {
    const traceShowEdges = document.getElementById('trace-show-edges').checked && (tKeyHeld || traceHeld);
    if (traceShowEdges) {
      // Hide non-traced edges, show traced ones
      gLinks.selectAll('.link').each(function() {
        const el = d3.select(this);
        el.style('display', el.classed('trace-active') ? null : 'none');
      });
      gLinks.selectAll('.arrow').each(function() {
        const el = d3.select(this);
        const link = el.datum();
        // Show arrow if its edge is trace-active
        const edgeActive = gLinks.selectAll('.link').filter(function(ld) {
          return ld.source === link.source && ld.target === link.target && ld.type === link.type;
        }).classed('trace-active');
        el.style('display', edgeActive ? null : 'none');
      });
    } else {
      gLinks.selectAll('.link').style('display', 'none');
      gLinks.selectAll('.arrow').style('display', 'none');
    }
  }

  const hullOpacity = k < 0.5 ? 0.15 : k < 1.5 ? 0.08 : 0.04;
  gHulls.selectAll('.hull').attr('fill-opacity', hullOpacity);

  // Rebuild hulls when crossing deep-node visibility threshold (minZoom=10)
  // so hull boundaries exclude/include deep nodes correctly
  const deepVisible = k >= 10;
  if (deepVisible !== applySemanticZoom._lastDeepVisible) {
    applySemanticZoom._lastDeepVisible = deepVisible;
    renderHulls();
  }
}

// Distance-based mid-edge opacity: solid when close, fading when far
function edgeMidOpacity(dist) {
  const CLOSE = 60, FAR = 250;
  if (dist <= CLOSE) return 1.0;
  if (dist >= FAR) return 0.08;
  const t = (dist - CLOSE) / (FAR - CLOSE);
  return 1.0 - t * 0.92; // lerp from 1.0 to 0.08
}

// ── Invisible-node following: move hidden descendants when visible node is dragged ──
// Follow depth scales with zoom: zoomed out far = deeper following.
// Stops at cluster boundaries to avoid dragging foreign clusters along.
function getFollowDepth() {
  if (currentK <= 0.3) return 6;  // overview: deep follow
  if (currentK <= 1.0) return 4;  // systems
  if (currentK <= 4.0) return 2;  // structural
  return 1;                        // deep: minimal follow
}

function moveInvisibleFollowers(nodeId, dx, dy) {
  if (!currentGraph || (dx === 0 && dy === 0)) return;
  // Use fullAdjacency (all edges regardless of layer visibility) so disabled
  // layers don't sever structural connections during drag
  const adj = currentGraph.fullAdjacency || currentGraph.adjacency;
  if (!adj) return;
  const maxDepth = getFollowDepth();
  const dragNode = currentGraph.nodeMap.get(nodeId);
  const dragCluster = dragNode ? dragNode.cluster : null;
  const visited = new Set([nodeId]);
  const queue = [{ id: nodeId, depth: 0 }];
  while (queue.length) {
    const { id, depth } = queue.shift();
    if (depth >= maxDepth) continue;
    const neighbors = adj.get(id);
    if (!neighbors) continue;
    for (const nid of neighbors) {
      if (visited.has(nid)) continue;
      visited.add(nid);
      const n = currentGraph.nodeMap.get(nid);
      if (!n) continue;
      // Stop at cluster boundaries: don't cross into a different cluster
      if (dragCluster != null && n.cluster != null && n.cluster !== dragCluster) continue;
      // Only move invisible nodes (below minZoom or hidden by edge layer)
      const invisible = (n.minZoom && currentK < n.minZoom) || _hiddenNodes.has(n.id);
      if (invisible) {
        n.x += dx;
        n.y += dy;
        queue.push({ id: nid, depth: depth + 1 });
      }
    }
  }
}

// ── DISTANCE row emission on drag (Plan 2 Tier 2: position-as-distance) ──
// When the user drags node d, emit DISTANCE rows to its K nearest visible
// neighbors. These rows are the authoritative record of where the user put
// this node — recoverable as spring rest-lengths later (Plan 2 Tier 3).
const DISTANCE_THROTTLE_MS = 500;
const DISTANCE_MAX_K = 8;

function _isNodeVisibleForDistance(n) {
  if (n.minZoom && currentK < n.minZoom) return false;
  if (_hiddenNodes.has(n.id)) return false;
  return true;
}

function emitDragDistances(d) {
  if (!currentNodes) return;
  const candidates = [];
  for (const n of currentNodes) {
    if (n.id === d.id) continue;
    if (!_isNodeVisibleForDistance(n)) continue;
    const dx = n.x - d.x, dy = n.y - d.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    candidates.push({ id: n.id, dist });
  }
  if (candidates.length === 0) return;
  candidates.sort((a, b) => a.dist - b.dist);
  const k = Math.min(DISTANCE_MAX_K, candidates.length);
  const t = Date.now();
  for (let i = 0; i < k; i++) {
    const nid = candidates[i].id;
    const dist = candidates[i].dist;
    // Apply locally immediately so the physics sees the new rest-length
    // this frame — no round-trip through the server needed.
    userDistancesModule.applyEdge({ source: d.id, target: nid, type: 'distance', weight: dist, t });
    if (window.streamClient) window.streamClient.emitDistance(d.id, nid, dist);
  }
}

function maybeEmitDragDistances(d) {
  const now = performance.now();
  if (d._lastDistanceEmit != null && now - d._lastDistanceEmit < DISTANCE_THROTTLE_MS) return;
  d._lastDistanceEmit = now;
  emitDragDistances(d);
}

// ── Node drag behavior (extracted to module level for reuse by streaming) ──
const nodeDrag = d3.drag()
  .on('start', (e, d) => {
    d._dragStart = { x: d.x, y: d.y };
    d._dragStartTime = Date.now();
    d._isDragging = true;
    d._lastDistanceEmit = null;
    forcePressDragNode = d;
    if (currentK > 3.5 && currentNodes) {
      let maxR = 0;
      for (const n of currentNodes) if ((n.radius || 4) > maxR) maxR = n.radius || 4;
      _buildCollisionGrid(currentNodes, maxR);
    }
    if (spacePullRAF && selectedNodes.has(d.id)) {
      cancelAnimationFrame(spacePullRAF);
      spacePullRAF = null;
    }
    if (!hasForceTouch && !hasPressure && e.sourceEvent && e.sourceEvent.shiftKey) {
      if (shiftAttractorTimer) clearTimeout(shiftAttractorTimer);
      shiftAttractorTimer = setTimeout(() => {
        shiftAttractorTimer = null;
        if (d._isDragging && !attractorNode && !groupMoveActive) {
          startAttractor(d);
        }
      }, 550);
    }
  })
  .on('drag', (e, d) => {
    if (xKeyRAF) return;
    if (e.sourceEvent && e.sourceEvent.shiftKey && selectedNodes.has(d.id) && selectedNodes.size >= 2) {
      if (!groupMoveActive) {
        groupMoveActive = true;
        if (shiftAttractorTimer) { clearTimeout(shiftAttractorTimer); shiftAttractorTimer = null; }
        if (attractorNode) lockAttractor();
      }
      const dx = e.x - d.x, dy = e.y - d.y;
      for (const n of currentNodes) {
        if (!selectedNodes.has(n.id)) continue;
        n.x += dx;
        n.y += dy;
        moveInvisibleFollowers(n.id, dx, dy);
      }
    } else if (e.sourceEvent && e.sourceEvent.shiftKey) {
      return;
    } else {
      const dragDx = e.x - d.x, dragDy = e.y - d.y;
      d.x = e.x; d.y = e.y;
      moveInvisibleFollowers(d.id, dragDx, dragDy);
      if (currentK > 3.5) {
        const dr = d.radius || 4;
        const nearby = _nearbyNodes(d.x, d.y, dr + 30);
        for (let i = 0; i < nearby.length; i++) {
          const n = nearby[i];
          if (n.id === d.id) continue;
          if (softCollide(n, d.x, d.y, dr, 4)) {
            springDisplace(n);
          }
        }
      }
    }
    maybeEmitDragDistances(d);
    renderPositions();
  })
  .on('end', (e, d) => {
    d._isDragging = false;
    forcePressDragNode = null;
    groupMoveActive = false;
    if (shiftAttractorTimer) { clearTimeout(shiftAttractorTimer); shiftAttractorTimer = null; }
    if (xKeyHeld) stopXForces();
    const dx = d.x - d._dragStart.x, dy = d.y - d._dragStart.y;
    const moved = Math.sqrt(dx * dx + dy * dy) > 5;
    if (moved) {
      if (e.sourceEvent && e.sourceEvent.shiftKey && selectedNodes.has(d.id) && selectedNodes.size >= 2) {
        for (const n of currentNodes) {
          if (!selectedNodes.has(n.id)) continue;
          stickyNodes.add(n.id);
          savedPositions.set(n.id, { x: n.x, y: n.y });
          if (window.streamClient) {
            window.streamClient.emitAction('stick', n.id);
            emitDragDistances(n);
          }
        }
      } else {
        stickyNodes.add(d.id);
        savedPositions.set(d.id, { x: d.x, y: d.y });
        if (window.streamClient) {
          window.streamClient.emitAction('stick', d.id);
          emitDragDistances(d);
        }
      }
      trackDragProximity(d.id);
      pushArrangement('drag', [d.id]);
    }
    if (attractorNode) lockAttractor();
  });

// ── Helper: set up circle + all event handlers on a node group selection ──
function setupNodeCircle(sel) {
  sel.append('circle')
    .attr('r', d => d.radius * getClusterImportance(d.cluster))
    .attr('fill', d => d.type === 'function' ? d.color : '#333')
    .attr('stroke', d => d.type === 'function' ? d3.color(d.color).brighter(0.8) : '#666')
    .on('click', (e, d) => {
      e.stopPropagation();
      const dragDuration = d._dragStartTime ? Date.now() - d._dragStartTime : 0;
      d._dragStartTime = null;
      if (dragDuration < 300) {
        if (focusedClusterId != null) {
          focusedClusterId = null;
          applyMetaLinkFocus();
        }
        if ((e.shiftKey && xKeyDown) || (e.ctrlKey || e.metaKey)) {
          const wasSelected = selectedNodes.has(d.id);
          const wasLocked = lockedNodes.has(d.id);
          selectedNodes.delete(d.id);
          lockedNodes.delete(d.id);
          d3.select(e.target).classed('selected-glow', false);
          updateLockUI();
          dismissNodeToT0(d);
          if (window.streamClient) {
            if (wasSelected) window.streamClient.emitAction('deselect', d.id);
            if (wasLocked) window.streamClient.emitAction('unlock', d.id);
          }
          return;
        }
        if (e.shiftKey) {
          if (selectedNodes.has(d.id)) {
            const wasLocked = lockedNodes.has(d.id);
            selectedNodes.delete(d.id);
            lockedNodes.delete(d.id);
            d3.select(e.target).classed('selected-glow', false);
            if (window.streamClient) {
              window.streamClient.emitAction('deselect', d.id);
              if (wasLocked) window.streamClient.emitAction('unlock', d.id);
            }
          } else {
            selectedNodes.add(d.id);
            lockedNodes.add(d.id);
            stickyNodes.add(d.id);
            savedPositions.set(d.id, { x: d.x, y: d.y });
            d3.select(e.target).classed('selected-glow', true);
            if (window.streamClient) {
              window.streamClient.emitAction('select', d.id);
              window.streamClient.emitAction('lock', d.id);
              window.streamClient.emitAction('stick', d.id);
            }
          }
          updateLockUI();
          return;
        }
        selectNode(d, analysisResult);
        trackClickCoOccurrence(d.id);
      }
    })
    .on('contextmenu', (e, d) => {
      e.preventDefault();
      const wasSelected = selectedNodes.has(d.id);
      const wasLocked = lockedNodes.has(d.id);
      selectedNodes.delete(d.id);
      lockedNodes.delete(d.id);
      gNodes.selectAll('.node').filter(n => n.id === d.id)
        .select('circle').classed('selected-glow', false);
      if (window.streamClient) {
        if (wasSelected) window.streamClient.emitAction('deselect', d.id);
        if (wasLocked) window.streamClient.emitAction('unlock', d.id);
      }
      updateLockUI();
      dismissNodeToT0(d);
    })
    .on('mouseenter', (e, d) => { if (!attractorNode) highlightNeighbors(d, currentGraph); })
    .on('mouseleave', () => { if (!attractorNode) clearHighlight(); })
    .each(function(d) {
      this.addEventListener('webkitmouseforcewillbegin', (e) => {
        e.preventDefault();
        hasForceTouch = true;
      });
      this.addEventListener('webkitmouseforcedown', (e) => {
        if (!attractorNode) startAttractor(d);
      });
      this.addEventListener('webkitmouseforceup', (e) => {
        if (attractorNode) lockAttractor();
      });
      this.addEventListener('pointerdown', (e) => {
        pressureActive = false;
      });
      this.addEventListener('pointermove', (e) => {
        if (hasForceTouch) return;
        if (e.pressure > 0 && e.pressure !== 0.5) hasPressure = true;
        if (!hasPressure) return;
        if (e.pressure >= PRESSURE_THRESHOLD && !pressureActive) {
          pressureActive = true;
          if (!attractorNode) startAttractor(d);
        } else if (e.pressure < PRESSURE_THRESHOLD && pressureActive) {
          pressureActive = false;
          if (attractorNode) lockAttractor();
        }
      });
      this.addEventListener('pointerup', () => {
        if (pressureActive) {
          pressureActive = false;
          if (attractorNode) lockAttractor();
        }
      });
    });

  // Secondary affinity rings
  sel.filter(d => {
    if (!d.affinities || d.affinities.size < 2) return false;
    const sorted = [...d.affinities.entries()].sort((a, b) => b[1] - a[1]);
    return sorted[1][1] >= 0.15;
  }).append('circle')
    .attr('r', d => d.radius * getClusterImportance(d.cluster) + 2.5)
    .attr('fill', 'none')
    .attr('stroke', d => {
      const sorted = [...d.affinities.entries()].sort((a, b) => b[1] - a[1]);
      return CLUSTER_COLORS[sorted[1][0] % CLUSTER_COLORS.length];
    })
    .attr('stroke-width', d => {
      const sorted = [...d.affinities.entries()].sort((a, b) => b[1] - a[1]);
      return Math.max(1, sorted[1][1] * 4);
    })
    .attr('stroke-opacity', d => {
      const sorted = [...d.affinities.entries()].sort((a, b) => b[1] - a[1]);
      return 0.4 + sorted[1][1] * 0.6;
    })
    .style('pointer-events', 'none');
}

// ── Incremental render: update d3 data joins for nodes/labels without full rebuild ──
function renderIncremental() {
  if (!currentNodes || !currentGraph) return;
  const nodes = currentNodes;

  // Update node data join
  gNodes.selectAll('.node')
    .data(nodes, d => d.id)
    .join(
      enter => {
        const g = enter.append('g').attr('class', 'node').call(nodeDrag);
        setupNodeCircle(g);
        // Fade in new nodes
        g.select('circle').attr('opacity', 0).transition().duration(400).attr('opacity', 0.9);
        return g;
      },
      update => update,
      exit => exit.remove()
    )
    .attr('transform', d => `translate(${d.x},${d.y})`);

  // Update label data join
  const labeledNodes = nodeDisplayLabels.size > 0
    ? nodes.filter(d => nodeDisplayLabels.has(d.id))
    : nodes;
  gLabels.selectAll('text')
    .data(labeledNodes, d => d.id)
    .join(
      enter => enter.append('text')
        .attr('class', 'label')
        .attr('fill', '#fff')
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'central')
        .attr('opacity', 0)
        .style('pointer-events', 'none')
        .style('user-select', 'none')
        .text(d => nodeDisplayLabels.get(d.id) || d.id),
      update => update,
      exit => exit.remove()
    )
    .attr('x', d => d.x)
    .attr('y', d => d.y);

  // Update edge data join (simple lines, no gradients during streaming)
  gLinks.selectAll('.link')
    .data(currentLinks, d => d.source + '\0' + d.target + '\0' + d.type)
    .join(
      enter => enter.append('line')
        .attr('class', 'link')
        .attr('stroke', d => {
          const layer = EDGE_LAYERS.find(l => l.id === d.type);
          return layer ? layer.color : '#555';
        })
        .attr('stroke-width', 0.5)
        .attr('stroke-opacity', 0.15)
        .attr('x1', d => currentGraph.nodeMap.get(d.source)?.x || 0)
        .attr('y1', d => currentGraph.nodeMap.get(d.source)?.y || 0)
        .attr('x2', d => currentGraph.nodeMap.get(d.target)?.x || 0)
        .attr('y2', d => currentGraph.nodeMap.get(d.target)?.y || 0),
      update => update,
      exit => exit.remove()
    );

  // Update cluster labels (d3 data join so they appear incrementally)
  const allClusterIds = [...new Set(nodes.filter(n => (n.type === 'function' || n.type === 'global') && n.cluster != null).map(n => n.cluster))];
  gClusterLabels.selectAll('text:not(.user-cluster-label)')
    .data(allClusterIds.map(cid => ({
      cid, name: currentClusterNames.get(cid) || `cluster_${cid}`,
      color: CLUSTER_COLORS[cid % CLUSTER_COLORS.length],
    })), d => d.cid)
    .join(
      enter => enter.append('text')
        .attr('class', 'cluster-label')
        .attr('fill', d => d.color)
        .text(d => d.name),
      update => update.text(d => d.name),
      exit => exit.remove()
    );

  applySemanticZoom();
  applyNodeHiding();
}

function renderGraph(graph, analysis, clusters, clusterNames) {
  const { nodes, links, nodeDegree } = graph;
  const showHulls = document.getElementById('show-hulls').checked;

  // Save current positions before layout
  if (currentNodes && savedPositions.size > 0) {
    for (const n of currentNodes) {
      if (n.x != null && n.y != null) savedPositions.set(n.id, { x: n.x, y: n.y });
    }
  }

  // Reuse existing node objects so that in-flight interaction references
  // (drag d, attractorNode, etc.) remain valid across incremental updates.
  if (currentNodes) {
    const existingById = new Map(currentNodes.map(n => [n.id, n]));
    for (let i = 0; i < nodes.length; i++) {
      const existing = existingById.get(nodes[i].id);
      if (existing) {
        existing.cluster = nodes[i].cluster;
        existing.clusterName = nodes[i].clusterName;
        existing.affinities = nodes[i].affinities;
        existing.color = nodes[i].color;
        existing.radius = nodes[i].radius;
        existing.info = nodes[i].info;
        existing.type = nodes[i].type;
        nodes[i] = existing;
        graph.nodeMap.set(existing.id, existing);
      }
    }
  }

  // Compute layout
  const isWarmRestart = savedPositions.size > nodes.length * 0.3;
  computeLayout(nodes, links, {
    isWarmRestart,
    spatialEdgesMap: spatialMemory.spatialEdges,
  });

  // Snapshot T0 layout positions BEFORE sticky overrides (only for new nodes)
  // Existing T0 positions are preserved across reloads so X always returns to the original layout
  for (const n of nodes) {
    if (n.x != null && !initialLayoutPositions.has(n.id)) {
      initialLayoutPositions.set(n.id, { x: n.x, y: n.y });
    }
  }

  // Apply sticky positions (user-dragged nodes override layout)
  for (const n of nodes) {
    if (stickyNodes.has(n.id) && savedPositions.has(n.id)) {
      const p = savedPositions.get(n.id);
      n.x = p.x;
      n.y = p.y;
    }
  }

  // Save computed positions
  for (const n of nodes) {
    if (n.x != null) savedPositions.set(n.id, { x: n.x, y: n.y });
  }

  // Store references
  currentNodes = nodes;
  currentLinks = links;
  currentGraph = graph;

  // Clear edges, hulls, cluster labels (cheap to rebuild)
  gLinks.selectAll('*').remove();
  gClusterLabels.selectAll('*').remove();
  gHulls.selectAll('*').remove();

  // Density-adaptive edge styling helpers
  function baseEdgeOpacity(l) {
    return edgeOpacity(l, nodeDegree);
  }
  function baseEdgeWidth(l) {
    const maxDeg = Math.max(nodeDegree.get(l.source) || 1, nodeDegree.get(l.target) || 1);
    const w = 0.5 + (l.weight || 1) * 0.3;
    return Math.min(3, w / Math.max(1, Math.sqrt(maxDeg) * 0.4));
  }

  // Render links (using source/target as IDs since we don't use d3-force)
  const nodeMap = graph.nodeMap;

  // Proximity-based gradient: solid when close, fades in the middle when far
  svgDefs.selectAll('.edge-grad').remove();
  links.forEach((d, i) => {
    const gradId = `edge-grad-${i}`;
    d._gradId = gradId;
    const sn = nodeMap.get(d.source);
    const tn = nodeMap.get(d.target);
    const sx = sn?.x || 0, sy = sn?.y || 0;
    const tx = tn?.x || 0, ty = tn?.y || 0;
    const layer = EDGE_LAYERS.find(l => l.id === d.type);
    const color = layer ? layer.color : '#4a9eff';
    d._edgeColor = color;

    const dist = Math.hypot(tx - sx, ty - sy);
    const midOp = edgeMidOpacity(dist);

    const grad = svgDefs.append('linearGradient')
      .attr('class', 'edge-grad')
      .attr('id', gradId)
      .attr('gradientUnits', 'userSpaceOnUse')
      .attr('x1', sx).attr('y1', sy)
      .attr('x2', tx).attr('y2', ty);

    grad.append('stop').attr('offset', '0%')
      .attr('stop-color', color).attr('stop-opacity', 1);
    grad.append('stop').attr('offset', '25%')
      .attr('stop-color', color).attr('stop-opacity', midOp);
    grad.append('stop').attr('offset', '50%')
      .attr('stop-color', color).attr('stop-opacity', midOp * 0.7);
    grad.append('stop').attr('offset', '75%')
      .attr('stop-color', color).attr('stop-opacity', midOp);
    grad.append('stop').attr('offset', '100%')
      .attr('stop-color', color).attr('stop-opacity', 1);
  });

  gLinks.selectAll('line')
    .data(links)
    .join('line')
    .attr('class', 'link')
    .attr('stroke', d => `url(#${d._gradId})`)
    .attr('stroke-width', d => baseEdgeWidth(d))
    .attr('stroke-opacity', d => baseEdgeOpacity(d))
    .attr('stroke-dasharray', d => { const l = EDGE_LAYERS.find(l => l.id === d.type); return l ? (l.dash || null) : null; })
    .attr('x1', d => nodeMap.get(d.source)?.x || 0)
    .attr('y1', d => nodeMap.get(d.source)?.y || 0)
    .attr('x2', d => nodeMap.get(d.target)?.x || 0)
    .attr('y2', d => nodeMap.get(d.target)?.y || 0);

  // Inline arrowheads for directed edges (inherit stroke-opacity from edge)
  const directedLinks = links.filter(d => {
    const l = EDGE_LAYERS.find(l => l.id === d.type);
    return l?.directed;
  });
  gLinks.selectAll('.arrow')
    .data(directedLinks)
    .join('path')
    .attr('class', 'arrow')
    .attr('d', d => {
      const sn = nodeMap.get(d.source), tn = nodeMap.get(d.target);
      if (!sn || !tn) return '';
      const dx = tn.x - sn.x, dy = tn.y - sn.y;
      const len = Math.hypot(dx, dy);
      if (len < 1) return '';
      const ux = dx / len, uy = dy / len;
      // Place tip at target node edge
      const tr = tn.radius || 4;
      const tipX = tn.x - ux * tr, tipY = tn.y - uy * tr;
      const sz = 2; // arrowhead size
      const bx = tipX - ux * sz, by = tipY - uy * sz;
      const px = -uy * sz * 0.5, py = ux * sz * 0.5;
      return `M${tipX},${tipY} L${bx + px},${by + py} L${bx - px},${by - py}Z`;
    })
    .attr('fill', d => d._edgeColor)
    .attr('fill-opacity', d => baseEdgeOpacity(d))
    .attr('stroke', 'none');

  // ── Incremental node rendering via keyed data join ──
  const node = gNodes.selectAll('.node')
    .data(nodes, d => d.id)
    .join(
      enter => {
        const g = enter.append('g').attr('class', 'node').call(nodeDrag);
        setupNodeCircle(g);
        return g;
      },
      update => {
        // Update visual properties that may have changed (cluster, importance)
        update.select('circle')
          .attr('r', d => d.radius * getClusterImportance(d.cluster))
          .attr('fill', d => d.type === 'global' ? '#333' : d.color)
          .attr('stroke', d => d.type === 'global' ? '#666' : d3.color(d.color).brighter(0.8));
        return update;
      },
      exit => exit.remove()
    )
    .attr('transform', d => `translate(${d.x},${d.y})`);

  // ── Incremental label rendering via keyed data join ──
  // Only render labels for nodes that have a display label (or all nodes if nodeDisplayLabels is empty, i.e. codemap mode)
  const labeledNodes = nodeDisplayLabels.size > 0
    ? nodes.filter(d => nodeDisplayLabels.has(d.id))
    : nodes;
  gLabels.selectAll('text')
    .data(labeledNodes, d => d.id)
    .join(
      enter => enter.append('text')
        .attr('class', 'label')
        .attr('fill', '#fff')
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'central')
        .attr('opacity', 0)
        .style('pointer-events', 'none')
        .style('user-select', 'none')
        .text(d => nodeDisplayLabels.get(d.id) || d.id),
      update => update,
      exit => exit.remove()
    )
    .attr('x', d => d.x)
    .attr('y', d => d.y);

  // Hulls
  currentHullClusterIds = showHulls
    ? [...new Set(nodes.filter(n => n.cluster != null && n.cluster >= 0).map(n => n.cluster))]
    : null;
  renderHulls();

  // Cluster labels (floating — always visible)
  const allClusterIds = [...new Set(nodes.filter(n => n.type === 'function' && n.cluster != null).map(n => n.cluster))];
  gClusterLabels.selectAll('text')
    .data(allClusterIds.map(cid => ({
      cid, name: clusterNames.get(cid) || `cluster_${cid}`,
      color: CLUSTER_COLORS[cid % CLUSTER_COLORS.length],
    })))
    .join('text')
    .attr('class', 'cluster-label')
    .attr('fill', d => d.color)
    .text(d => d.name)
    .call(clusterLabelDrag(d => currentNodes.filter(n => n.cluster === d.cid)))
    .on('contextmenu', (e, d) => {
      // Mac Ctrl+Click fires contextmenu — reduce cluster importance
      e.preventDefault();
      if (d.cid != null) reduceClusterImportance(d.cid);
    })
    .on('dblclick', (e, d) => {
      e.preventDefault();
      e.stopPropagation();
      if (d.cid != null) growClusterImportance(d.cid);
    });
  rebuildClusterMemberCache();
  computeClusterLabelPlacement();

  // Legend
  document.getElementById('legend').innerHTML = [...clusterNames.entries()]
    .sort((a, b) => a[0] - b[0])
    .map(([id, name]) => `<div class="item"><div class="dot" style="background:${CLUSTER_COLORS[id % CLUSTER_COLORS.length]}"></div>${name} (${[...clusters.entries()].filter(([, c]) => c === id).length})</div>`)
    .join('');

  // Meta-edges between clusters
  computeMetaLinks();
  renderMetaLinks();

  applySemanticZoom();

  // Render user-defined clusters
  renderUserClusters();
  renderUserClusterLegend();

  // Push initial arrangement
  pushArrangement('layout');
}

function hullPerimeter(pts) {
  let len = 0;
  for (let i = 0; i < pts.length; i++) {
    const j = (i + 1) % pts.length;
    len += Math.hypot(pts[j][0] - pts[i][0], pts[j][1] - pts[i][1]);
  }
  return len;
}

function buildRepeatedLabel(name, perimeter, fontSize) {
  const charW = fontSize * 0.65;
  const sep = '  \u00b7  '; // " · "
  const unit = name + sep;
  const unitW = unit.length * charW;
  const reps = Math.max(1, Math.ceil(perimeter / unitW));
  return unit.repeat(reps);
}

function renderHulls() {
  if (!currentHullClusterIds || !currentNodes) return;
  gHulls.selectAll('.hull').remove();
  gHulls.selectAll('.hull-label').remove();
  svgDefs.selectAll('.hull-path-def').remove();

  for (const cid of currentHullClusterIds) {
    const members = currentNodes.filter(n => n.cluster === cid && !(n.minZoom && currentK < n.minZoom));
    if (members.length < 3) continue;
    const points = members.map(d => [d.x, d.y]);
    const hull = d3.polygonHull(points);
    if (!hull) continue;
    const expanded = expandHull(hull, 20);
    const color = CLUSTER_COLORS[cid % CLUSTER_COLORS.length];
    const pathD = `M${expanded.join('L')}Z`;
    const pathId = `hull-path-${cid}`;

    // Hull fill + stroke
    gHulls.append('path')
      .attr('class', 'hull')
      .attr('d', pathD)
      .attr('fill', color)
      .attr('stroke', color);

    // Path def for textPath reference
    svgDefs.append('path')
      .attr('class', 'hull-path-def')
      .attr('id', pathId)
      .attr('d', pathD);

    // TextPath boundary label — always created, visibility controlled by applySemanticZoom
    const name = currentClusterNames?.get(cid) || `cluster_${cid}`;
    const perim = hullPerimeter(expanded);
    // Generate enough text for smallest expected font size (max zoom k=12)
    const label = buildRepeatedLabel(name, perim, Math.max(4, 10 / 12));

    const text = gHulls.append('text')
      .attr('class', 'hull-label')
      .datum({ cid })
      .attr('fill', color)
      .attr('fill-opacity', 0)
      .attr('font-size', 10);

    text.append('textPath')
      .attr('href', `#${pathId}`)
      .text(label);

    text.call(clusterLabelDrag(d => currentNodes.filter(n => n.cluster === d.cid)))
      .on('contextmenu', (e, d) => {
        e.preventDefault();
        if (d.cid != null) reduceClusterImportance(d.cid);
      })
      .on('dblclick', (e, d) => {
        e.preventDefault();
        e.stopPropagation();
        if (d.cid != null) growClusterImportance(d.cid);
      });
  }
  // Also render user clusters on top
  renderUserClusters();
  // Apply current zoom styling to newly created elements
  applySemanticZoom();
}

function renderUserClusters() {
  if (!currentNodes) return;
  const nodeMap = currentGraph?.nodeMap;
  if (!nodeMap) return;

  // Remove previous user cluster hulls (but not labels during drag — they'd be destroyed mid-drag)
  gHulls.selectAll('.user-hull').remove();
  if (!clusterDragActive) gClusterLabels.selectAll('.user-cluster-label').remove();

  for (let i = 0; i < userClusterSections.length; i++) {
    const uc = userClusterSections[i];
    // Pick color based on position after system clusters
    const colorIdx = (currentClusterNames?.size || 0) + i;
    const color = CLUSTER_COLORS[colorIdx % CLUSTER_COLORS.length];
    const members = uc.nodeIds.map(id => nodeMap.get(id)).filter(n => n && n.x != null);
    if (members.length < 3) {
      if (members.length > 0) {
        const cx = members.reduce((s, n) => s + n.x, 0) / members.length;
        const cy = members.reduce((s, n) => s + n.y, 0) / members.length;
        const r = members.length === 1 ? 30 : Math.hypot(members[0].x - members[1].x, members[0].y - members[1].y) / 2 + 25;
        gHulls.append('circle')
          .attr('class', 'user-hull')
          .attr('cx', cx).attr('cy', cy).attr('r', r)
          .attr('fill', color).attr('fill-opacity', 0.08)
          .attr('stroke', color).attr('stroke-opacity', 0.3)
          .attr('stroke-width', 2).attr('stroke-dasharray', '6,3');
        if (!clusterDragActive) {
          gClusterLabels.append('text')
            .datum({ ucIndex: i })
            .attr('class', 'user-cluster-label cluster-label')
            .attr('x', cx).attr('y', cy - r - 8)
            .attr('fill', color)
            .text(uc.name)
            .call(clusterLabelDrag(d => {
              const sec = userClusterSections[d.ucIndex];
              if (!sec || !currentGraph?.nodeMap) return [];
              return sec.nodeIds.map(id => currentGraph.nodeMap.get(id)).filter(n => n && n.x != null);
            }));
        }
      }
      continue;
    }
    const points = members.map(d => [d.x, d.y]);
    const hull = d3.polygonHull(points);
    if (!hull) continue;
    const expanded = expandHull(hull, 25);
    gHulls.append('path')
      .attr('class', 'user-hull')
      .attr('d', `M${expanded.join('L')}Z`)
      .attr('fill', color).attr('fill-opacity', 0.08)
      .attr('stroke', color).attr('stroke-opacity', 0.3)
      .attr('stroke-width', 2).attr('stroke-dasharray', '6,3');
    if (!clusterDragActive) {
      const centroid = d3.polygonCentroid(hull);
      const topY = Math.min(...hull.map(p => p[1]));
      gClusterLabels.append('text')
        .datum({ ucIndex: i })
        .attr('class', 'user-cluster-label cluster-label')
        .attr('x', centroid[0]).attr('y', topY - 12)
        .attr('fill', color)
        .text(uc.name)
        .call(clusterLabelDrag(d => {
          const sec = userClusterSections[d.ucIndex];
          if (!sec || !currentGraph?.nodeMap) return [];
          return sec.nodeIds.map(id => currentGraph.nodeMap.get(id)).filter(n => n && n.x != null);
        }));
    }
  }
}

function renderUserClusterLegend() {
  const legendEl = document.getElementById('legend');
  legendEl.querySelectorAll('.user-cluster-item').forEach(el => el.remove());
  if (userClusterSections.length === 0) return;
  for (let i = 0; i < userClusterSections.length; i++) {
    const uc = userClusterSections[i];
    const colorIdx = (currentClusterNames?.size || 0) + i;
    const color = CLUSTER_COLORS[colorIdx % CLUSTER_COLORS.length];
    const item = document.createElement('div');
    item.className = 'item user-cluster-item';
    item.style.cssText = 'display:flex;align-items:center;gap:8px;margin:4px 0;cursor:pointer';
    const label = document.createElement('span');
    label.style.cssText = 'display:flex;align-items:center;gap:8px;flex:1';
    label.innerHTML = `<div class="dot" style="background:${color};border:1px dashed #888"></div>${uc.name} (${uc.nodeIds.length})`;
    label.addEventListener('click', () => {
      if (currentGraph?.nodeMap) {
        selectedNodes.clear();
        for (const id of uc.nodeIds) selectedNodes.add(id);
        gNodes.selectAll('circle').classed('selected-glow', d => selectedNodes.has(d.id));
      }
    });
    const delBtn = document.createElement('span');
    delBtn.textContent = '\u00d7';
    delBtn.title = 'Delete cluster';
    delBtn.style.cssText = 'color:#666;cursor:pointer;font-size:14px;line-height:1;padding:0 2px';
    delBtn.addEventListener('mouseenter', () => { delBtn.style.color = '#f66'; });
    delBtn.addEventListener('mouseleave', () => { delBtn.style.color = '#666'; });
    delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteUserCluster(uc.name); });
    item.appendChild(label);
    item.appendChild(delBtn);
    legendEl.appendChild(item);
  }
}

let clusterDragActive = false;
let focusedClusterId = null; // cluster being dragged — boosts its meta-edge opacity
const clusterImportance = new Map(); // cid → scale factor (default 1.0), reduced by Ctrl+Click
function clusterLabelDrag(getMembersFn) {
  return d3.drag()
    .on('start', function(e, d) {
      d._clusterMembers = getMembersFn(d);
      d._clusterGathering = false;
      d._clusterDragged = false;
      clusterDragActive = true;
      focusedClusterId = d.cid ?? null;
      applyMetaLinkFocus();
      // If space is already held, start cluster gather instead of drag
      if (spaceKeyDown && d.cid != null) {
        d._clusterGathering = true;
        if (e.sourceEvent && e.sourceEvent.shiftKey) {
          startIntraClusterGather(d.cid);
        } else {
          startClusterGather(d.cid);
        }
      }
      d3.select(this).style('cursor', 'grabbing');
    })
    .on('drag', function(e, d) {
      d._clusterDragged = true;
      if (!d._clusterMembers || !d._clusterMembers.length) return;
      const memberSet = d._clusterMemberSet || (d._clusterMemberSet = new Set(d._clusterMembers.map(n => n.id)));
      for (const n of d._clusterMembers) {
        n.x += e.dx;
        n.y += e.dy;
      }
      // Move invisible nodes connected to cluster members (via full adjacency)
      // This catches structural children that may not match the cluster filter
      if (currentGraph && currentGraph.fullAdjacency) {
        const adj = currentGraph.fullAdjacency;
        const moved = new Set(memberSet);
        for (const mid of memberSet) {
          const neighbors = adj.get(mid);
          if (!neighbors) continue;
          for (const nid of neighbors) {
            if (moved.has(nid)) continue;
            const n = currentGraph.nodeMap.get(nid);
            if (!n) continue;
            const invisible = (n.minZoom && currentK < n.minZoom) || _hiddenNodes.has(n.id);
            if (invisible) {
              n.x += e.dx;
              n.y += e.dy;
              moved.add(nid);
            }
          }
        }
      }
      // Soft collision: push non-member nodes away from dragged cluster members
      // Skip during cluster gather — separateClusters handles cluster-level overlap
      if (!clusterGatherHeld) {
        for (const m of d._clusterMembers) {
          for (const n of currentNodes) {
            if (memberSet.has(n.id)) continue;
            if (softCollide(n, m.x, m.y, m.radius || 4, 4)) {
              springDisplace(n);
            }
          }
        }
      }
      // Update saved positions so the gather loop's anchor pin tracks the drag
      if (d._clusterGathering || clusterGatherHeld) {
        for (const n of d._clusterMembers) {
          savedPositions.set(n.id, { x: n.x, y: n.y });
        }
      }
      renderPositions();
    })
    .on('end', function(e, d) {
      clusterDragActive = false;
      // Ctrl+Click (not dragged): reduce cluster importance
      if (!d._clusterDragged && d.cid != null && (e.sourceEvent?.ctrlKey || e.sourceEvent?.metaKey)) {
        focusedClusterId = null;
        applyMetaLinkFocus();
        reduceClusterImportance(d.cid);
        d3.select(this).style('cursor', null);
        d._clusterMembers = null;
        return;
      }
      // Only clear focusedClusterId if user actually dragged (not a click)
      // so that "click cluster label + Space" can trigger cluster gather
      if (d._clusterDragged) {
        focusedClusterId = null;
        applyMetaLinkFocus();
      }
      d3.select(this).style('cursor', null);
      if (d._clusterMembers) {
        for (const n of d._clusterMembers) {
          stickyNodes.add(n.id);
          savedPositions.set(n.id, { x: n.x, y: n.y });
        }
        pushArrangement('cluster-drag', d._clusterMembers.slice(0, 5).map(n => n.id));
        d._clusterMembers = null;
      }
      renderPositions();
    });
}

function applyMetaLinkFocus() {
  for (const d of currentMetaLinks) {
    const grad = svgDefs.select(`#${d.gradId}`);
    if (!grad.node()) continue;
    const involved = focusedClusterId != null &&
      (d.sourceCluster === focusedClusterId || d.targetCluster === focusedClusterId);
    const focusMult = involved ? 5 : 1;
    const edgeImp = Math.min(getClusterImportance(d.sourceCluster), getClusterImportance(d.targetCluster));
    const stops = grad.selectAll('stop');
    // Base opacities: [0.7, 0.08, 0.05, 0.08, 0.7]
    const baseOps = [0.7, 0.08, 0.05, 0.08, 0.7];
    stops.each(function(_, i) {
      d3.select(this).attr('stop-opacity', Math.min(1, baseOps[i] * focusMult * edgeImp));
    });
    // Scale stroke width by importance
    gMetaLinks.selectAll('.meta-link').filter(ml => ml === d)
      .attr('stroke-width', (0.5 + d.normalizedWeight * 4) * edgeImp);
  }
}

function getClusterImportance(cid) {
  return clusterImportance.has(cid) ? clusterImportance.get(cid) : 1.0;
}

function restoreClusterImportance(snapshot) {
  if (!snapshot) return;
  clusterImportance.clear();
  for (const [cid, val] of Object.entries(snapshot)) {
    clusterImportance.set(Number(cid), val);
  }
  applyAllClusterImportanceVisuals();
}

// Apply current clusterImportance values to all visuals (node radii, meta-edges, hulls)
function applyAllClusterImportanceVisuals() {
  if (!currentNodes) return;
  const allCids = new Set(currentNodes.map(n => n.cluster).filter(c => c != null));
  for (const cid of allCids) {
    const imp = getClusterImportance(cid);
    gNodes.selectAll('.node').each(function(d) {
      if (d.cluster !== cid) return;
      const scaledR = d.radius * imp;
      d3.select(this).select('circle').attr('r', scaledR);
      d3.select(this).select('circle:nth-child(2)').attr('r', scaledR + 2.5);
    });
  }
  if (typeof currentMetaLinks !== 'undefined') {
    for (const d of currentMetaLinks) {
      const grad = svgDefs.select(`#${d.gradId}`);
      if (!grad.node()) continue;
      const edgeImp = Math.min(getClusterImportance(d.sourceCluster), getClusterImportance(d.targetCluster));
      const baseOps = [0.7, 0.08, 0.05, 0.08, 0.7];
      const focusMult = (focusedClusterId != null &&
        (d.sourceCluster === focusedClusterId || d.targetCluster === focusedClusterId)) ? 5 : 1;
      grad.selectAll('stop').each(function(_, i) {
        d3.select(this).attr('stop-opacity', Math.min(1, baseOps[i] * focusMult * edgeImp));
      });
      gMetaLinks.selectAll('.meta-link').filter(ml => ml === d)
        .attr('stroke-width', (0.5 + d.normalizedWeight * 4) * edgeImp);
    }
  }
  renderHulls();
  applySemanticZoom();
  computeClusterLabelPlacement();
}

// Lightweight per-frame importance update (skips hull rebuild for performance)
function applyLerpedClusterImportanceVisuals() {
  if (!currentNodes) return;
  gNodes.selectAll('.node').each(function(d) {
    if (d.cluster == null) return;
    const imp = getClusterImportance(d.cluster);
    const scaledR = d.radius * imp;
    d3.select(this).select('circle').attr('r', scaledR);
    d3.select(this).select('circle:nth-child(2)').attr('r', scaledR + 2.5);
  });
  if (typeof currentMetaLinks !== 'undefined') {
    for (const d of currentMetaLinks) {
      const grad = svgDefs.select(`#${d.gradId}`);
      if (!grad.node()) continue;
      const edgeImp = Math.min(getClusterImportance(d.sourceCluster), getClusterImportance(d.targetCluster));
      const baseOps = [0.7, 0.08, 0.05, 0.08, 0.7];
      const focusMult = (focusedClusterId != null &&
        (d.sourceCluster === focusedClusterId || d.targetCluster === focusedClusterId)) ? 5 : 1;
      grad.selectAll('stop').each(function(_, i) {
        d3.select(this).attr('stop-opacity', Math.min(1, baseOps[i] * focusMult * edgeImp));
      });
      gMetaLinks.selectAll('.meta-link').filter(ml => ml === d)
        .attr('stroke-width', (0.5 + d.normalizedWeight * 4) * edgeImp);
    }
  }
}

// Lerp cluster importance between two snapshots and apply visually
function lerpClusterImportance(fromSnap, toSnap, t) {
  if (!fromSnap && !toSnap) return;
  // Collect all cluster ids from both snapshots
  const allCids = new Set();
  if (fromSnap) for (const k of Object.keys(fromSnap)) allCids.add(Number(k));
  if (toSnap) for (const k of Object.keys(toSnap)) allCids.add(Number(k));
  // Also include any clusters in the scene that default to 1.0
  if (currentNodes) {
    for (const n of currentNodes) {
      if (n.cluster != null) allCids.add(n.cluster);
    }
  }
  clusterImportance.clear();
  for (const cid of allCids) {
    const from = fromSnap?.[cid] ?? 1.0;
    const to = toSnap?.[cid] ?? 1.0;
    const lerped = from + (to - from) * t;
    if (Math.abs(lerped - 1.0) > 0.001) {
      clusterImportance.set(cid, lerped);
    }
  }
  applyLerpedClusterImportanceVisuals();
}

function reduceClusterImportance(cid) {
  pushArrangement('cluster-shrink', [currentClusterNames?.get(cid) || `cluster_${cid}`]);
  const current = getClusterImportance(cid);
  const next = Math.max(0.05, current * 0.7);
  clusterImportance.set(cid, next);
  applyClusterImportance(cid);
}

function growClusterImportance(cid) {
  const current = getClusterImportance(cid);
  if (current >= 1.0) return;
  pushArrangement('cluster-grow', [currentClusterNames?.get(cid) || `cluster_${cid}`]);
  const next = Math.min(1.0, current / 0.7);
  clusterImportance.set(cid, next);

  // Push nodes away from centroid (inverse of the 30% pull in reduce)
  const members = currentNodes ? currentNodes.filter(n => n.cluster === cid) : [];
  if (members.length > 1) {
    let cx = 0, cy = 0;
    for (const n of members) { cx += n.x; cy += n.y; }
    cx /= members.length; cy /= members.length;
    const push = 1 / (1 - 0.3) - 1; // inverse of 0.7 factor
    for (const n of members) {
      n.x = cx + (n.x - cx) * (1 + push);
      n.y = cy + (n.y - cy) * (1 + push);
      savedPositions.set(n.id, { x: n.x, y: n.y });
      stickyNodes.add(n.id);
    }
  }

  // Scale node radii
  gNodes.selectAll('.node').each(function(d) {
    if (d.cluster !== cid) return;
    const scaledR = d.radius * next;
    d3.select(this).select('circle').attr('r', scaledR);
    d3.select(this).select('circle:nth-child(2)').attr('r', scaledR + 2.5);
  });

  // Scale meta-edge opacities
  for (const d of currentMetaLinks) {
    if (d.sourceCluster !== cid && d.targetCluster !== cid) continue;
    const grad = svgDefs.select(`#${d.gradId}`);
    if (!grad.node()) continue;
    const edgeImp = Math.min(getClusterImportance(d.sourceCluster), getClusterImportance(d.targetCluster));
    const baseOps = [0.7, 0.08, 0.05, 0.08, 0.7];
    const focusMult = (focusedClusterId != null &&
      (d.sourceCluster === focusedClusterId || d.targetCluster === focusedClusterId)) ? 5 : 1;
    grad.selectAll('stop').each(function(_, i) {
      d3.select(this).attr('stop-opacity', Math.min(1, baseOps[i] * focusMult * edgeImp));
    });
    gMetaLinks.selectAll('.meta-link').filter(ml => ml === d)
      .attr('stroke-width', (0.5 + d.normalizedWeight * 4) * edgeImp);
  }

  renderPositions();
  applySemanticZoom();
  computeClusterLabelPlacement();
}

function applyClusterImportance(cid) {
  const imp = getClusterImportance(cid);

  // Pull nodes toward cluster centroid to tighten the cluster
  const members = currentNodes ? currentNodes.filter(n => n.cluster === cid) : [];
  if (members.length > 1) {
    let cx = 0, cy = 0;
    for (const n of members) { cx += n.x; cy += n.y; }
    cx /= members.length; cy /= members.length;
    // Each reduction step pulls nodes 30% closer to centroid
    const pull = 0.3;
    for (const n of members) {
      n.x = cx + (n.x - cx) * (1 - pull);
      n.y = cy + (n.y - cy) * (1 - pull);
      savedPositions.set(n.id, { x: n.x, y: n.y });
      stickyNodes.add(n.id);
    }
  }

  // Scale node radii within this cluster
  gNodes.selectAll('.node').each(function(d) {
    if (d.cluster !== cid) return;
    const scaledR = d.radius * imp;
    d3.select(this).select('circle').attr('r', scaledR);
    // Also scale secondary affinity ring if present
    d3.select(this).select('circle:nth-child(2)')
      .attr('r', scaledR + 2.5);
  });
