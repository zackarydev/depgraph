<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Equinox — Dependency Graph</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #ccc; font-family: 'SF Mono', 'Fira Code', monospace; overflow: hidden; user-select: none; -webkit-user-select: none; }

#toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  background: #111118; border-bottom: 1px solid #2a2a35;
  padding: 8px 16px; display: flex; align-items: center; gap: 16px;
  font-size: 12px;
}
#toolbar select, #toolbar input { background: #1a1a25; color: #ccc; border: 1px solid #333; border-radius: 4px; padding: 4px 8px; font-family: inherit; font-size: 12px; }
#toolbar label { color: #888; cursor: pointer; user-select: none; }
#toolbar .sep { width: 1px; height: 20px; background: #333; }
#status { color: #555; margin-left: auto; }
#status.live { color: #4a4; }

#info-panel {
  position: fixed; top: 44px; right: 0; width: 320px; bottom: 0; z-index: 5;
  background: #111118ee; border-left: 1px solid #2a2a35;
  padding: 16px; overflow-y: auto; font-size: 12px;
  transform: translateX(100%); transition: transform 0.2s;
}
#info-panel.open { transform: translateX(0); }
#info-panel h3 { color: #e8e8f0; margin-bottom: 8px; font-size: 14px; }
#info-panel .section { margin-bottom: 12px; }
#info-panel .section-title { color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
#info-panel .tag { display: inline-block; background: #222; border-radius: 3px; padding: 2px 6px; margin: 2px; font-size: 11px; }
#info-panel .tag.read { border-left: 2px solid #6af; }
#info-panel .tag.write { border-left: 2px solid #f66; }
#info-panel .tag.call { border-left: 2px solid #af6; }
#info-panel .tag.called-by { border-left: 2px solid #f6a; }
#info-panel .tag.rw { border-left: 2px solid #fa6; }

#legend {
  display: none;
  position: fixed; bottom: 16px; left: 16px; z-index: 5;
  background: #111118dd; border: 1px solid #2a2a35; border-radius: 6px;
  padding: 12px; font-size: 11px;
}
#legend .item { display: flex; align-items: center; gap: 8px; margin: 4px 0; cursor: pointer; }
#legend .item:hover { color: #fff; }
#legend .dot { width: 10px; height: 10px; border-radius: 50%; }

#styles {
  position: fixed; bottom: 16px; right: 16px; z-index: 5;
  background: #111118dd; border: 1px solid #2a2a35; border-radius: 6px;
  padding: 10px 14px; font-size: 11px; display: flex; flex-direction: column; gap: 6px;
}
#styles label { color: #888; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }

#focus-panel {
  position: fixed; top: 50px; left: 50%; transform: translateX(-50%); z-index: 15;
  background: #111118ee; border: 1px solid #3a3a50; border-radius: 8px;
  padding: 10px 18px; font-size: 12px; max-width: 600px;
  opacity: 0; transition: opacity 0.4s; pointer-events: none;
}
#focus-panel.active { opacity: 1; pointer-events: auto; }
#focus-panel .focus-desc { color: #aab; margin-bottom: 6px; }
#focus-panel .focus-step { color: #7af; font-weight: 600; }
#focus-panel .focus-targets { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
#focus-panel .focus-tag {
  display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px;
  background: #1a1a2a; border: 1px solid #333;
}
#focus-panel .focus-tag.high { border-color: #7af; color: #7af; }
#focus-panel .focus-tag.med { border-color: #5a8; color: #5a8; }
#focus-panel .focus-tag.low { border-color: #555; color: #888; }

#arr-nav {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 5;
  background: #111118dd; border: 1px solid #2a2a35; border-radius: 6px;
  padding: 6px 14px; font-size: 11px; display: flex; align-items: center; gap: 10px;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
#arr-nav.visible { opacity: 1; pointer-events: auto; }
#arr-nav button {
  background: #1a1a25; color: #888; border: 1px solid #333; border-radius: 4px;
  padding: 3px 10px; font-family: inherit; font-size: 11px; cursor: pointer;
}
#arr-nav button:hover { color: #ccc; border-color: #555; }
#arr-nav button:disabled { opacity: 0.3; cursor: default; }
#arr-nav .arr-label { color: #666; }

#lock-btn {
  background: #1a1a25; color: #888; border: 1px solid #333; border-radius: 4px;
  padding: 2px 8px; font-family: inherit; font-size: 11px; cursor: pointer;
}
#lock-btn:hover { color: #ccc; border-color: #555; }
#lock-btn.active { color: #ff0; border-color: #ff0; }

#comparison-badge {
  position: fixed; top: 50px; right: 16px; z-index: 15;
  background: #2a1a3a; border: 1px solid #7a4af0; border-radius: 6px;
  padding: 6px 14px; font-size: 11px; color: #b088f0;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
#comparison-badge.visible { opacity: 1; pointer-events: auto; }

#pull-layers {
  position: fixed; bottom: 16px; left: 16px; z-index: 5;
  background: #111118dd; border: 1px solid #2a2a35; border-radius: 6px;
  padding: 10px 14px; font-size: 11px;
  max-height: calc(100vh - 100px); overflow-y: auto;
}
#pull-layers .pull-title { color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
#pull-layers .layer-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
#pull-layers .swatch { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; cursor: pointer; }
#pull-layers .layer-name { color: #888; font-size: 11px; min-width: 70px; cursor: pointer; user-select: none; }
#pull-layers .layer-row.disabled .swatch { opacity: 0.3; }
#pull-layers .layer-row.disabled .layer-name { color: #444; text-decoration: line-through; }
#pull-layers .layer-info { color: #555; font-size: 10px; cursor: help; flex-shrink: 0; position: relative; }
#pull-layers .layer-info:hover::after {
  content: attr(data-tip);
  position: absolute; left: 18px; top: -4px; z-index: 99;
  background: #1a1a24; border: 1px solid #3a3a45; border-radius: 4px;
  padding: 4px 8px; color: #aaa; font-size: 10px; white-space: nowrap;
  pointer-events: none;
}
#pull-layers .pull-slider { width: 50px; height: 3px; accent-color: #666; cursor: pointer; }
#pull-layers .pull-val { color: #555; font-size: 10px; min-width: 22px; text-align: right; }

svg { position: fixed; top: 44px; left: 0; right: 0; bottom: 0; user-select: none; }
.link { transition: none; }
.meta-link { transition: none; }
.node circle { cursor: pointer; stroke-width: 1.5; }
.node text { fill: #999; font-size: 10px; pointer-events: none; user-select: none; }
.label { pointer-events: none; user-select: none; }
.node.highlighted circle { stroke-width: 3; }
.hull { fill-opacity: 0.04; stroke-opacity: 0.15; stroke-width: 1.5; }
.cluster-label { font-weight: 600; fill-opacity: 0.6; text-anchor: middle; dominant-baseline: central; cursor: grab; }
.cluster-label:active { cursor: grabbing; }
.hull-label { font-weight: 600; letter-spacing: 2px; cursor: grab; }
.hull-label:active { cursor: grabbing; }
.node circle.focus-glow { filter: drop-shadow(0 0 6px currentColor); }
.node circle.attractor-glow { filter: drop-shadow(0 0 8px #fff) drop-shadow(0 0 20px currentColor); stroke-width: 3; }
.node circle.selected-glow { filter: drop-shadow(0 0 6px #ff0) drop-shadow(0 0 12px #ff0); stroke: #ff0 !important; stroke-width: 2.5; }
.node circle.trace-glow { filter: drop-shadow(0 0 6px currentColor) drop-shadow(0 0 14px currentColor); stroke-width: 2; }
.node circle.trace-wave { filter: drop-shadow(0 0 10px currentColor) drop-shadow(0 0 20px currentColor); stroke-width: 3; }
.link.trace-active { stroke-opacity: 0.9 !important; stroke-width: 2 !important; }
</style>

<body>

<div id="toolbar">
  <strong style="color:#e8e8f0">depgraph</strong>
  <div class="sep"></div>
  <label>View:
    <select id="view-mode">

  <label>Level:
    <select id="zoom-level" style="font-size:10px">
      <option value="overview">Overview</option>

    </select>

  <div id="zoom-debug" style="color:#555; font-size:10px; margin-top:2px">zoom: 0.80</div>

<svg id="graph"></svg>

<script src="https://cdn.jsdelivr.net/npm/acorn@8.14.1/dist/acorn.js"></script>
<script src="https://cdn.jsdelivr.net/npm/acorn-walk@8.3.4/dist/walk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="/prototypes/csv-parse.js"></script>
<script src="/prototypes/user-distances.js"></script>
<script src="/prototypes/stream-client.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
let SRC = '/target/src';
let CODEMAP_SRC = '';
const REFRESH_MS = 3000;
const CLUSTER_GAP = 40;
const LAYOUT_ITERS = 180;
const CLUSTER_PACK_ITERS = 120;
const ARRANGEMENT_CAP = 50;
const SPATIAL_DECAY_MS = 7 * 24 * 3600 * 1000; // 1 week half-life

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let lastHash = null;
let _lastHistoryText = null; // cached for stream simulator
let codemapSections = null;
let codemapImportance = new Map();
let nodeDisplayLabels = new Map();  // id → display label (null = no label to render)
let csvClusterMap = new Map();  // id → cluster name from CSV, used as fallback when codemap doesn't cover a node
let analysisResult = null;
let savedPositions = new Map();
let stickyNodes = new Set();
let lockedNodes = new Set(); // explicitly locked nodes (pinned in place)
let selectedNode = null;
let currentK = 0.8;

// ── User-authored distance springs (Plan 2 Option E) ─────────────────────
// State + pure logic live in prototypes/user-distances.js (loaded above).
// The module stores Edge domain objects with type='distance'; we never
// touch its internal storage — GraphPhysics iterates via forEachEdge.
const userDistancesModule = window.userDistancesModule;
let useUserDistances = true;   // toggle for debugging physics oscillation

// ── Zoom breakpoints: dynamic edge layer presets by zoom level ──
const ZOOM_BREAKPOINTS = [
  {
    name: 'Overview',
    zoom: 0.3,
    layers: { memberOf: 1, importance: 0.6 },
  },
  {
    name: 'Systems',
    zoom: 1.0,
    layers: { memberOf: 1, calls: 1, calledBy: 1, shared: 0.8, sharedWrites: 0.7, importance: 0.5 },
  },
  {
    name: 'Structural',
    zoom: 4.0,
    layers: { memberOf: 1, calls: 1, calledBy: 1, shared: 0.8, sharedWrites: 0.7, importance: 0.5, uses: 0.7, writesTo: 0.7 },
  },
  {
    name: 'Deep',
    zoom: 10.0,
    layers: { memberOf: 1, calls: 1, calledBy: 1, shared: 0.6, sharedWrites: 0.5, importance: 0.4, uses: 0.8, writesTo: 0.8, param: 0.7, arg: 0.7, binds: 0.6, init: 0.6, key: 0.5 },
  },
];
let zoomBreakpointsEnabled = true;
let _lastBreakpointName = '';

function getZoomBreakpointOpacity(layerId) {
  if (!zoomBreakpointsEnabled) return null;
  const k = currentK;
  const bp = ZOOM_BREAKPOINTS;
  // Clamp to endpoints
  if (k <= bp[0].zoom) return bp[0].layers[layerId] || 0;
  if (k >= bp[bp.length - 1].zoom) return bp[bp.length - 1].layers[layerId] || 0;
  // Find bracketing pair and lerp
  for (let i = 0; i < bp.length - 1; i++) {
    if (k >= bp[i].zoom && k <= bp[i + 1].zoom) {
      const t = (k - bp[i].zoom) / (bp[i + 1].zoom - bp[i].zoom);
      const lo = bp[i].layers[layerId] || 0;
      const hi = bp[i + 1].layers[layerId] || 0;
      return lo + (hi - lo) * t;
    }
  }
  return 0;
}

function getActiveBreakpointName() {
  const k = currentK;
  // Return the name of the nearest breakpoint we're at or past
  for (let i = ZOOM_BREAKPOINTS.length - 1; i >= 0; i--) {
    if (k >= ZOOM_BREAKPOINTS[i].zoom * 0.7) return ZOOM_BREAKPOINTS[i].name;
  }
  return ZOOM_BREAKPOINTS[0].name;
}

let currentGraph = null;
let currentClusterNames = new Map();
let currentNodes = null;
let initialLayoutPositions = new Map(); // immutable T0 positions from layout
let currentLinks = null;
let currentHullClusterIds = null;

// Attractor
let attractorNode = null;
let attractorStartTime = 0;
let attractorRAF = null;
let attractorHoldStrength = 0;
let lastAttractorDuration = 0;
let forcePressDragNode = null; // node being dragged when force press activates
let hasForceTouch = false; // webkit force events detected (Safari)
let hasPressure = false; // pointer events pressure detected (Chrome)
let pressureActive = false; // currently above pressure threshold
const PRESSURE_THRESHOLD = 0.75; // above default 0.5 that mice report
let shiftAttractorTimer = null; // fallback shift-hold delay for non-Force Touch/pressure

// Animation
let animationRAF = null;

// Multi-select
let selectedNodes = new Set();

// Click-pull animation
let clickPullRAF = null;

// X-key spread forces
let xKeyHeld = false;
let xKeyDown = false; // tracks physical X key state
let spaceKeyDown = false; // tracks physical Space key state
let xKeyRAF = null;
let xDismissRAFs = new Map(); // per-node dismiss animations

// Configurable speeds (ms) — updated by toolbar sliders
let xRewindDuration = 3000;
let zTravelStepDuration = 800;
let traceEdgeDuration = 1000; // ms per edge propagation step

// T-key trace (BFS propagation through visible graph)
let tKeyDown = false;
let tKeyHeld = false;
let traceRAF = null;
let traceMode = 'both'; // 'both' | 'forward' | 'backward'
let traceWavefront = new Set(); // current frontier node IDs
let traceVisited = new Set(); // already-traced node IDs
let traceStartTime = 0;
let traceStepIndex = 0; // how many BFS hops completed
let traceFlash = false; // true for quick-press flash mode
let traceBKeyDown = false;
let traceFKeyDown = false;
let traceHeld = false; // H pressed: visuals persist after T release

// Z-key time travel (backwards through arrangement history)
let zKeyHeld = false;
let zKeyDown = false;
let zKeyRAF = null;
let zTravelStartIndex = -1; // arrangement index when Z was pressed

// Group move (shift+drag) — disables all gather while active
let groupMoveActive = false;

// Space-pull (pull selected nodes together)
let spacePullRAF = null;
let spacePullHeld = false;

// Neighbor-gather (pull neighbors toward a clicked node)
let neighborGatherRAF = null;
let neighborGatherHeld = false;

// Cluster-gather (pull connected clusters toward a clicked cluster label)
let clusterGatherRAF = null;
let clusterGatherHeld = false;
let clusterGatherAnchorCid = null;

// Intra-cluster gather (pull all nodes in a cluster toward its centroid)
let intraClusterGatherRAF = null;
let intraClusterGatherHeld = false;

// Spring-back: non-participating nodes displaced by collision return to their origin
const springNodes = new Map(); // id -> { origX, origY, node }
let springRAF = null;

// Deferred rebuild: when a graph update arrives during user interaction,
// stash the flag and apply once the interaction ends.
let pendingRebuild = false;
let pendingRebuildTimer = null;

function isUserInteracting() {
  return !!(forcePressDragNode || attractorNode || attractorRAF ||
    groupMoveActive || spacePullRAF || neighborGatherRAF || clusterGatherRAF || intraClusterGatherRAF ||
    xKeyRAF || xKeyHeld || zKeyRAF || zKeyHeld || traceRAF || tKeyHeld || traceHeld ||
    animationRAF || clickPullRAF || clusterDragActive);
}

function schedulePendingRebuild() {
  if (pendingRebuildTimer) return;
  pendingRebuildTimer = setInterval(() => {
    if (!isUserInteracting()) {
      clearInterval(pendingRebuildTimer);
      pendingRebuildTimer = null;
      if (pendingRebuild) {
        pendingRebuild = false;
        rebuild();
      }
    }
  }, 200);
}

function springDisplace(n) {
  // Record original position if not already tracked
  if (!springNodes.has(n.id)) {
    springNodes.set(n.id, { origX: n.x, origY: n.y, node: n });
    if (!springRAF) springRAF = requestAnimationFrame(springLoop);
  }
}

// Soft collision: push n away from (cx,cy) with radius cr.
// Returns true if overlap existed. Push is proportional to overlap depth, capped.
function softCollide(n, cx, cy, cr, padding) {
  const dx = n.x - cx, dy = n.y - cy;
  const distSq = dx * dx + dy * dy;
  const minDist = cr + (n.radius || 4) + padding;
  if (distSq >= minDist * minDist) return false;
  const dist = Math.sqrt(distSq) || 0.1;
  const overlap = minDist - dist;
  // Soft: push only 30% of overlap per frame, max 3px
  const push = Math.min(overlap * 0.3, 3);
  n.x += (dx / dist) * push;
  n.y += (dy / dist) * push;
  return true;
}

function springLoop() {
  springRAF = null;
  if (springNodes.size === 0) return;
  let anyActive = false;
  for (const [id, entry] of springNodes) {
    const n = entry.node;
    const dx = entry.origX - n.x, dy = entry.origY - n.y;
    if (dx * dx + dy * dy < 0.25) {
      // Close enough — snap back and remove
      n.x = entry.origX; n.y = entry.origY;
      springNodes.delete(id);
    } else {
      // Spring toward original position
      n.x += dx * 0.15;
      n.y += dy * 0.15;
      anyActive = true;
    }
  }
  if (anyActive) {
    renderPositions();
    springRAF = requestAnimationFrame(springLoop);
  }
}

// Spatial grid for fast nearby-node collision queries
const _collisionGrid = { cellSize: 0, cells: new Map(), nodes: null };

function _buildCollisionGrid(nodes, maxRadius) {
  // Cell size = 2x largest possible collision radius (node radius + padding)
  const cellSize = (maxRadius + 30) * 2; // generous cell size
  _collisionGrid.cellSize = cellSize;
  _collisionGrid.nodes = nodes;
  const cells = _collisionGrid.cells;
  cells.clear();
  for (const n of nodes) {
    const key = ((n.x / cellSize | 0) + 0x8000) << 16 | ((n.y / cellSize | 0) + 0x8000);
    let bucket = cells.get(key);
    if (!bucket) { bucket = []; cells.set(key, bucket); }
    bucket.push(n);
  }
}

function _nearbyNodes(cx, cy, radius) {
  const cs = _collisionGrid.cellSize;
  if (cs === 0) return [];
  const minCX = ((cx - radius) / cs | 0) - 1;
  const maxCX = ((cx + radius) / cs | 0) + 1;
  const minCY = ((cy - radius) / cs | 0) - 1;
  const maxCY = ((cy + radius) / cs | 0) + 1;
  const result = [];
  const cells = _collisionGrid.cells;
  for (let gx = minCX; gx <= maxCX; gx++) {
    for (let gy = minCY; gy <= maxCY; gy++) {
      const key = (gx + 0x8000) << 16 | (gy + 0x8000);
      const bucket = cells.get(key);
      if (bucket) {
        for (let i = 0; i < bucket.length; i++) result.push(bucket[i]);
      }
    }
  }
  return result;
}

// User-defined clusters (parsed from codemap <!-- user-cluster --> sections)
let userClusterSections = []; // [{name, nodeIds: [...]}] — derived from codemap

// Cluster label placement caches
let clusterMemberCache = new Map(); // cid -> Node[]
let clusterLabelPlacement = new Map(); // cid -> { dx, dy, angle } — nudged each tick
let labelPlacementTimer = null;

async function createUserCluster(nodeIds) {
  const existingClusters = currentClusterNames ? [...currentClusterNames.values()] : [];

  const nodeDetails = {};
  for (const id of nodeIds) {
    const node = currentGraph?.nodeMap?.get(id);
    if (node && node.info) {
      nodeDetails[id] = {
        system: node.clusterName || 'unknown',
        reads: [...(node.info.reads || [])].join(', ') || 'none',
        writes: [...(node.info.writes || [])].join(', ') || 'none',
        calls: [...(node.info.calls || [])].join(', ') || 'none',
      };
    }
  }

  // Ask server — it writes placeholder to codemap immediately, names via Claude in background
  try {
    const resp = await fetch('/cluster', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nodeIds, existingClusters, nodeDetails }),
    });
    const data = await resp.json();
    if (data.name) {
      console.log(`[cluster] placeholder created: ${data.name}`);
      // Force reload to show the new section immediately
      lastHash = null;
      await loadAndAnalyze(true);
    }
  } catch (e) {
    console.warn('[user-cluster] creation failed:', e);
  }
}

async function deleteUserCluster(sectionName) {
  try {
    const resp = await fetch('/cluster', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sectionName }),
    });
    const data = await resp.json();
    if (data.deleted) {
      console.log(`[cluster] deleted: ${sectionName}`);
      lastHash = null;
      loadAndAnalyze(true);
    }
  } catch (e) {
    console.warn('[user-cluster] deletion failed:', e);
  }
}

let SPATIAL_KEY = 'depgraph-spatial';

let spatialMemory = {
  arrangements: [],
  spatialEdges: {},
  clickLog: [],
};
let arrangementIndex = -1;
let comparisonMode = false;
let comparisonA = null, comparisonB = null;
let navTimestamps = []; // for oscillation detection

function loadSpatialMemory() {
  try {
    const raw = localStorage.getItem(SPATIAL_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      spatialMemory = data;
      // Decay old spatial edges
      const now = Date.now();
      for (const key in spatialMemory.spatialEdges) {
        const edge = spatialMemory.spatialEdges[key];
        const age = now - new Date(edge.lastSeen).getTime();
        const decay = Math.pow(0.5, age / SPATIAL_DECAY_MS);
        edge.weight *= decay;
        if (edge.weight < 0.05) delete spatialMemory.spatialEdges[key];
      }
      // Trim click log
      if (spatialMemory.clickLog.length > 500) {
        spatialMemory.clickLog = spatialMemory.clickLog.slice(-500);
      }
      // Trim arrangements
      if (spatialMemory.arrangements.length > ARRANGEMENT_CAP) {
        spatialMemory.arrangements = spatialMemory.arrangements.slice(-ARRANGEMENT_CAP);
      }
      arrangementIndex = spatialMemory.arrangements.length - 1;
    }
  } catch (e) {
    console.warn('[spatial] Failed to load:', e);
  }
}

function saveSpatialMemory() {
  try {
    localStorage.setItem(SPATIAL_KEY, JSON.stringify(spatialMemory));
  } catch (e) {
    console.warn('[spatial] Failed to save:', e);
  }
}

function pushArrangement(trigger, focalNodes) {
  if (!currentNodes) return;
  const positions = {};
  for (const n of currentNodes) {
    if (n.x != null && n.y != null) positions[n.id] = [Math.round(n.x), Math.round(n.y)];
  }
  const focal = focalNodes || (selectedNode ? [selectedNode.id] : []);
  const label = generateArrangementLabel(focal, trigger);
  // Snapshot cluster importance so it can be restored on undo
  const impSnapshot = {};
  for (const [cid, val] of clusterImportance) impSnapshot[cid] = val;
  const arr = {
    id: Math.random().toString(36).slice(2, 8),
    timestamp: new Date().toISOString(),
    positions,
    focal,
    label,
    trigger,
    clusterImportance: impSnapshot,
  };
  // If we navigated back and then make a new arrangement, truncate forward history
  if (arrangementIndex < spatialMemory.arrangements.length - 1) {
    spatialMemory.arrangements = spatialMemory.arrangements.slice(0, arrangementIndex + 1);
  }
  spatialMemory.arrangements.push(arr);
  if (spatialMemory.arrangements.length > ARRANGEMENT_CAP) {
    spatialMemory.arrangements.shift();
  }
  arrangementIndex = spatialMemory.arrangements.length - 1;
  updateArrNav();
  saveSpatialMemory();
}

function generateArrangementLabel(focal, trigger) {
  if (focal.length > 0) {
    const names = focal.slice(0, 3).join(', ');
    return `${trigger}: ${names}`;
  }
  return trigger || 'layout';
}

function navigateArrangement(delta) {
  const newIdx = arrangementIndex + delta;
  if (newIdx < 0 || newIdx >= spatialMemory.arrangements.length) return;

  // Oscillation detection for comparison mode
  const now = Date.now();
  navTimestamps.push({ time: now, idx: newIdx });
  if (navTimestamps.length > 4) navTimestamps.shift();

  if (!comparisonMode && navTimestamps.length >= 3) {
    const recent = navTimestamps.slice(-3);
    const span = recent[2].time - recent[0].time;
    if (span < 3000 && recent[0].idx === recent[2].idx && recent[0].idx !== recent[1].idx) {
      enterComparisonMode(recent[0].idx, recent[1].idx);
      return;
    }
  }

  if (comparisonMode) {
    exitComparisonMode();
  }

  arrangementIndex = newIdx;
  const arr = spatialMemory.arrangements[arrangementIndex];
  const targetPositions = new Map();
  for (const [id, pos] of Object.entries(arr.positions)) {
    targetPositions.set(id, { x: pos[0], y: pos[1] });
  }
  animateToPositions(targetPositions, 300);
  restoreClusterImportance(arr.clusterImportance);
  updateArrNav();
}

function enterComparisonMode(idxA, idxB) {
  comparisonMode = true;
  comparisonA = spatialMemory.arrangements[idxA];
  comparisonB = spatialMemory.arrangements[idxB];
  document.getElementById('comparison-badge').classList.add('visible');

  const merged = computeComparisonPositions(comparisonA, comparisonB);
  animateToPositions(merged, 400);
}

function exitComparisonMode() {
  comparisonMode = false;
  comparisonA = null;
  comparisonB = null;
  document.getElementById('comparison-badge').classList.remove('visible');
}

function computeComparisonPositions(arrA, arrB) {
  const result = new Map();
  const allIds = new Set([...Object.keys(arrA.positions), ...Object.keys(arrB.positions)]);
  for (const id of allIds) {
    const a = arrA.positions[id];
    const b = arrB.positions[id];
    if (a && b) {
      const mx = (a[0] + b[0]) / 2;
      const my = (a[1] + b[1]) / 2;
      const dx = b[0] - a[0], dy = b[1] - a[1];
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 5) {
        result.set(id, { x: mx, y: my });
      } else {
        result.set(id, { x: mx + dx * 0.75, y: my + dy * 0.75 });
      }
    } else if (a) {
      result.set(id, { x: a[0], y: a[1] });
    } else if (b) {
      result.set(id, { x: b[0], y: b[1] });
    }
  }
  return result;
}

function trackClickCoOccurrence(nodeId) {
  const now = Date.now();
  spatialMemory.clickLog.push({ node: nodeId, t: now });

  // Check co-occurrence: previous click within 30s
  const log = spatialMemory.clickLog;
  if (log.length >= 2) {
    const prev = log[log.length - 2];
    if (now - prev.t < 30000 && prev.node !== nodeId) {
      const key = [prev.node, nodeId].sort().join('\0');
      const edge = spatialMemory.spatialEdges[key] || { weight: 0, lastSeen: '' };
      edge.weight = Math.min(1.0, edge.weight + 0.1);
      edge.lastSeen = new Date().toISOString();
      spatialMemory.spatialEdges[key] = edge;
    }
  }
  saveSpatialMemory();
}

function trackDragProximity(draggedId) {
  if (!currentNodes) return;
  const dragged = currentNodes.find(n => n.id === draggedId);
  if (!dragged) return;
  for (const n of currentNodes) {
    if (n.id === draggedId) continue;
    const dx = n.x - dragged.x, dy = n.y - dragged.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 60) {
      const key = [draggedId, n.id].sort().join('\0');
      const edge = spatialMemory.spatialEdges[key] || { weight: 0, lastSeen: '' };
      edge.weight = Math.min(1.0, edge.weight + 0.15);
      edge.lastSeen = new Date().toISOString();
      spatialMemory.spatialEdges[key] = edge;
    }
  }
  saveSpatialMemory();
}

function updateArrNav() {
  const nav = document.getElementById('arr-nav');
  const total = spatialMemory.arrangements.length;
  if (total <= 1) { nav.classList.remove('visible'); return; }
  nav.classList.add('visible');
  document.getElementById('arr-first').disabled = arrangementIndex <= 0;
  document.getElementById('arr-back').disabled = arrangementIndex <= 0;
  document.getElementById('arr-fwd').disabled = arrangementIndex >= total - 1;
  document.getElementById('arr-last').disabled = arrangementIndex >= total - 1;
  document.getElementById('arr-label').textContent = `${arrangementIndex + 1} / ${total}`;
}

function navigateToArrangement(targetIdx) {
  if (targetIdx < 0 || targetIdx >= spatialMemory.arrangements.length) return;
  if (targetIdx === arrangementIndex) return;
  if (comparisonMode) exitComparisonMode();
  arrangementIndex = targetIdx;
  const arr = spatialMemory.arrangements[arrangementIndex];
  const targetPositions = new Map();
  for (const [id, pos] of Object.entries(arr.positions)) {
    targetPositions.set(id, { x: pos[0], y: pos[1] });
  }
  animateToPositions(targetPositions, 300);
  restoreClusterImportance(arr.clusterImportance);
  updateArrNav();
}

function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return h;
}

// CODEMAP PARSING
// ═══════════════════════════════════════════════════════
function parseCodemap(md) {
  const sections = new Map();
  codemapImportance = new Map();
  userClusterSections = [];
  let currentSection = null;
  let isUserCluster = false;
  const lines = md.split('\n');
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const secMatch = line.match(/^## (.+)/);
    if (secMatch) {
      currentSection = secMatch[1].trim();
      if (currentSection === 'Controls' || currentSection === 'Constants') { currentSection = null; continue; }
      // Check if next line marks this as a user cluster
      isUserCluster = (lines[i + 1] || '').trim() === '<!-- user-cluster -->';
      if (isUserCluster) {
        userClusterSections.push({ name: currentSection, nodeIds: [] });
        i++; // skip the marker line
      } else {
        if (!sections.has(currentSection)) sections.set(currentSection, []);
      }
      continue;
    }
    if (!currentSection) continue;
    const funcMatch = line.match(/^- `(\w+)`/);
    if (funcMatch) {
      const name = funcMatch[1];
      if (isUserCluster) {
        userClusterSections[userClusterSections.length - 1].nodeIds.push(name);
      } else if (sections.has(currentSection)) {
        sections.get(currentSection).push(name);
      }
      const impMatch = line.match(/importance:(\d+)/);
      if (impMatch) codemapImportance.set(name, parseInt(impMatch[1]));
    }
  }
  return sections;
}

// ═══════════════════════════════════════════════════════
// AST ANALYSIS
// ═══════════════════════════════════════════════════════
function extractJS(html) {
  const match = html.match(/<script(?:\s+type="module")?>([\s\S]*)<\/script>/);
  if (!match) return { code: '', lineOffset: 0 };
  const tagStart = html.indexOf(match[0]);
  const lineOffset = html.substring(0, tagStart).split('\n').length;
  const code = match[1]
    .replace(/^\s*import\s+.*$/gm, '/* import */')
    .replace(/^\s*export\s+.*$/gm, '/* export */');
  return { code, lineOffset };
}

function analyzeCode(code, lineOffset) {
  let ast;
  try {
    ast = acorn.parse(code, {
      ecmaVersion: 2022,
      sourceType: 'script',
      locations: true,
      allowImportExportEverywhere: true,
    });
  } catch (e) {
    console.error('Parse error:', e.message);
    return null;
  }

  const globals = new Map();
  const functions = new Map();

  // Pass 1: collect top-level declarations
  for (const node of ast.body) {
    if (node.type === 'VariableDeclaration') {
      for (const decl of node.declarations) {
        collectDeclNames(decl.id).forEach(name => {
          globals.set(name, { kind: node.kind, line: node.loc.start.line + lineOffset });
        });
      }
    }
    if (node.type === 'FunctionDeclaration' && node.id) {
      globals.set(node.id.name, { kind: 'function', line: node.loc.start.line + lineOffset });
    }
  }

  // Pass 2: analyze each function
  for (const node of ast.body) {
    if (node.type === 'FunctionDeclaration' && node.id) {
      const info = analyzeFunction(node, globals);
      info.line = node.loc.start.line + lineOffset;
      info.endLine = node.loc.end.line + lineOffset;
      info.lines = info.endLine - info.line + 1;
      functions.set(node.id.name, info);
    }
  }

  return { globals, functions };
}

function collectDeclNames(pattern) {
  const names = [];
  if (pattern.type === 'Identifier') names.push(pattern.name);
  else if (pattern.type === 'ObjectPattern') {
    pattern.properties.forEach(p => names.push(...collectDeclNames(p.value || p.key)));
  } else if (pattern.type === 'ArrayPattern') {
    pattern.elements.forEach(e => e && names.push(...collectDeclNames(e)));
  }
  return names;
}

function analyzeFunction(funcNode, globals) {
  const params = new Set();
  funcNode.params.forEach(p => collectDeclNames(p).forEach(n => params.add(n)));
  const locals = new Set(params);
  const reads = new Set();
  const writes = new Set();
  const calls = new Set();

  acorn.walk.simple(funcNode.body, {
    VariableDeclaration(node) {
      for (const decl of node.declarations) {
        collectDeclNames(decl.id).forEach(n => locals.add(n));
      }
    },
    FunctionDeclaration(node) { if (node.id) locals.add(node.id.name); },
  });

  acorn.walk.ancestor(funcNode.body, {
    // Detect writes via assignment — acorn-walk routes AssignmentExpression.left
    // through Pattern → VariablePattern (= ignore), so the Identifier visitor
    // never fires for bare identifier assignment targets like `x = val`.
    // We must handle them here directly.
    AssignmentExpression(node) {
      if (node.left.type === 'Identifier') {
        const name = node.left.name;
        if (!locals.has(name) && globals.has(name)) writes.add(name);
      }
    },
    Identifier(node, ancestors) {
      const name = node.name;
      if (locals.has(name) || !globals.has(name)) return;
      const parent = ancestors[ancestors.length - 2];
      // Property key (non-computed): { foo: val } — skip the key (but not shorthand { foo })
      if (parent && parent.type === 'Property' && parent.key === node && !parent.computed && !parent.shorthand) return;
      // Member property (non-computed): obj.foo — foo is not a global reference
      if (parent && parent.type === 'MemberExpression' && parent.property === node && !parent.computed) return;
      // Label identifiers
      if (parent && (parent.type === 'LabeledStatement' || parent.type === 'BreakStatement' || parent.type === 'ContinueStatement')) return;
      if (parent && parent.type === 'UpdateExpression') {
        writes.add(name);
      } else {
        reads.add(name);
      }
    },
    CallExpression(node) {
      if (node.callee.type === 'Identifier' && globals.has(node.callee.name)) {
        calls.add(node.callee.name);
      } else if (node.callee.type === 'MemberExpression' && node.callee.object.type === 'Identifier') {
        const name = node.callee.object.name;
        if (!locals.has(name) && globals.has(name)) reads.add(name);
      }
    },
    MemberExpression(node, ancestors) {
      if (node.object.type === 'Identifier') {
        const name = node.object.name;
        if (locals.has(name) || !globals.has(name)) return;
        const parent = ancestors[ancestors.length - 2];
        if (parent && parent.type === 'AssignmentExpression' && parent.left === node) {
          writes.add(name);
        } else {
          reads.add(name);
        }
      }
    },
  });

  const rw = new Set();
  for (const n of reads) { if (writes.has(n)) rw.add(n); }
  for (const n of rw) { reads.delete(n); writes.delete(n); }

  return { params, locals, reads, writes, rw, calls, line: 0, endLine: 0, lines: 0 };
}

function tokenizeName(name) {
  return name
    .replace(/([a-z])([A-Z])/g, '$1_$2')
    .split(/[_\d]+/)
    .map(t => t.toLowerCase())
    .filter(t => t.length > 1 && !AFFINITY_STOPWORDS.has(t));
}

function clusterFunctions(analysis) {
  const { functions } = analysis;
  const result = new Map();

  // Use codemap sections or CSV cluster map if available
  if ((codemapSections && codemapSections.size > 0) || csvClusterMap.size > 0) {
    let clusterId = 0;
    const sectionNameToId = new Map();
    if (codemapSections) {
      for (const [sectionName, funcs] of codemapSections) {
        sectionNameToId.set(sectionName, clusterId);
        for (const fname of funcs) {
          if (functions.has(fname)) result.set(fname, clusterId);
        }
        clusterId++;
      }
    }
    // Assign from CSV cluster names (covers stream mode where codemapSections is empty)
    for (const fname of functions.keys()) {
      if (!result.has(fname) && csvClusterMap.has(fname)) {
        const csvCluster = csvClusterMap.get(fname);
        if (!sectionNameToId.has(csvCluster)) {
          sectionNameToId.set(csvCluster, clusterId++);
        }
        result.set(fname, sectionNameToId.get(csvCluster));
      }
    }
    // Nodes without a cluster assignment are simply left out of the map
    return result;
  }

  // Fallback: shared-state affinity clustering
  const names = [...functions.keys()];
  const n = names.length;
  if (n === 0) return result;
  function stateSet(info) {
    const s = new Set();
    info.reads.forEach(v => s.add(v));
    info.writes.forEach(v => s.add(v));
    info.rw.forEach(v => s.add(v));
    return s;
  }
  const states = names.map(name => stateSet(functions.get(name)));
  const cluster = new Array(n);
  for (let i = 0; i < n; i++) cluster[i] = i;
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      let shared = 0;
      for (const v of states[i]) { if (states[j].has(v)) shared++; }
      const fi = functions.get(names[i]), fj = functions.get(names[j]);
      if (fi.calls.has(names[j])) shared += 2;
      if (fj.calls.has(names[i])) shared += 2;
      if (shared >= 3) {
        const ci = cluster[i], cj = cluster[j];
        if (ci !== cj) { for (let k = 0; k < n; k++) { if (cluster[k] === cj) cluster[k] = ci; } }
      }
    }
  }
  const clusterMap = new Map();
  let nextId = 0;
  for (let i = 0; i < n; i++) {
    if (!clusterMap.has(cluster[i])) clusterMap.set(cluster[i], nextId++);
    result.set(names[i], clusterMap.get(cluster[i]));
  }
  return result;
}

function nameClusters(analysis, clusters) {
  const clusterNames = new Map();
  if (codemapSections && codemapSections.size > 0) {
    let clusterId = 0;
    for (const [section] of codemapSections) {
      clusterNames.set(clusterId, section);
      clusterId++;
    }
    // Name any CSV-derived clusters that aren't in the codemap
    for (const [fname, cid] of clusters) {
      if (!clusterNames.has(cid) && csvClusterMap.has(fname)) {
        clusterNames.set(cid, csvClusterMap.get(fname));
      }
    }
    const maxId = Math.max(...clusters.values());
    if (!clusterNames.has(maxId)) clusterNames.set(maxId, 'Other');
    return clusterNames;
  }
  const systemHints = [
    [/npc|villager|corn|farm/i, 'NPCs'],
    [/squirrel|plant|acorn/i, 'Squirrels'],
    [/wraith|ghost|night|combat|ashen|contam/i, 'Night/Combat'],
    [/terrain|height|noise|fbm/i, 'Terrain'],
    [/tree|rock|building|settlement|wall/i, 'World Gen'],
    [/camera|hud|project|axis/i, 'Camera/HUD'],
    [/wind|smoke|chimney/i, 'Wind/Smoke'],
    [/light|moon|sun|shadow|deferred/i, 'Lighting'],
    [/path|tramp|trail/i, 'Paths'],
    [/turret|zap|stone/i, 'Turrets'],
    [/player/i, 'Player'],
    [/animate|clock|dt/i, 'Main Loop'],
  ];
  for (const cid of new Set(clusters.values())) {
    const members = [...clusters.entries()].filter(([, c]) => c === cid).map(([f]) => f);
    const allText = members.join(' ');
    let name = null;
    for (const [re, label] of systemHints) {
      if (re.test(allText)) { name = label; break; }
    }
    clusterNames.set(cid, name || `system_${cid}`);
  }
  return clusterNames;
}

function computeAffinities(analysis, clusters, clusterNames) {
  const { functions } = analysis;
  const sectionToId = new Map();
  for (const [cid, name] of clusterNames) sectionToId.set(name, cid);

  const calledBy = new Map();
  for (const [fname, info] of functions) {
    for (const callee of info.calls) {
      if (!calledBy.has(callee)) calledBy.set(callee, new Set());
      calledBy.get(callee).add(fname);
    }
  }

  function tokenToCluster(token) {
    const section = SYSTEM_KEYWORDS.get(token);
    if (!section) return null;
    return sectionToId.get(section) ?? null;
  }

  const allAffinities = new Map();
  for (const [fname, info] of functions) {
    const scores = new Map();
    const addScore = (cid, w) => scores.set(cid, (scores.get(cid) || 0) + w);

    const primary = clusters.get(fname);
    if (primary != null) addScore(primary, 5.0);
    for (const token of tokenizeName(fname)) {
      const cid = tokenToCluster(token);
      if (cid != null) addScore(cid, 1.5);
    }
    for (const globals of [info.reads, info.writes, info.rw]) {
      for (const g of globals) {
        for (const token of tokenizeName(g)) {
          const cid = tokenToCluster(token);
          if (cid != null) addScore(cid, 0.5);
        }
      }
    }
    for (const callee of info.calls) {
      const cid = clusters.get(callee);
      if (cid != null) addScore(cid, 0.3);
    }
    const callers = calledBy.get(fname);
    if (callers) {
      for (const caller of callers) {
        const cid = clusters.get(caller);
        if (cid != null) addScore(cid, 0.2);
      }
    }

    const total = [...scores.values()].reduce((a, b) => a + b, 0);
    if (total > 0) {
      const normalized = new Map();
      for (const [cid, w] of scores) {
        const nw = w / total;
        if (nw >= 0.05) normalized.set(cid, nw);
      }
      allAffinities.set(fname, normalized);
    }
  }
  return allAffinities;
}

// ═══════════════════════════════════════════════════════
// EDGE LAYERS
// ═══════════════════════════════════════════════════════

// Each layer: { id, label, color, dash, defaultOn, defaultThreshold, maxThreshold,
//   compute(a, b, nameA, nameB) → edge[] where edge = { source, target, weight } }
// Returning an array lets directed layers emit edges in specific directions.
const EDGE_LAYERS = [
  {
    id: 'calls',
    label: 'Calls',
    desc: 'A --> B: function A calls function B',
    directed: true,
    color: '#af6',
    dash: null,
    defaultOn: true,
    defaultThreshold: 1,
    maxThreshold: 10,
    compute(a, b, nameA, nameB) {
      const edges = [];
      if (a.calls.has(nameB)) edges.push({ source: nameA, target: nameB, weight: 3 });
      if (b.calls.has(nameA)) edges.push({ source: nameB, target: nameA, weight: 3 });
      return edges;
    },
  },
  {
    id: 'calledBy',
    label: 'Called by',
    desc: 'A <-- B: function A is called by function B',
    directed: true,
    color: '#f6a',
    dash: '4,2',
    defaultOn: true,
    defaultThreshold: 1,
    maxThreshold: 10,
    compute(a, b, nameA, nameB) {
      // Reverse of calls: if A calls B, emit edge from B←A (B is called by A)
      const edges = [];
      if (a.calls.has(nameB)) edges.push({ source: nameB, target: nameA, weight: 3 });
      if (b.calls.has(nameA)) edges.push({ source: nameA, target: nameB, weight: 3 });
      return edges;
    },
  },
  {
    id: 'shared',
    label: 'Shared state',
    desc: 'A <-> B: both functions read or write the same globals',
    directed: false,
    color: '#4a9eff',
    dash: null,
    defaultOn: true,
    defaultThreshold: 3,
    maxThreshold: 15,
    compute(a, b, nameA, nameB) {
      const aState = new Set([...a.reads, ...a.writes, ...a.rw]);
      const bState = new Set([...b.reads, ...b.writes, ...b.rw]);
      let w = 0;
      for (const v of aState) { if (bState.has(v)) w++; }
      return w > 0 ? [{ source: nameA, target: nameB, weight: w }] : [];
    },
  },
  {
    id: 'sharedWrites',
    label: 'Shared writes',
    desc: 'A <-> B: both functions write to the same globals (mutation contention)',
    directed: false,
    color: '#cc5de8',
    dash: '6,3',
    defaultOn: true,
    defaultThreshold: 1,
    maxThreshold: 10,
    compute(a, b, nameA, nameB) {
      const aWrites = new Set([...a.writes, ...a.rw]);
      const bWrites = new Set([...b.writes, ...b.rw]);
      let w = 0;
      for (const v of aWrites) { if (bWrites.has(v)) w++; }
      return w > 0 ? [{ source: nameA, target: nameB, weight: w }] : [];
    },
  },
  {
    id: 'importance',
    label: 'Importance',
    desc: 'Both functions are high-importance (>=7) and share a structural link',
    directed: false,
    color: '#ffd43b',
    dash: '2,4',
    defaultOn: true,
    defaultThreshold: 4,
    maxThreshold: 10,
    compute(a, b, nameA, nameB) {
      const impA = codemapImportance.get(nameA) || 0;
      const impB = codemapImportance.get(nameB) || 0;
      // Both must be high-importance (>=7) and share some structural link
      if (impA < 7 || impB < 7) return [];
      const hasCall = a.calls.has(nameB) || b.calls.has(nameA);
      const aState = new Set([...a.reads, ...a.writes, ...a.rw]);
      const bState = new Set([...b.reads, ...b.writes, ...b.rw]);
      let shared = 0;
      for (const v of aState) { if (bState.has(v)) shared++; }
      if (!hasCall && shared === 0) return [];
      const w = Math.round(Math.sqrt(impA * impB));
      return [{ source: nameA, target: nameB, weight: w }];
    },
  },
  {
    id: 'uses',
    label: 'Reads global',
    desc: 'fn --> var: function reads this global variable (hypergraph only)',
    directed: true,
    color: '#888',
    dash: '3,3',
    defaultOn: true,
    defaultThreshold: 1,
    maxThreshold: 1,
    compute() { return []; }, // edges created directly in buildGraph for hypergraph mode
  },
  {
    id: 'writesTo',
    label: 'Writes to global',
    desc: 'fn --> var: function writes to this global variable (hypergraph only)',
    directed: true,
    color: '#cc5de8',
    dash: null,
    defaultOn: true,
    defaultThreshold: 1,
    maxThreshold: 1,
    compute() { return []; }, // edges created directly in buildGraph for hypergraph mode
  },
  {
    id: 'param',
    label: 'Parameter',
    desc: 'param --> fn: parameter flows into function (hypergraph only)',
    directed: true,
    color: '#6ecfcf',
    dash: '2,3',
    defaultOn: true,
    defaultThreshold: 1,
    maxThreshold: 1,
    compute() { return []; },
  },
  {
    id: 'init',
    label: 'Initializes',
    desc: 'var --> val: variable initialization value (hypergraph only)',
    directed: true,
    color: '#e8a55d',
    dash: '2,3',
    defaultOn: true,
    defaultThreshold: 1,
    maxThreshold: 1,
    compute() { return []; },
  },
  {
    id: 'key',
    label: 'Object key',
    desc: 'obj --> val: object property key (hypergraph only)',
    directed: true,
    color: '#c4a7e7',
    dash: '2,3',
    defaultOn: true,
    defaultThreshold: 1,
    maxThreshold: 1,
    compute() { return []; },
  },
];

// Auto-register unknown edge types discovered in precomputed CSV data
const AUTO_LAYER_COLORS = ['#9cc', '#c9a', '#ac9', '#ca9', '#9ac', '#a9c'];
let _autoColorIdx = 0;
function ensureEdgeLayer(typeId) {
  if (EDGE_LAYERS.find(l => l.id === typeId)) return;
  EDGE_LAYERS.push({
    id: typeId,
    label: typeId,
    desc: `Auto-discovered edge type: ${typeId} (hypergraph only)`,
    directed: true,
    color: AUTO_LAYER_COLORS[_autoColorIdx++ % AUTO_LAYER_COLORS.length],
    dash: '2,3',
    defaultOn: true,
    defaultThreshold: 1,
    maxThreshold: 1,
    compute() { return []; },
  });
  // Initialize pull layer state so it's enabled
  pullLayerState.set(typeId, 1);
}

function getEnabledEdgeLayers() {
  return EDGE_LAYERS.filter(l => (pullLayerState.get(l.id) || 0) > 0);
}

// Pull-layer state: per-layer opacity (0–1) controlling edge visibility and pull participation
const pullLayerState = new Map();
const pullLayerPrevOpacity = new Map(); // stored opacity before toggling off
let proximityBoost = 0.5; // 0–1, how much screen proximity at high zoom boosts edge opacity

// Count edge types in the current graph for sorting the panel
function getEdgeTypeCounts() {
  const counts = new Map();
  if (currentGraph && currentGraph.links) {
    for (const l of currentGraph.links) {
      counts.set(l.type, (counts.get(l.type) || 0) + 1);
    }
  }
  // Count memberOf from nodes with clusters
  if (currentNodes) {
    let clusterCount = 0;
    for (const n of currentNodes) {
      if (n.cluster != null && n.cluster >= 0) clusterCount++;
    }
    if (clusterCount > 0) counts.set('memberOf', clusterCount);
  }
  return counts;
}

// Compute which nodes should be hidden based on disabled edge types.
// A node is hidden if ALL its edges are of disabled types (no enabled edge connects it).
function computeHiddenNodes() {
  const hidden = new Set();
  if (!currentGraph || !currentGraph.links) return hidden;

  // Collect nodes that have at least one enabled edge
  const hasEnabledEdge = new Set();
  for (const l of currentGraph.links) {
    if ((pullLayerState.get(l.type) || 0) > 0) {
      hasEnabledEdge.add(l.source);
      hasEnabledEdge.add(l.target);
    }
  }

  // Cluster membership counts as a connection if memberOf is enabled
  const memberOfEnabled = (pullLayerState.get('memberOf') || 0) > 0;

  if (currentNodes) {
    for (const n of currentNodes) {
      // Nodes with no edges at all stay visible
      const degree = currentGraph.nodeDegree.get(n.id) || 0;
      if (degree === 0) continue;
      // If node has at least one enabled edge, it's visible
      if (hasEnabledEdge.has(n.id)) continue;
      // If memberOf is enabled and node has a cluster, it's visible
      if (memberOfEnabled && n.cluster != null && n.cluster >= 0) continue;
      hidden.add(n.id);
    }
  }
  return hidden;
}

let _hiddenNodes = new Set();

function applyNodeHiding() {
  _hiddenNodes = computeHiddenNodes();
  if (!currentNodes) return;
  gNodes.selectAll('.node').each(function(d) {
    d3.select(this).style('display', _hiddenNodes.has(d.id) ? 'none' : null);
  });
  gLabels.selectAll('text').each(function(d) {
    d3.select(this).style('display', _hiddenNodes.has(d.id) ? 'none' : null);
  });
}

let _lastLayerCount = 0; // track how many layers we've rendered to detect new ones
let _layerSortOrder = null; // frozen sort order after first graph build

function initPullLayerUI() {
  const container = document.getElementById('pull-layers');
  // Clear everything after the title
  while (container.children.length > 1) container.removeChild(container.lastChild);

  const counts = getEdgeTypeCounts();

  // Ensure memberOf layer exists
  if (!EDGE_LAYERS.find(l => l.id === 'memberOf')) {
    EDGE_LAYERS.push({
      id: 'memberOf',
      label: 'Clusters',
      desc: 'Cluster membership: toggling off hides cluster hulls and labels',
      directed: false,
      color: '#777',
      dash: null,
      defaultOn: true,
      defaultThreshold: 1,
      maxThreshold: 1,
      compute() { return []; },
    });
    if (!pullLayerState.has('memberOf')) pullLayerState.set('memberOf', 1);
  }

  // Sort layers by frequency (descending) on first build, then freeze order
  if (!_layerSortOrder) {
    _layerSortOrder = [...EDGE_LAYERS].sort((a, b) => {
      return (counts.get(b.id) || 0) - (counts.get(a.id) || 0);
    }).map(l => l.id);
  }
  // Use frozen order, appending any new layers at the end
  const orderMap = new Map(_layerSortOrder.map((id, i) => [id, i]));
  const sortedLayers = [...EDGE_LAYERS].sort((a, b) => {
    return (orderMap.get(a.id) ?? 999) - (orderMap.get(b.id) ?? 999);
  });
  // Update frozen order with any new entries
  for (const l of sortedLayers) {
    if (!orderMap.has(l.id)) _layerSortOrder.push(l.id);
  }

  for (const layer of sortedLayers) {
    // Preserve existing opacity if already set, else use default
    if (!pullLayerState.has(layer.id)) {
      pullLayerState.set(layer.id, layer.defaultOn ? 1.0 : 0);
    }
    const currentOpacity = pullLayerState.get(layer.id) || 0;
    const row = document.createElement('div');
    row.className = 'layer-row';

    // Swatch + label
    const swatch = document.createElement('span');
    swatch.className = 'swatch';
    swatch.style.background = layer.color;
    const nameSpan = document.createElement('span');
    nameSpan.className = 'layer-name';
    nameSpan.textContent = layer.label;
    if (layer.desc) nameSpan.title = layer.desc;
    row.appendChild(swatch);
    row.appendChild(nameSpan);

    // Opacity slider
    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min = 0;
    slider.max = 100;
    slider.value = currentOpacity * 100;
    slider.className = 'pull-slider';
    slider.setAttribute('data-layer-id', layer.id);
    const valSpan = document.createElement('span');
    valSpan.className = 'pull-val';
    valSpan.textContent = currentOpacity > 0 ? Math.round(currentOpacity * 100) : 'off';
    slider.addEventListener('input', () => {
      // Manual slider interaction disables zoom breakpoints
      zoomBreakpointsEnabled = false;
      const zbCheckbox = document.getElementById('zoom-breakpoints');
      if (zbCheckbox) zbCheckbox.checked = false;
      const v = parseInt(slider.value) / 100;
      const oldV = pullLayerState.get(layer.id) || 0;
      pullLayerState.set(layer.id, v);
      valSpan.textContent = v > 0 ? Math.round(v * 100) : 'off';
      row.classList.toggle('disabled', v <= 0);
      if (layer.id === 'memberOf') {
        // Toggle hull and cluster label visibility
        const showHulls = v > 0;
        document.getElementById('show-hulls').checked = showHulls;
        document.getElementById('show-cluster-labels').checked = showHulls;
        if (showHulls && currentNodes) {
          currentHullClusterIds = [...new Set(currentNodes.filter(n => n.cluster != null && n.cluster >= 0).map(n => n.cluster))];
          renderHulls();
          renderClusterLabels();
        } else {
          currentHullClusterIds = null;
          gHulls.selectAll('path').remove();
          gClusterLabels.selectAll('text').attr('opacity', 0);
        }
        applyNodeHiding();
      } else if ((oldV > 0) !== (v > 0)) {
        rebuild();
        applyNodeHiding();
      } else {
        updateEdgeOpacities();
      }
    });
    row.appendChild(slider);
    row.appendChild(valSpan);

    // Toggle on/off by clicking swatch or name
    if (currentOpacity <= 0) row.classList.add('disabled');
    const toggleLayer = () => {
      const current = pullLayerState.get(layer.id) || 0;
      if (current > 0) {
        pullLayerPrevOpacity.set(layer.id, current);
        pullLayerState.set(layer.id, 0);
        slider.value = 0;
        valSpan.textContent = 'off';
        row.classList.add('disabled');
      } else {
        const restore = pullLayerPrevOpacity.get(layer.id) || 1;
        pullLayerState.set(layer.id, restore);
        slider.value = Math.round(restore * 100);
        valSpan.textContent = Math.round(restore * 100);
        row.classList.remove('disabled');
      }
      if (layer.id === 'memberOf') {
        const showHulls = (pullLayerState.get('memberOf') || 0) > 0;
        document.getElementById('show-hulls').checked = showHulls;
        document.getElementById('show-cluster-labels').checked = showHulls;
        if (showHulls && currentNodes) {
          currentHullClusterIds = [...new Set(currentNodes.filter(n => n.cluster != null && n.cluster >= 0).map(n => n.cluster))];
          renderHulls();
          renderClusterLabels();
        } else {
          currentHullClusterIds = null;
          gHulls.selectAll('path').remove();
          gClusterLabels.selectAll('text').attr('opacity', 0);
        }
        applyNodeHiding();
      } else {
        rebuild();
        applyNodeHiding();
      }
    };
    swatch.addEventListener('click', toggleLayer);
    nameSpan.addEventListener('click', toggleLayer);

    container.appendChild(row);
  }

  // Proximity boost slider
  const proxRow = document.createElement('div');
  proxRow.className = 'layer-row';
  proxRow.style.marginTop = '6px';
  proxRow.style.borderTop = '1px solid #2a2a35';
  proxRow.style.paddingTop = '6px';
  const proxName = document.createElement('span');
  proxName.className = 'layer-name';
  proxName.textContent = 'Proximity';
  const proxSlider = document.createElement('input');
  proxSlider.type = 'range';
  proxSlider.min = 0;
  proxSlider.max = 100;
  proxSlider.value = proximityBoost * 100;
  proxSlider.className = 'pull-slider';
  const proxVal = document.createElement('span');
  proxVal.className = 'pull-val';
  proxVal.textContent = Math.round(proximityBoost * 100);
  proxSlider.addEventListener('input', () => {
    proximityBoost = parseInt(proxSlider.value) / 100;
    proxVal.textContent = proximityBoost > 0 ? Math.round(proximityBoost * 100) : 'off';
    updateEdgeOpacities();
  });
  proxRow.appendChild(proxName);
  proxRow.appendChild(proxSlider);
  proxRow.appendChild(proxVal);
  container.appendChild(proxRow);

  _lastLayerCount = EDGE_LAYERS.length;
}

// Refresh panel when new edge types appear (e.g. during streaming)
function refreshPullLayerUI() {
  if (EDGE_LAYERS.length !== _lastLayerCount) {
    initPullLayerUI();
  }
}

// Sync slider DOM to current pullLayerState values (used by zoom breakpoints)
function syncPullLayerSliders() {
  const container = document.getElementById('pull-layers');
  if (!container) return;
  for (const slider of container.querySelectorAll('.pull-slider[data-layer-id]')) {
    const lid = slider.getAttribute('data-layer-id');
    const v = pullLayerState.get(lid) || 0;
    slider.value = Math.round(v * 100);
    const row = slider.closest('.layer-row');
    if (row) {
      const valSpan = row.querySelector('.pull-val');
      if (valSpan) valSpan.textContent = v > 0 ? Math.round(v * 100) : 'off';
      row.classList.toggle('disabled', v <= 0);
    }
  }
}

function getPullAdjacency() {
  if (!currentGraph) return new Map();
  const adj = new Map();
  for (const n of currentGraph.nodes) adj.set(n.id, new Set());
  for (const l of currentGraph.links) {
    if ((pullLayerState.get(l.type) || 0) <= 0) continue;
    adj.get(l.source)?.add(l.target);
    adj.get(l.target)?.add(l.source);
  }
  return adj;
}

function edgeOpacity(l, nodeDegree) {
  // Fade edges connected to deep nodes (arg/param/value) — matches node fade
  if (currentGraph) {
    const sn = currentGraph.nodeMap.get(l.source);
    const tn = currentGraph.nodeMap.get(l.target);
    const sDeep = sn && sn.minZoom ? Math.max(0, Math.min(1, (currentK - sn.minZoom) / 2)) : 1;
    const tDeep = tn && tn.minZoom ? Math.max(0, Math.min(1, (currentK - tn.minZoom) / 2)) : 1;
    const deepFade = Math.min(sDeep, tDeep);
    if (deepFade <= 0) return 0;
    if (deepFade < 1) return deepFade * 0.5; // structural edges fade in gently
  }
  const layerOp = pullLayerState.get(l.type) || 0;
  if (layerOp <= 0) return 0.02;
  const maxDeg = Math.max(nodeDegree.get(l.source) || 1, nodeDegree.get(l.target) || 1);
  const density = Math.max(0.15, 1 / Math.sqrt(maxDeg));
  const sImp = codemapImportance.get(l.source) || 3;
  const tImp = codemapImportance.get(l.target) || 3;
  const imp = Math.min(1, Math.sqrt(sImp * tImp) / 7);
  let base = layerOp * density * (0.4 + imp * 0.6);

  // Proximity boost: at high zoom, nearby edges get brighter
  if (proximityBoost > 0 && currentK >= 3 && currentGraph) {
    const sn = currentGraph.nodeMap.get(l.source);
    const tn = currentGraph.nodeMap.get(l.target);
    if (sn && tn) {
      const screenDist = Math.hypot(sn.x - tn.x, sn.y - tn.y) * currentK;
      // Ramp: full boost when screenDist < 200px, fades to 0 at 800px
      const proxFactor = Math.max(0, 1 - screenDist / 800);
      // Zoom ramp: starts at k=3, full effect at k=10+
      const zoomRamp = Math.min(1, (currentK - 3) / 7);
      base += proximityBoost * proxFactor * zoomRamp;
    }
  }

  return Math.max(0.02, Math.min(1, base));
}

function updateEdgeOpacities() {
  if (!currentGraph || !gLinks) return;
  const nodeDegree = currentGraph.nodeDegree;
  gLinks.selectAll('.link')
    .transition().duration(200)
    .attr('stroke-opacity', l => edgeOpacity(l, nodeDegree));
  gLinks.selectAll('.arrow')
    .transition().duration(200)
    .attr('fill-opacity', l => edgeOpacity(l, nodeDegree));
}

// ═══════════════════════════════════════════════════════
// GRAPH BUILDING
// ═══════════════════════════════════════════════════════
function buildGraph(analysis, clusters, clusterNames, affinities, opts) {
  const { functions } = analysis;
  const nodes = [];
  const links = [];
  const nodeMap = new Map();
  const { viewMode } = opts;
  const enabledLayers = getEnabledEdgeLayers();
  const sectionToId = new Map();
  for (const [cid, name] of clusterNames) sectionToId.set(name, cid);

  // Function nodes
  for (const [name, info] of functions) {
    const clusterId = clusters.has(name) ? clusters.get(name) : null;
    const nodeAffinities = affinities.get(name) || (clusterId != null ? new Map([[clusterId, 1.0]]) : new Map());
    nodes.push({
      id: name,
      type: 'function',
      cluster: clusterId,
      clusterName: clusterId != null ? (clusterNames.get(clusterId) || 'misc') : null,
      affinities: nodeAffinities,
      info,
      radius: Math.max(4, (codemapImportance.has(name) ? codemapImportance.get(name) : 3) * 2),
      color: clusterId != null ? CLUSTER_COLORS[clusterId % CLUSTER_COLORS.length] : '#555',
    });
    nodeMap.set(name, nodes[nodes.length - 1]);
  }

  // Use precomputed edges from CSV when available; otherwise compute from AST data
  if (analysis.precomputedEdges) {
    const enabledIds = new Set(enabledLayers.map(l => l.id));
    const layerThresholds = new Map(enabledLayers.map(l => [l.id, l.defaultThreshold]));

    // Known function-to-function edge types (shown in all view modes)
    const fnToFnTypes = new Set(['calls', 'calledBy', 'shared', 'sharedWrites', 'importance']);
    // Value types: deep nodes that only appear at max zoom
    const valueTypes = new Set(['number', 'string', 'boolean', 'null', 'new', 'array', 'object', 'expression', 'ref', 'arrow', 'regex', 'argument']);
    const nt = analysis.nodeTypes || new Map();

    for (const e of analysis.precomputedEdges) {
      // Auto-register unknown edge types
      ensureEdgeLayer(e.type);

      // Structural/hypergraph edges: only include in hypergraph mode
      if (!fnToFnTypes.has(e.type)) {
        if (viewMode !== 'hypergraph') continue;
        // Create source/target nodes on-the-fly if not already present
        for (const nid of [e.source, e.target]) {
          if (nodeMap.has(nid)) continue;
          const gScores = new Map();
          const addGScore = (cid, w) => gScores.set(cid, (gScores.get(cid) || 0) + w);
          const csvType = nt.get(nid) || 'global';
          const isChildNode = csvType === 'parameter' || csvType === 'argument' || csvType === 'property';
          // For child nodes (param/arg/property), strongly inherit parent's cluster
          // For others, use keyword heuristics
          if (!isChildNode) {
            for (const token of tokenizeName(nid)) {
              const section = SYSTEM_KEYWORDS.get(token);
              if (section) {
                const cid = sectionToId.get(section);
                if (cid != null) addGScore(cid, 2.0);
              }
            }
          }
          // Inherit cluster from the other endpoint if known
          const otherEnd = nid === e.source ? e.target : e.source;
          const otherNode = nodeMap.get(otherEnd);
          const parentCluster = otherNode ? otherNode.cluster : clusters.get(otherEnd);
          if (parentCluster != null) {
            addGScore(parentCluster, isChildNode ? 10.0 : 1.0);
          }
          const gTotal = [...gScores.values()].reduce((a, b) => a + b, 0);
          const gAffinities = new Map();
          let bestCluster = -1, bestWeight = 0;
          if (gTotal > 0) {
            for (const [cid, w] of gScores) {
              const nw = w / gTotal;
              if (nw >= 0.05) gAffinities.set(cid, nw);
              if (nw > bestWeight) { bestCluster = cid; bestWeight = nw; }
            }
          }
          // Determine visual properties based on CSV node type
          let nodeColor = '#555', nodeRadius = 3, minZoom = 0;
          if (valueTypes.has(csvType)) {
            nodeColor = '#666'; nodeRadius = 2; minZoom = 10;
          } else if (csvType === 'parameter') {
            nodeColor = '#888'; nodeRadius = 2.5; minZoom = 10;
          } else if (csvType === 'property') {
            nodeColor = '#666'; nodeRadius = 2; minZoom = 10;
          }
          const gNode = {
            id: nid, type: csvType, cluster: bestCluster >= 0 ? bestCluster : null,
            clusterName: bestCluster >= 0 ? (clusterNames.get(bestCluster) || 'misc') : null,
            affinities: gAffinities, radius: nodeRadius, color: nodeColor,
            minZoom,
          };
          nodes.push(gNode);
          nodeMap.set(nid, gNode);
        }
      }
      // Check layer enabled: use snapshot for known layers, live state for auto-registered
      const isEnabled = enabledIds.has(e.type) || (pullLayerState.get(e.type) || 0) > 0;
      if (!isEnabled) continue;
      const threshold = layerThresholds.get(e.type) || 1;
      if (e.weight >= threshold) {
        if (nodeMap.has(e.source) && nodeMap.has(e.target)) {
          links.push({ source: e.source, target: e.target, type: e.type, weight: e.weight });
        }
      }
    }
  } else {
    if (viewMode === 'hypergraph') {
      // Add global variable nodes
      const globalUsage = new Map();   // gname -> Set of fnames
      const globalWriters = new Map(); // gname -> Set of fnames that write to it
      for (const [fname, info] of functions) {
        const writerSet = new Set([...info.writes, ...info.rw]);
        for (const s of [info.reads, info.writes, info.rw]) {
          for (const g of s) {
            if (!globalUsage.has(g)) globalUsage.set(g, new Set());
            globalUsage.get(g).add(fname);
          }
        }
        for (const g of writerSet) {
          if (!globalWriters.has(g)) globalWriters.set(g, new Set());
          globalWriters.get(g).add(fname);
        }
      }
      for (const [gname, users] of globalUsage) {
        if (users.size < 2 || nodeMap.has(gname)) continue;
        const gScores = new Map();
        const addGScore = (cid, w) => gScores.set(cid, (gScores.get(cid) || 0) + w);
        for (const token of tokenizeName(gname)) {
          const section = SYSTEM_KEYWORDS.get(token);
          if (section) {
            const cid = sectionToId.get(section);
            if (cid != null) addGScore(cid, 2.0);
          }
        }
        for (const fname of users) {
          addGScore(clusters.get(fname) ?? 0, 1.0);
        }
        const gTotal = [...gScores.values()].reduce((a, b) => a + b, 0);
        const gAffinities = new Map();
        let bestCluster = 0, bestWeight = 0;
        if (gTotal > 0) {
          for (const [cid, w] of gScores) {
            const nw = w / gTotal;
            if (nw >= 0.05) gAffinities.set(cid, nw);
            if (nw > bestWeight) { bestCluster = cid; bestWeight = nw; }
          }
        }
        const node = {
          id: gname, type: 'global', cluster: bestCluster,
          clusterName: clusterNames.get(bestCluster) || 'misc',
          affinities: gAffinities,
          radius: Math.max(3, Math.sqrt(users.size) * 2),
          color: '#555',
        };
        nodes.push(node);
        nodeMap.set(gname, node);
        const writers = globalWriters.get(gname) || new Set();
        for (const fname of users) {
          const edgeType = writers.has(fname) ? 'writesTo' : 'uses';
          links.push({ source: fname, target: gname, type: edgeType, weight: 1 });
        }
      }
    }

    // Function-to-function edges — one pass per enabled layer (all view modes)
    {
      const names = [...functions.keys()];
      for (const layer of enabledLayers) {
        const threshold = layer.defaultThreshold;
        for (let i = 0; i < names.length; i++) {
          for (let j = i + 1; j < names.length; j++) {
            const a = functions.get(names[i]);
            const b = functions.get(names[j]);
            const edges = layer.compute(a, b, names[i], names[j]);
            for (const e of edges) {
              if (e.weight >= threshold) {
                links.push({ source: e.source, target: e.target, type: layer.id, weight: e.weight });
              }
            }
          }
        }
      }
    }
  }

  // Build adjacency (enabled edges only — used for physics/rendering)
  const adjacency = new Map();
  const nodeDegree = new Map();
  for (const n of nodes) { adjacency.set(n.id, new Set()); nodeDegree.set(n.id, 0); }
  const edgeWeights = new Map();
  for (const l of links) {
    adjacency.get(l.source)?.add(l.target);
    adjacency.get(l.target)?.add(l.source);
    nodeDegree.set(l.source, (nodeDegree.get(l.source) || 0) + 1);
    nodeDegree.set(l.target, (nodeDegree.get(l.target) || 0) + 1);
    edgeWeights.set(l.source + '\0' + l.target, l.weight || 1);
    edgeWeights.set(l.target + '\0' + l.source, l.weight || 1);
  }

  // Full adjacency (ALL edges regardless of layer state — used for structural
  // operations like drag-follow, cluster membership, reachability)
  const fullAdjacency = new Map();
  for (const n of nodes) fullAdjacency.set(n.id, new Set());
  for (const l of links) {
    fullAdjacency.get(l.source)?.add(l.target);
    fullAdjacency.get(l.target)?.add(l.source);
  }
  // Also include disabled-layer edges from precomputed edges
  if (analysis && analysis.precomputedEdges) {
    for (const e of analysis.precomputedEdges) {
      if (e.type === 'memberOf') continue; // cluster edges are structural, not navigational
      if (fullAdjacency.has(e.source) && fullAdjacency.has(e.target)) {
        fullAdjacency.get(e.source).add(e.target);
        fullAdjacency.get(e.target).add(e.source);
      }
    }
  }

  return { nodes, links, nodeMap, adjacency, fullAdjacency, nodeDegree, edgeWeights };
}

// ═══════════════════════════════════════════════════════
// LAYOUT ENGINE
// ═══════════════════════════════════════════════════════
function computeLayout(nodes, links, opts = {}) {
  const { isWarmRestart, spatialEdgesMap } = opts;

  if (isWarmRestart) {
    warmRestart(nodes, links);
    return;
  }

  // Group nodes by cluster
  const clusterGroups = new Map();
  for (const n of nodes) {
    const cid = n.cluster ?? -1;
    if (!clusterGroups.has(cid)) clusterGroups.set(cid, []);
    clusterGroups.get(cid).push(n);
  }

  const nodeMap = new Map(nodes.map(n => [n.id, n]));

  // Phase 1: Intra-cluster layout
  for (const [cid, members] of clusterGroups) {
    layoutClusterInternal(members, links, nodeMap);
  }

  // Phase 2: Compute cluster bounding circles
  const clusterBounds = new Map();
  for (const [cid, members] of clusterGroups) {
    let maxR = 0;
    for (const n of members) {
      const d = Math.sqrt(n.x * n.x + n.y * n.y) + (n.radius || 4);
      if (d > maxR) maxR = d;
    }
    clusterBounds.set(cid, { radius: maxR + 25, cx: 0, cy: 0 });
  }

  // Phase 3: Pack clusters
  packClusters(clusterBounds, links, nodeMap, clusterGroups);

  // Phase 4: Apply cluster offsets to all nodes
  for (const [cid, bounds] of clusterBounds) {
    const members = clusterGroups.get(cid);
    if (!members) continue;
    for (const n of members) {
      n.x += bounds.cx;
      n.y += bounds.cy;
    }
  }

  // Phase 5: Apply spatial affinity nudges
  if (spatialEdgesMap) {
    for (let iter = 0; iter < 10; iter++) {
      for (const [key, edge] of Object.entries(spatialEdgesMap)) {
        const [idA, idB] = key.split('\0');
        const a = nodeMap.get(idA), b = nodeMap.get(idB);
        if (!a || !b) continue;
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const pull = edge.weight * 0.5;
        if (dist > 50) {
          a.x += (dx / dist) * pull;
          a.y += (dy / dist) * pull;
          b.x -= (dx / dist) * pull;
          b.y -= (dy / dist) * pull;
        }
      }
    }
  }

  // Phase 6: Snap structural nodes near their parent nodes
  // arg/param nodes go along caller→callee edge vectors
  // init/key/value nodes go near their connected parent
  const structuralTypes = new Set(['parameter', 'argument', 'number', 'string', 'boolean',
    'null', 'new', 'array', 'object', 'expression', 'ref', 'arrow', 'regex', 'property']);
  const structuralNodes = nodes.filter(n => structuralTypes.has(n.type) || n.minZoom > 0);
  if (structuralNodes.length > 0) {
    positionDeepNodes(structuralNodes, links, nodeMap);
  }

  // Zero velocities
  for (const n of nodes) { n.vx = 0; n.vy = 0; }
}

function layoutClusterInternal(members, allLinks, nodeMap) {
  if (members.length === 0) return;
  if (members.length === 1) { members[0].x = 0; members[0].y = 0; return; }
  if (members.length === 2) {
    members[0].x = -20; members[0].y = 0;
    members[1].x = 20; members[1].y = 0;
    return;
  }

  // Extract intra-cluster links
  const memberSet = new Set(members.map(n => n.id));
  const intraLinks = allLinks.filter(l => memberSet.has(l.source) && memberSet.has(l.target));

  // Sort by importance (large nodes first, near center)
  const sorted = [...members].sort((a, b) => (b.radius || 4) - (a.radius || 4));

  // Initialize in a circle
  const spacing = Math.max(25, Math.sqrt(members.length) * 15);
  for (let i = 0; i < sorted.length; i++) {
    const angle = (2 * Math.PI * i) / sorted.length;
    const r = spacing * (0.2 + 0.8 * (i / sorted.length));
    sorted[i].x = Math.cos(angle) * r;
    sorted[i].y = Math.sin(angle) * r;
    sorted[i].vx = 0;
    sorted[i].vy = 0;
  }

  const localMap = new Map(members.map(n => [n.id, n]));

  // Mini force simulation
  for (let iter = 0; iter < LAYOUT_ITERS; iter++) {
    const alpha = 1 - iter / LAYOUT_ITERS;
    const a2 = alpha * alpha;

    // Node-node repulsion
    for (let i = 0; i < members.length; i++) {
      for (let j = i + 1; j < members.length; j++) {
        const a = members[i], b = members[j];
        let dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
        const minDist = (a.radius || 4) + (b.radius || 4) + 10;
        if (dist < minDist * 2.5) {
          const force = -a2 * 3 / (dist * dist + 1);
          a.vx += dx * force;
          a.vy += dy * force;
          b.vx -= dx * force;
          b.vy -= dy * force;
        }
      }
    }

    // Link attraction
    for (const link of intraLinks) {
      const s = localMap.get(link.source);
      const t = localMap.get(link.target);
      if (!s || !t) continue;
      const dx = t.x - s.x, dy = t.y - s.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
      const targetDist = (s.radius || 4) + (t.radius || 4) + 15;
      const force = (dist - targetDist) * a2 * 0.04 * Math.min(3, (link.weight || 1));
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      s.vx += fx; s.vy += fy;
      t.vx -= fx; t.vy -= fy;
    }

    // Center gravity (importance-weighted: important nodes pulled more toward center)
    for (const n of members) {
      const imp = (n.radius || 4) / 20;
      n.vx -= n.x * a2 * 0.02 * (1 + imp);
      n.vy -= n.y * a2 * 0.02 * (1 + imp);
    }

    // Update positions
    for (const n of members) {
      n.x += n.vx;
      n.y += n.vy;
      n.vx *= 0.5;
      n.vy *= 0.5;
    }

    // Hard collision resolution
    for (let i = 0; i < members.length; i++) {
      for (let j = i + 1; j < members.length; j++) {
        const a = members[i], b = members[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
        const minDist = (a.radius || 4) + (b.radius || 4) + 6;
        if (dist < minDist) {
          const push = (minDist - dist) * 0.5;
          const nx = (dx / dist) * push;
          const ny = (dy / dist) * push;
          a.x -= nx; a.y -= ny;
          b.x += nx; b.y += ny;
        }
      }
    }
  }

  // Center the cluster at origin
  let cx = 0, cy = 0;
  for (const n of members) { cx += n.x; cy += n.y; }
  cx /= members.length; cy /= members.length;
  for (const n of members) { n.x -= cx; n.y -= cy; }
}

// Position argument/parameter nodes along the caller→callee edge vector.
// arg nodes: ID pattern "caller>callee@line:index" — placed near the caller side
// param nodes: ID pattern "funcName:paramName" — placed near the callee side
// Uses 'binds' edges to find arg→param pairs and infer the caller→callee vector.
function positionDeepNodes(deepNodes, allLinks, nodeMap) {
  if (deepNodes.length === 0) return;

  // Build a lookup: binds edges connect argument → parameter
  // arg edges connect caller → argument
  // param edges connect parameter → function (source=param, target=function per ast.mjs)
  const bindsMap = new Map(); // argId → paramId
  const argOwner = new Map(); // argId → callerId (from 'arg' edges)
  const paramOwner = new Map(); // paramId → functionId (from 'param' edges)

  for (const link of allLinks) {
    if (link.type === 'binds') bindsMap.set(link.source, link.target);
    if (link.type === 'arg') argOwner.set(link.target, link.source);
    if (link.type === 'param') paramOwner.set(link.source, link.target);
  }

  // For each param node, find its owning function from param edges
  // For each arg node, find caller from arg edges and callee via ID pattern
  for (const dn of deepNodes) {
    let callerNode = null, calleeNode = null;
    let t = 0.5; // interpolation: 0 = caller, 1 = callee
    let placed = true;

    if (dn.type === 'argument') {
      // Argument ID: "caller>callee@line:index"
      const callerId = argOwner.get(dn.id);
      const matchCallee = dn.id.match(/^[^>]+>([^@]+)@/);
      const calleeId = matchCallee ? matchCallee[1] : null;
      callerNode = callerId ? nodeMap.get(callerId) : null;
      calleeNode = calleeId ? nodeMap.get(calleeId) : null;
      // Parse arg index for stacking
      const matchIdx = dn.id.match(/:(\d+)$/);
      const idx = matchIdx ? parseInt(matchIdx[1]) : 0;
      t = 0.25 + idx * 0.03; // args cluster near caller (25-35% along edge)
    } else if (dn.type === 'parameter') {
      // Parameter ID: "funcName:paramName"
      const funcId = paramOwner.get(dn.id);
      calleeNode = funcId ? nodeMap.get(funcId) : null;
      // Find a caller that has a binds edge targeting this param
      for (const [argId, paramId] of bindsMap) {
        if (paramId === dn.id) {
          const cId = argOwner.get(argId);
          if (cId) { callerNode = nodeMap.get(cId); break; }
        }
      }
      // Parse param index by counting params of the same function
      const colonIdx = dn.id.indexOf(':');
      t = 0.75; // params cluster near callee (75% along edge)
    }

    if (callerNode && calleeNode && callerNode !== calleeNode) {
      // Interpolate along the caller→callee vector
      const dx = calleeNode.x - callerNode.x;
      const dy = calleeNode.y - callerNode.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      // Perpendicular offset to avoid overlap between multiple args/params
      const px = -dy / dist;
      const py = dx / dist;
      const matchIdx = dn.id.match(/:(\d+)$/);
      const idx = matchIdx ? parseInt(matchIdx[1]) : 0;
      const perpOffset = (idx - 0.5) * 4; // spread perpendicular to edge
      dn.x = callerNode.x + dx * t + px * perpOffset;
      dn.y = callerNode.y + dy * t + py * perpOffset;
    } else if (callerNode) {
      // Only have one endpoint — place near it with small offset
      dn.x = callerNode.x + (Math.random() - 0.5) * 8;
      dn.y = callerNode.y + (Math.random() - 0.5) * 8;
    } else if (calleeNode) {
      dn.x = calleeNode.x + (Math.random() - 0.5) * 8;
      dn.y = calleeNode.y + (Math.random() - 0.5) * 8;
    } else {
      placed = false;
    }
    if (!placed) continue; // handle below in generic pass
    dn.vx = 0;
    dn.vy = 0;
  }

  // Generic pass: place any unpositioned structural nodes near their
  // first connected neighbor (via any edge type)
  const edgeNeighbors = new Map(); // nodeId → [neighborId, ...]
  for (const link of allLinks) {
    if (!edgeNeighbors.has(link.source)) edgeNeighbors.set(link.source, []);
    if (!edgeNeighbors.has(link.target)) edgeNeighbors.set(link.target, []);
    edgeNeighbors.get(link.source).push(link.target);
    edgeNeighbors.get(link.target).push(link.source);
  }
