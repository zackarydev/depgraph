function getOpts() {
  return {
    viewMode: document.getElementById('view-mode').value,
  };
}

function rebuild() {
  if (!analysisResult) return;
  const clusters = clusterFunctions(analysisResult);
  const clusterNames = nameClusters(analysisResult, clusters);
  currentClusterNames = clusterNames;
  const affinities = computeAffinities(analysisResult, clusters, clusterNames);
  const graph = buildGraph(analysisResult, clusters, clusterNames, affinities, getOpts());
  renderGraph(graph, analysisResult, clusters, clusterNames);
  applySemanticZoom();
  applyNodeHiding();
}

  savedPositions.clear();
  lockedNodes.clear();
  selectedNodes.clear();
  initialLayoutPositions.clear();
  spatialMemory = { arrangements: [], spatialEdges: {}, clickLog: [] };
  arrangementIndex = -1;
  localStorage.removeItem(SPATIAL_KEY);
  gNodes.selectAll('circle').classed('selected-glow', false);
  updateLockUI();
  rebuild();
});

document.getElementById('arr-fwd').addEventListener('click', () => navigateArrangement(1));

// FOCUS SSE
// ═══════════════════════════════════════════════════════
let currentFocus = null;

// ═══════════════════════════════════════════════════════
// CSV PARSING & GRAPH SSE
// ═══════════════════════════════════════════════════════
// parseCSVLine + parseHistoryCSV live in prototypes/csv-parse.js
const parseCSVLine = window.csvParse.parseCSVLine;
const parseHistoryCSV = window.csvParse.parseHistoryCSV;

// ── Load user-actions.csv on startup (Plan 2 Option E) ───────────────────
// Converts DISTANCE rows from the user-action log into distance-edge domain
// objects and hands them to the user-distances module. This function is the
// transport/domain boundary: CSV lives here, Edges flow downstream.
// Subsequent updates arrive via local drag emission and the /graph-events
// SSE rebroadcast, both of which also produce Edge objects.
async function loadUserActions() {
  try {
    const r = await fetch('/runtime/user-actions.csv');
    if (!r.ok) return;
    const text = await r.text();
    const edges = [];
    const lines = text.trim().split('\n');
    for (let i = 1; i < lines.length; i++) { // skip header
      const line = lines[i];
      if (!line) continue;
      const f = parseCSVLine(line);
      if (f[1] !== 'DISTANCE') continue;
      edges.push({
        source: f[3],
        target: f[4],
        type: 'distance',
        weight: Number(f[5]),
        t: Number(f[0]),
      });
    }
    const applied = userDistancesModule.applyEdges(edges);
    console.log(`[user-actions] applied ${applied} distance edges → ${userDistancesModule.edgeCount()} unique pairs`);
  } catch (e) {
    console.warn('[user-actions] load failed:', e.message);
  }
}

function buildAnalysisFromCSV(nodes, edges) {
  // Build the {functions, globals} structure that downstream code expects
  const functions = new Map();
  const globals = new Map();
  const nodeTypes = new Map(); // id → CSV node type (for zoom-level visibility)

  for (const n of nodes) {
    nodeTypes.set(n.id, n.type);
    if (n.type === 'function') {
      functions.set(n.id, {
        reads: new Set(), writes: new Set(), rw: new Set(), calls: new Set(),
        params: new Set(), locals: new Set(),
        line: n.line, endLine: n.line, lines: 1,
      });
    } else if (n.type === 'const' || n.type === 'let' || n.type === 'var' || n.type === 'global') {
      globals.set(n.id, { kind: n.type === 'global' ? 'const' : n.type, line: n.line });
    }
    // parameter, number, string, null, etc. — tracked via nodeTypes but not in functions/globals
  }

  // Populate reads/writes/calls from edges
  for (const e of edges) {
    const fn = functions.get(e.source);
    if (!fn) continue;
    if (e.type === 'calls') fn.calls.add(e.target);
    else if (e.type === 'uses') fn.reads.add(e.target);
    else if (e.type === 'writesTo') fn.writes.add(e.target);
  }

  return { functions, globals, nodeTypes };
}

function connectGraphSSE() {
  const source = new EventSource(location.origin + '/graph-events');
  source.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.type === 'graph-update') {
        console.log(`[graph-sse] update: ${data.nodes} nodes, ${data.edges} edges`);
        loadAndAnalyze(true);
      } else if (data.type === 'rows-appended') {
        // User-action rows from another tab — forwarded to stream-client,
        // which filters own echoes before notifying listeners.
        if (window.streamClient) window.streamClient._handleRebroadcast(data);
      }
    } catch { /* ignore */ }
  };
  source.onerror = () => {
    console.warn('[graph-sse] connection lost, retrying...');
  };
}

// ── Stream SSE: progressive graph build from history.csv stream ──
// Connects to the streamer server and incrementally builds the graph
// as rows arrive. Each batch triggers a rebuild with the accumulated state.
//
// History format: t,type,label,source,target,importance_xi,cluster
//   NODE: t, NODE, <name>,     <idx>, ,       <importance>, <clusterIdx>
//   EDGE: t, EDGE, <edgeType>, <src>, <tgt>,  ,
let _streamState = null;
let streamPaused = false;
let _streamSource = null; // the EventSource reference
let _streamOnMessage = null; // the real message handler, exposed for cinematic mode
const STREAMER_URL = 'http://127.0.0.1:3801';

function pauseStream() {
  if (!streamMode || streamPaused) return;
  streamPaused = true;
  const statusEl = document.getElementById('status');
  statusEl.textContent = statusEl.textContent.replace(/(streaming|stream \w+|sim \d+)/, '$1 (paused)');
  fetch(STREAMER_URL + '/pause', { method: 'POST' }).catch(() => {});
}

function resumeStream() {
  if (!streamMode || !streamPaused) return;
  streamPaused = false;
  const statusEl = document.getElementById('status');
  statusEl.textContent = statusEl.textContent.replace(' (paused)', '');
  fetch(STREAMER_URL + '/resume', { method: 'POST' }).catch(() => {});
}

function toggleStreamPause() {
  if (streamPaused) resumeStream();
  else pauseStream();
}

function connectStreamSSE(url) {
  // Accumulated state across batches
  const state = {
    idxToName: new Map(),   // numeric index → node name
    clusterIdxToName: new Map(), // cluster index → cluster name (built from nodes)
    clusterNodeNames: new Set(), // names of cluster-defining nodes (not in simulation)
    csvNodes: [],           // parsed node objects for the pipeline
    csvEdges: [],           // parsed edge objects for the pipeline
    nodesSeen: new Set(),   // track which indices we've added
  };
  _streamState = state;

  const source = new EventSource(url || 'http://127.0.0.1:3801/stream');
  _streamSource = source;
  const statusEl = document.getElementById('status');

  // Phase tracking: 'base' = accumulating rows for bulk build, 'tail' = incremental streaming
  let phase = 'base';

  _streamOnMessage = (event) => {
    try {
      const data = JSON.parse(event.data);

      if (data.type === 'header') {
        // Reset stream accumulator state
        state.idxToName.clear();
        state.clusterIdxToName.clear();
        state.clusterNodeNames.clear();
        state.csvNodes.length = 0;
        state.csvEdges.length = 0;
        state.nodesSeen.clear();
        state.baseRows = [];  // accumulate raw CSV rows during base phase
        phase = 'base';
        statusEl.textContent = 'stream connected';
        statusEl.className = 'live';

        // Build column index map from header
        if (data.columns) {
          const cols = data.columns.split(',').map(c => c.trim());
          state.col = {};
          cols.forEach((name, i) => { state.col[name] = i; });
          state.headerLine = data.columns;
        } else {
          state.col = { t: 0, type: 1, label: 2, source: 3, target: 4, importance_xi: 5, cluster: 6 };
          state.headerLine = 't,type,label,source,target,importance_xi,cluster';
        }
        state.hasLabel = state.col.label !== undefined;

        streamMode = true;
        return;
      }

      if (data.type === 'replay-tail') {
        // Base phase is done — build the graph from accumulated base rows using buildGraph
        if (state.baseRows.length > 0) {
          const csvText = state.headerLine + '\n' + state.baseRows.join('\n');
          const { nodes: csvNodes, edges: csvEdges } = parseHistoryCSV(csvText);
          csvClusterMap.clear();
          for (const nd of csvNodes) {
            if (nd.importance != null) codemapImportance.set(nd.id, nd.importance);
            if (nd.cluster) csvClusterMap.set(nd.id, nd.cluster);
          }
          const result = buildAnalysisFromCSV(csvNodes, csvEdges);
          result.precomputedEdges = csvEdges;
          analysisResult = result;
          state.csvNodes = csvNodes;
          state.csvEdges = csvEdges;
          rebuild();

          // Seed the stream state's idxToName and nodeDisplayLabels from base rows
          // so tail edges can resolve and base node labels persist in renderIncremental
          const col = state.col;
          for (const row of state.baseRows) {
            const fields = parseCSVLine(row);
            if (fields[col.type] === 'NODE') {
              const idx = parseInt(fields[col.source]);
              const name = fields[col.label] || `node_${idx}`;
              state.idxToName.set(idx, name);
              state.nodesSeen.add(idx);
              if (fields[col.label]) nodeDisplayLabels.set(name, fields[col.label]);
              const cn = parseInt(fields[col.cluster]);
              if (!isNaN(cn) && cn === idx) {
                state.clusterIdxToName.set(cn, name);
                state.clusterNodeNames.add(name);
              } else if (!isNaN(cn)) {
                if (!state.clusterIdxToName.has(cn)) state.clusterIdxToName.set(cn, `Cluster ${cn}`);
              }
            }
          }

          // Reset cluster label placement so labels start fresh near their clusters
          clusterLabelPlacement.clear();
        }

        // Switch to incremental tail phase — no physics, just placement
        phase = 'tail';
        StreamPlacement.begin();
        statusEl.textContent = `sim: streaming ${data.count} rows...`;
        return;
      }

      if (data.type === 'end') {
        CinematicStream.stop(); // drain cinematic queue if active
        statusEl.textContent = `stream complete -- ${state.csvNodes.length} nodes, ${state.csvEdges.length} edges`;

        // Stop render loop, finalize immediately (no physics settle needed)
        StreamPlacement.end(() => {
          // Save positions
          for (const n of currentNodes) {
            savedPositions.set(n.id, { x: n.x, y: n.y });
            stickyNodes.add(n.id);
          }

          // Build analysis for the settled graph (enables full rebuild features)
          const result = buildAnalysisFromCSV(state.csvNodes, state.csvEdges);
          result.precomputedEdges = state.csvEdges;
          analysisResult = result;

          // Do a final full rebuild to get gradients, arrowheads, meta-edges, etc.
          rebuild();
          statusEl.textContent = `stream settled -- ${state.csvNodes.length} nodes, ${state.csvEdges.length} edges`;
          streamMode = false;
          if (_simActive) {
            _simActive = false;
            document.getElementById('sim-stream-btn').textContent = 'Sim Stream';
          }
        });
        return;
      }

      if (data.type !== 'rows' || !data.rows) return;

      // During base phase, just accumulate raw rows — don't render incrementally
      if (phase === 'base') {
        state.baseRows.push(...data.rows);
        statusEl.textContent = `loading base -- ${state.baseRows.length} rows`;
        return;
      }

      // Cinematic mode: queue rows for one-at-a-time animated processing
      if (CinematicStream.isEnabled()) {
        CinematicStream.enqueue(data.rows);
        return;
      }

      const col = state.col || { t: 0, type: 1, label: 2, source: 3, target: 4, importance_xi: 5, cluster: 6 };
      const hasLabel = state.hasLabel !== false;
      let needsRender = false;

      for (const row of data.rows) {
        const fields = parseCSVLine(row);
        const rowType = fields[col.type];
        const label = hasLabel ? fields[col.label] : '';

        if (rowType === 'NODE') {
          const idx = parseInt(fields[col.source]);
          const importanceXi = parseFloat(fields[col.importance_xi]) || 0;
          const clusterCol = fields[col.cluster];

          if (!state.nodesSeen.has(idx)) {
            state.nodesSeen.add(idx);
            const nodeName = label || `node_${idx}`;
            state.idxToName.set(idx, nodeName);

            const importance = importanceXi * 10;
            let clusterName = null;
            let clusterIdx = -1; // -1 = unassigned, resolved below

            // If cluster column has a numeric value, use it for cluster assignment
            if (clusterCol !== '' && clusterCol !== undefined) {
              const cn = parseInt(clusterCol);
              if (!isNaN(cn)) {
                // Detect cluster-defining nodes: idx matches cluster column
                if (cn === idx) {
                  state.clusterIdxToName.set(cn, nodeName);
                  state.clusterNodeNames.add(nodeName);
                  csvClusterMap.set(nodeName, nodeName);
                  state.csvNodes.push({
                    id: nodeName, type: 'cluster', cluster: '', importance, line: 0,
                  });
                  continue;
                }

                // Regular node with cluster assignment
                if (!state.clusterIdxToName.has(cn)) {
                  state.clusterIdxToName.set(cn, `Cluster ${cn}`);
                }
                clusterName = state.clusterIdxToName.get(cn);
                csvClusterMap.set(nodeName, clusterName);
                clusterIdx = cn;
              }
            }

            // No cluster assigned — leave unassigned (null cluster)
            if (clusterIdx < 0) {
              clusterIdx = null;
              clusterName = null;
            }

            // Read node type from target column (enriched CSV) or fall back to importance heuristic
            const csvType = fields[col.target];
            const nodeType = csvType && csvType !== '' ? csvType : (importanceXi <= 0.1 ? 'global' : 'function');

            // Value/structural types get minZoom for zoom-level visibility
            const valueTypes = new Set(['number', 'string', 'boolean', 'null', 'new', 'array', 'object', 'expression', 'ref', 'arrow', 'regex', 'property', 'argument']);
            let minZoom = 0;
            if (valueTypes.has(nodeType)) minZoom = 10;
            else if (nodeType === 'parameter') minZoom = 10;

            state.csvNodes.push({
              id: nodeName, type: nodeType, cluster: '', importance, line: 0,
              label: label || null,
            });

            // Track importance and labels
            if (importance != null) codemapImportance.set(nodeName, importance);
            if (label) nodeDisplayLabels.set(nodeName, label);

            // Add directly to the main graph's data structures
            const isValueNode = minZoom > 0;
            const node = {
              id: nodeName,
              type: nodeType,
              cluster: clusterIdx,
              clusterName: clusterName || null,
              affinities: clusterIdx != null ? new Map([[clusterIdx, 1.0]]) : new Map(),
              info: null,
              radius: isValueNode ? (nodeType === 'parameter' ? 2.5 : 2) : Math.max(4, importance * 2),
              color: isValueNode ? '#666' : (clusterIdx != null ? CLUSTER_COLORS[clusterIdx % CLUSTER_COLORS.length] : '#555'),
              minZoom,
            };

            // Register in graph data structures first so adjacency is available for placement
            currentNodes.push(node);
            currentGraph.nodeMap.set(nodeName, node);
            currentGraph.adjacency.set(nodeName, new Set());
            if (currentGraph.fullAdjacency) currentGraph.fullAdjacency.set(nodeName, new Set());
            currentGraph.nodeDegree.set(nodeName, 0);

            // Place the node — no physics, static positioning
            node._streamAdded = true;
            node._hadEdgesOnPlace = (currentGraph.adjacency.get(nodeName)?.size || 0) > 0;
            StreamPlacement.placeNode(node);

            // Track cluster names
            if (clusterName && !currentClusterNames.has(clusterIdx)) {
              currentClusterNames.set(clusterIdx, clusterName);
            }

            needsRender = true;
          }

        } else if (rowType === 'EDGE') {
          const srcIdx = parseInt(fields[col.source]);
          const tgtIdx = parseInt(fields[col.target]);
          const srcName = state.idxToName.get(srcIdx);
          const tgtName = state.idxToName.get(tgtIdx);

          if (srcName && tgtName) {
            if (label === 'memberOf') {
              csvClusterMap.set(srcName, tgtName);
              // Update cluster assignment on the node object
              const node = currentGraph.nodeMap.get(srcName);
              if (node) {
                // Find or assign cluster index for the target cluster name
                let cid = null;
                for (const [id, name] of currentClusterNames) {
                  if (name === tgtName) { cid = id; break; }
                }
                if (cid == null) {
                  cid = currentClusterNames.size;
                  currentClusterNames.set(cid, tgtName);
                }
                node.cluster = cid;
                node.clusterName = tgtName;
                node.color = CLUSTER_COLORS[cid % CLUSTER_COLORS.length];
                node.affinities = new Map([[cid, 1.0]]);
              }
            } else {
              // Skip edges involving cluster-defining nodes
              if (state.clusterNodeNames.has(srcName) || state.clusterNodeNames.has(tgtName)) continue;

              ensureEdgeLayer(label);
              const edge = { source: srcName, target: tgtName, type: label, weight: 1 };
              state.csvEdges.push(edge);
              currentLinks.push(edge);

              // Update adjacency (both filtered and full)
              if (currentGraph.adjacency.has(srcName)) currentGraph.adjacency.get(srcName).add(tgtName);
              if (currentGraph.adjacency.has(tgtName)) currentGraph.adjacency.get(tgtName).add(srcName);
              if (currentGraph.fullAdjacency) {
                if (currentGraph.fullAdjacency.has(srcName)) currentGraph.fullAdjacency.get(srcName).add(tgtName);
                if (currentGraph.fullAdjacency.has(tgtName)) currentGraph.fullAdjacency.get(tgtName).add(srcName);
              }
              currentGraph.nodeDegree.set(srcName, (currentGraph.nodeDegree.get(srcName) || 0) + 1);
              currentGraph.nodeDegree.set(tgtName, (currentGraph.nodeDegree.get(tgtName) || 0) + 1);

              // Reposition orphaned nodes that now have a connection
              StreamPlacement.repositionIfOrphaned(srcName);
              StreamPlacement.repositionIfOrphaned(tgtName);

              needsRender = true;
            }
          }
        }
      }

      // Batch render after processing all rows in this message
      if (needsRender) {
        // Update hull cluster IDs for rendering
        const showHulls = document.getElementById('show-hulls').checked;
        if (showHulls) {
          currentHullClusterIds = [...new Set(currentNodes.filter(n => n.cluster != null && n.cluster >= 0).map(n => n.cluster))];
        }
        renderIncremental();
      }

      // Refresh edge layer panel if new edge types appeared during streaming
      refreshPullLayerUI();

      statusEl.textContent = `streaming -- ${state.csvNodes.length} nodes, ${state.csvEdges.length} edges`;
    } catch (e) {
      console.warn('[stream-sse] parse error:', e);
    }
  };

  source.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);

      // Handle streamer control events
      if (data.type === 'paused') {
        streamPaused = true;
        statusEl.textContent = statusEl.textContent.replace(/(streaming|stream \w+|sim \d+)/, '$1 (paused)');
        return;
      }
      if (data.type === 'resumed') {
        streamPaused = false;
        statusEl.textContent = statusEl.textContent.replace(' (paused)', '');
        return;
      }
    } catch { /* fall through */ }

    _streamOnMessage(event);
  };

  source.onerror = () => {
    console.warn('[stream-sse] connection lost, retrying...');
  };

  return source;
}

// ═══════════════════════════════════════════════════════
// CINEMATIC STREAMING — zoom-and-pan animation per node
// ═══════════════════════════════════════════════════════
const CinematicStream = (function () {
  let queue = [];
  let active = false;
  let processing = false;
  let _bypassCinematic = false; // flag to prevent re-queuing during processSingleRow

  function isEnabled() {
    if (_bypassCinematic) return false;
    return document.getElementById('cinematic-stream')?.checked || false;
  }

  function enqueue(rows) {
    queue.push(...rows);
    if (!processing) drainQueue();
  }

  function stop() {
    queue.length = 0;
    active = false;
    // processing flag cleared when drainQueue's while loop exits naturally
  }

  async function drainQueue() {
    if (processing) return;
    processing = true;
    active = true;

    // First pass: process all rows immediately to add them to the graph
    const addedNodes = [];
    const allRows = [...queue];
    queue.length = 0;

    for (const row of allRows) {
      if (!active) break;
      const fields = parseCSVLine(row);
      const state = _streamState;
      if (!state) break;
      const col = state.col;
      const rowType = fields[col.type];

      const nodeCountBefore = currentNodes ? currentNodes.length : 0;
      processSingleRow(row);
      const nodeCountAfter = currentNodes ? currentNodes.length : 0;

      if (rowType === 'NODE' && nodeCountAfter > nodeCountBefore) {
        const newNode = currentNodes[currentNodes.length - 1];
        // Only animate visible nodes (skip deep structural types)
        if (newNode && newNode.x != null && !(newNode.minZoom && newNode.minZoom > 4)) {
          addedNodes.push(newNode);
        }
      }
    }

    // Second pass: animate through the newly added visible nodes
    if (addedNodes.length > 0) {
      await animateTour(addedNodes);
    }

    processing = false;
    active = false;

    // If more rows arrived while we were touring, process them
    if (queue.length > 0) drainQueue();
  }

  function processSingleRow(row) {
    // Feed a single row through the normal tail handler
    const fakeEvent = {
      data: JSON.stringify({ type: 'rows', rows: [row] })
    };
    _bypassCinematic = true;
    try {
      if (_streamOnMessage) _streamOnMessage(fakeEvent);
    } finally {
      _bypassCinematic = false;
    }
  }

  async function animateTour(nodes) {
    if (!svg || !_zoomBehavior || nodes.length === 0) return;

    const svgEl = svg.node();
    const width = svgEl.clientWidth || window.innerWidth;
    const height = svgEl.clientHeight || window.innerHeight;

    function zoomTo(targetTransform, durationMs, easing) {
      return new Promise(resolve => {
        svg.transition('cinematic')
          .duration(durationMs)
          .ease(easing || d3.easeCubicInOut)
          .call(_zoomBehavior.transform, targetTransform);
        setTimeout(resolve, durationMs + 30);
      });
    }

    const makeTransform = (k, x, y) =>
      d3.zoomIdentity.translate(width / 2, height / 2).scale(k).translate(-x, -y);

    // Compute the bounding box of all new nodes to pick a good zoom level
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const n of nodes) {
      if (n.x < minX) minX = n.x;
      if (n.x > maxX) maxX = n.x;
      if (n.y < minY) minY = n.y;
      if (n.y > maxY) maxY = n.y;
    }
    const bboxW = maxX - minX + 200;
    const bboxH = maxY - minY + 200;
    const overviewK = Math.max(0.3, Math.min(2, Math.min(width / bboxW, height / bboxH)));
    const detailK = Math.max(overviewK, 3.0);

    // If many nodes, do a quick overview of all of them first
    if (nodes.length > 3) {
      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;
      await zoomTo(makeTransform(overviewK, cx, cy), 800, d3.easeCubicOut);
      await sleep(400);
    }

    // Tour each node: pan to it, highlight briefly, move on
    for (let i = 0; i < nodes.length && active; i++) {
      const node = nodes[i];

      // Pan to this node
      const duration = i === 0 && nodes.length <= 3 ? 600 : 400;
      await zoomTo(makeTransform(detailK, node.x, node.y), duration);

      // Highlight the node
      const circle = gNodes.selectAll('.node')
        .filter(d => d.id === node.id)
        .select('circle');
      if (!circle.empty()) {
        circle
          .attr('stroke', '#fff')
          .attr('stroke-width', 3)
          .attr('stroke-opacity', 1);
        circle.transition().duration(800)
          .attr('stroke-opacity', 0)
          .attr('stroke-width', 0);
      }

      // Hold on this node — longer for last node
      const isLast = i === nodes.length - 1;
      await sleep(isLast ? 600 : 300);
    }

    // Stay at the last node — don't return to original view
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  return { isEnabled, enqueue, stop, drainQueue };
})();

function connectFocusSSE() {
  const source = new EventSource(location.origin + '/focus-events');
  source.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.timestamp && Date.now() - data.timestamp > 30000) {
        applyFocus(null);
      } else {
        applyFocus(data);
      }
    } catch { applyFocus(null); }
  };
  source.onerror = () => {
    document.getElementById('focus-panel').classList.remove('active');
  };
}

function applyFocus(data) {
  const panel = document.getElementById('focus-panel');
  currentFocus = data;

  if (!data || !data.focus || data.focus.length === 0) {
    panel.classList.remove('active');
    if (gNodes) {
      gNodes.selectAll('.node').style('opacity', 1);
      gNodes.selectAll('circle').classed('focus-glow', false);
      clearHighlight();
    }
    return;
  }

  panel.classList.add('active');
  panel.querySelector('.focus-step').textContent = data.step || '';
  panel.querySelector('.focus-desc').textContent = data.description || '';
  panel.querySelector('.focus-targets').innerHTML = data.focus.map(f => {
    const level = f.relevance >= 0.7 ? 'high' : f.relevance >= 0.4 ? 'med' : 'low';
    return `<span class="focus-tag ${level}">${f.name} ${(f.relevance * 100)|0}%</span>`;
  }).join('');

  if (!gNodes || !gLinks) return;
  const relevanceMap = new Map();
  for (const f of data.focus) relevanceMap.set(f.name, f.relevance);

  // BFS spread
  const adj = currentGraph?.adjacency || new Map();
  const queue = [...data.focus.map(f => ({ id: f.name, rel: f.relevance, depth: 0 }))];
  const visited = new Set(data.focus.map(f => f.name));
  while (queue.length) {
    const { id, rel, depth } = queue.shift();
    if (depth >= 3) continue;
    for (const nb of (adj.get(id) || [])) {
      if (!visited.has(nb)) {
        visited.add(nb);
        const spreadRel = rel * 0.4;
        if (spreadRel > (relevanceMap.get(nb) || 0)) relevanceMap.set(nb, spreadRel);
        queue.push({ id: nb, rel: spreadRel, depth: depth + 1 });
      }
    }
  }

  gNodes.selectAll('.node').style('opacity', d => {
    const r = relevanceMap.get(d.id);
    return r != null ? 0.3 + r * 0.7 : 0.06;
  });
  gNodes.selectAll('circle').classed('focus-glow', d => (relevanceMap.get(d.id) || 0) >= 0.7);

  const linkOpFn = l => {
    const sr = relevanceMap.get(l.source) || 0;
    const tr = relevanceMap.get(l.target) || 0;
    const minR = Math.min(sr, tr);
    return minR >= 0.5 ? 0.7 : minR >= 0.2 ? 0.25 : minR > 0 ? 0.08 : 0.015;
  };
  gLinks.selectAll('.link').attr('stroke-opacity', linkOpFn).attr('stroke-width', l => {
    const sr = relevanceMap.get(l.source) || 0;
    const tr = relevanceMap.get(l.target) || 0;
    const minR = Math.min(sr, tr);
    return minR >= 0.5 ? Math.min(4, 1.5 + (l.weight || 1) * 0.5) : Math.min(2, 0.3 + (l.weight || 1) * 0.15);
  });
  gLinks.selectAll('.arrow').attr('fill-opacity', linkOpFn);

  gLabels.selectAll('text').attr('opacity', d => {
    const r = relevanceMap.get(d.id) || 0;
    return r >= 0.5 ? 1 : r >= 0.2 ? 0.4 : 0.04;
  });
}

// ═══════════════════════════════════════════════════════
// STREAM SIMULATOR — triggers replay on the streamer server
// ═══════════════════════════════════════════════════════
let _simActive = false;

async function startStreamSim() {
  const statusEl = document.getElementById('status');
  const btn = document.getElementById('sim-stream-btn');
  const n = parseInt(document.getElementById('sim-stream-n').value) || 50;

  statusEl.textContent = 'requesting replay...';
  btn.textContent = 'Replaying...';

  // Ensure we have an SSE connection to the streamer
  if (!_streamSource) {
    connectStreamSSE(STREAMER_URL + '/stream');
    // Brief delay so the SSE client registers before replay begins
    await new Promise(r => setTimeout(r, 300));
  }

  streamPaused = false;
  _simActive = true;

  try {
    const res = await fetch(STREAMER_URL + '/replay?tail=' + n, { method: 'POST' });
    const info = await res.json();
    if (info.error) {
      statusEl.textContent = 'replay error: ' + info.error;
      btn.textContent = 'Sim Stream';
      _simActive = false;
      return;
    }
    // Status will be updated by SSE events (base loading → replay-tail → streaming)
  } catch (e) {
    statusEl.textContent = 'streamer not running — start with: node stream/streamer.mjs';
    btn.textContent = 'Sim Stream';
    _simActive = false;
  }
}

// ═══════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════
async function loadAndAnalyze(force) {
  if (streamMode) return; // stream SSE drives the graph, skip bulk loading
  if (!force && !document.getElementById('live-reload').checked) return;
  const statusEl = document.getElementById('status');
  try {
    const [historyText, codemapMd] = await Promise.all([
      fetch('/runtime/history.csv').then(r => r.ok ? r.text() : null).catch(() => null),
      fetch(CODEMAP_SRC).then(r => r.ok ? r.text() : null).catch(() => null),
    ]);

    // If history CSV is available, use it; otherwise fall back to AST analysis
    if (historyText) {
      const h = hashStr(historyText + (codemapMd || ''));
      if (h === lastHash) return;
      lastHash = h;
      _lastHistoryText = historyText;

      statusEl.textContent = 'loading history...';
      if (codemapMd) codemapSections = parseCodemap(codemapMd);

      const { nodes: csvNodes, edges: csvEdges } = parseHistoryCSV(historyText);

      // Set importance and cluster info from CSV nodes
      csvClusterMap.clear();
      for (const n of csvNodes) {
        if (n.importance != null) codemapImportance.set(n.id, n.importance);
        if (n.cluster) csvClusterMap.set(n.id, n.cluster);
      }

      const result = buildAnalysisFromCSV(csvNodes, csvEdges);
      result.precomputedEdges = csvEdges;
      analysisResult = result;
      const nSys = codemapSections ? codemapSections.size : 0;
      statusEl.textContent = `live -- ${csvNodes.length} nodes, ${csvEdges.length} edges, ${nSys} systems`;
      statusEl.className = 'live';
      rebuild();
    } else {
      // Fallback: AST analysis in browser (legacy path)
      const html = await fetch(SRC).then(r => r.text());
      const h = hashStr(html + (codemapMd || ''));
      if (h === lastHash) return;
      lastHash = h;

      statusEl.textContent = 'parsing...';
      if (codemapMd) codemapSections = parseCodemap(codemapMd);

      const { code, lineOffset } = extractJS(html);
      const result = analyzeCode(code, lineOffset);
      if (!result) { statusEl.textContent = 'parse error'; return; }

      analysisResult = result;
      const nSys = codemapSections ? codemapSections.size : 0;
      statusEl.textContent = `live -- ${result.functions.size} funcs, ${nSys} systems`;
      statusEl.className = 'live';
      rebuild();
    }
  } catch (e) {
    statusEl.textContent = 'fetch error: ' + e.message;
    console.error(e);
  }
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
loadSpatialMemory();
initSVG();

window.addEventListener('resize', () => {
  width = window.innerWidth;
  height = window.innerHeight - 44;
  svg.attr('width', width).attr('height', height);
});

initPullLayerUI();

// Load inspect.json, then start — but check for streamer first
let streamMode = false;  // when true, bulk CSV loading is disabled

async function initDataPipeline() {
  // Load inspect.json for project config regardless of mode
  try {
    const config = await fetch('/inspect.json').then(r => r.json());
    CODEMAP_SRC = '/' + config.codemap.replace(/^\.\//, '');
    SPATIAL_KEY = `depgraph-spatial-${config.name || 'default'}`;
    document.querySelector('#toolbar strong').textContent = config.name || 'depgraph';
    loadSpatialMemory();
  } catch (e) {
    console.error('Failed to load inspect.json:', e);
  }

  // Always load the graph via bulk CSV first
  loadAndAnalyze(true);
  setInterval(() => loadAndAnalyze(false), REFRESH_MS);

  // Check if streamer is running — connect SSE but don't auto-stream
  try {
    const info = await fetch(STREAMER_URL + '/').then(r => r.ok ? r.json() : null);
    if (info && info.status === 'ok') {
      console.log('[stream] streamer detected, connecting SSE (idle until replay)');
      connectStreamSSE(STREAMER_URL + '/stream');
    }
  } catch { /* no streamer */ }
}

initDataPipeline();

document.getElementById('live-reload').addEventListener('change', (e) => {
  const statusEl = document.getElementById('status');
  if (e.target.checked) {
    lastHash = null;
    statusEl.textContent = 'resuming...';
    statusEl.className = '';
  } else {
    statusEl.textContent = 'paused';
    statusEl.className = '';
  }
});

connectFocusSSE();
connectGraphSSE();
loadUserActions();

// Accept DISTANCE rows from other tabs via the SSE rebroadcast so multi-tab
// drags converge to the same physics constraints. Own-tab echoes are already
// filtered by stream-client before reaching this callback.
if (window.streamClient) {
  window.streamClient.onRemoteRows((msg) => {
    for (const r of msg.rows) {
      if (r.type === 'DISTANCE') {
        userDistancesModule.applyEdge({
          source: r.source,
          target: r.target,
          type: 'distance',
          weight: Number(r.importance_xi),
          t: Number(r.t),
        });
      }
    }
  });
}

updateArrNav();

// Restore last arrangement positions if available
if (spatialMemory.arrangements.length > 0) {
  const last = spatialMemory.arrangements[spatialMemory.arrangements.length - 1];
  for (const [id, pos] of Object.entries(last.positions)) {
    savedPositions.set(id, { x: pos[0], y: pos[1] });
  }
}
