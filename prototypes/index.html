  // Scale meta-edge gradient opacities for edges involving this cluster
  for (const d of currentMetaLinks) {
    if (d.sourceCluster !== cid && d.targetCluster !== cid) continue;
    const grad = svgDefs.select(`#${d.gradId}`);
    if (!grad.node()) continue;
    // Combine importance of both endpoints (use the min so a dimmed cluster dims its edges)
    const edgeImp = Math.min(getClusterImportance(d.sourceCluster), getClusterImportance(d.targetCluster));
    const baseOps = [0.7, 0.08, 0.05, 0.08, 0.7];
    const focusMult = (focusedClusterId != null &&
      (d.sourceCluster === focusedClusterId || d.targetCluster === focusedClusterId)) ? 5 : 1;
    grad.selectAll('stop').each(function(_, i) {
      d3.select(this).attr('stop-opacity', Math.min(1, baseOps[i] * focusMult * edgeImp));
    });
    // Scale stroke width too
    gMetaLinks.selectAll('.meta-link').filter(ml => ml === d)
      .attr('stroke-width', (0.5 + d.normalizedWeight * 4) * edgeImp);
  }

  // Re-render positions, hulls, and cluster labels to reflect tightened layout
  renderPositions();
  applySemanticZoom();
  computeClusterLabelPlacement();
}

function rebuildClusterMemberCache() {
  clusterMemberCache.clear();
  if (!currentNodes) return;
  for (const n of currentNodes) {
    if (n.cid != null || n.cluster != null) {
      // Only include visible nodes so hulls and labels reflect what's on screen
      if (_hiddenNodes.has(n.id)) continue;
      if (n.minZoom && currentK < n.minZoom) continue;
      const cid = n.cluster;
      if (!clusterMemberCache.has(cid)) clusterMemberCache.set(cid, []);
      clusterMemberCache.get(cid).push(n);
    }
  }
}

function estimateLabelBBox(text, fontSize) {
  const w = text.length * fontSize * 0.62;
  const h = fontSize * 1.3;
  return { w, h };
}

function computeClusterLabelPlacement() {
  if (!currentNodes || currentNodes.length === 0) return;

  const fontSize = (currentK <= 2 ? 13 / currentK : 13 / (2 * Math.pow(currentK / 2, 0.75)));
  const nudgeStrength = 0.2;

  // Build spatial grid for fast node proximity queries
  const CELL = 60;
  const nodeGrid = new Map();
  for (const n of currentNodes) {
    const key = ((n.x / CELL | 0) + 5000) + ',' + ((n.y / CELL | 0) + 5000);
    if (!nodeGrid.has(key)) nodeGrid.set(key, []);
    nodeGrid.get(key).push(n);
  }
  function nearbyNodes(x, y, radius) {
    const result = [];
    const r = Math.ceil(radius / CELL);
    const gx = (x / CELL | 0) + 5000, gy = (y / CELL | 0) + 5000;
    for (let dx = -r; dx <= r; dx++) {
      for (let dy = -r; dy <= r; dy++) {
        const cell = nodeGrid.get((gx + dx) + ',' + (gy + dy));
        if (cell) for (const n of cell) result.push(n);
      }
    }
    return result;
  }

  // Compute hulls per cluster for boundary awareness
  const clusterHulls = new Map();
  for (const [cid, members] of clusterMemberCache) {
    if (members.length < 3) continue;
    const pts = members.map(m => [m.x, m.y]);
    const hull = d3.polygonHull(pts);
    if (hull) clusterHulls.set(cid, expandHull(hull, 15));
  }

  // Collect labels and their current positions
  const labelData = [];
  gClusterLabels.selectAll('text:not(.user-cluster-label)').each(function(d) {
    if (!d || d.cid == null) return;
    const members = clusterMemberCache.get(d.cid);
    if (!members || !members.length) return;

    let mcx = 0, mcy = 0;
    for (const m of members) { mcx += m.x; mcy += m.y; }
    mcx /= members.length; mcy /= members.length;

    // Seed placement: find the hull edge with the most negative space (fewest foreign nodes)
    if (!clusterLabelPlacement.has(d.cid)) {
      const hull = clusterHulls.get(d.cid);
      if (hull && hull.length >= 3) {
        let bestX = mcx, bestY = mcy - 30, bestScore = Infinity;
        for (let i = 0; i < hull.length; i++) {
          const [ax, ay] = hull[i];
          const [bx, by] = hull[(i + 1) % hull.length];
          // Candidate: midpoint of hull edge, pushed outward
          const mx = (ax + bx) / 2, my = (ay + by) / 2;
          const odx = mx - mcx, ody = my - mcy;
          const od = Math.hypot(odx, ody) || 1;
          const px = mx + (odx / od) * 10, py = my + (ody / od) * 10;
          // Score: count nearby foreign nodes (lower = more negative space)
          const nearby = nearbyNodes(px, py, 80);
          let score = 0;
          for (const n of nearby) {
            if (n.cluster === d.cid) continue;
            const dist = Math.hypot(n.x - px, n.y - py);
            if (dist < 80) score += (80 - dist) / 80;
          }
          // Bonus for being above the centroid (slight preference)
          if (py < mcy) score -= 0.3;
          if (score < bestScore) { bestScore = score; bestX = px; bestY = py; }
        }
        clusterLabelPlacement.set(d.cid, { dx: bestX - mcx, dy: bestY - mcy, angle: 0 });
      } else {
        const gap = (currentK <= 2 ? 12 / currentK : 12 / (2 * Math.pow(currentK / 2, 0.75)));
        const minY = Math.min(...members.map(m => m.y - (m.radius || 4)));
        clusterLabelPlacement.set(d.cid, { dx: 0, dy: (minY - gap) - mcy, angle: 0 });
      }
    }
    const p = clusterLabelPlacement.get(d.cid);
    labelData.push({ d, members, mcx, mcy, p, bbox: estimateLabelBBox(d.name, fontSize), hull: clusterHulls.get(d.cid) });
  });

  // Apply forces to nudge each label
  for (const label of labelData) {
    const { d, members, mcx, mcy, p, bbox, hull } = label;
    const lx = mcx + p.dx, ly = mcy + p.dy;
    let fx = 0, fy = 0, torque = 0;

    // Repel from nearby nodes (using spatial grid)
    const searchR = Math.max(bbox.w, bbox.h) * 0.5 + 20;
    const nearby = nearbyNodes(lx, ly, searchR);
    for (const n of nearby) {
      const nr = (n.radius || 4) + 4;
      const dx = lx - n.x, dy = ly - n.y;
      const dist = Math.hypot(dx, dy) || 0.1;
      const minDist = nr + Math.max(bbox.w, bbox.h) * 0.5;
      if (dist < minDist) {
        const push = (minDist - dist) / minDist;
        fx += (dx / dist) * push * 3;
        fy += (dy / dist) * push * 3;
      }
    }

    // Repel from other labels (stronger)
    for (const other of labelData) {
      if (other.d.cid === d.cid) continue;
      const ox = other.mcx + other.p.dx, oy = other.mcy + other.p.dy;
      const dx = lx - ox, dy = ly - oy;
      const dist = Math.hypot(dx, dy) || 0.1;
      const minDist = (bbox.w + other.bbox.w) * 0.5 + 10;
      if (dist < minDist) {
        const push = (minDist - dist) / minDist;
        fx += (dx / dist) * push * 6;
        fy += (dy / dist) * push * 6;
      }
    }

    // Pull toward nearest hull edge (stay near the boundary)
    if (hull && hull.length >= 3) {
      let bestDist = Infinity, nearHx = lx, nearHy = ly;
      for (let i = 0; i < hull.length; i++) {
        const [ax, ay] = hull[i];
        const [bx, by] = hull[(i + 1) % hull.length];
        // Project lx,ly onto segment ab
        const abx = bx - ax, aby = by - ay;
        const abLen2 = abx * abx + aby * aby;
        if (abLen2 < 0.01) continue;
        let t = ((lx - ax) * abx + (ly - ay) * aby) / abLen2;
        t = Math.max(0, Math.min(1, t));
        const px = ax + t * abx, py = ay + t * aby;
        const dist = Math.hypot(lx - px, ly - py);
        if (dist < bestDist) { bestDist = dist; nearHx = px; nearHy = py; }
      }
      // Gentle pull toward nearest hull point (label hovers near boundary)
      const hullPull = 0.08;
      fx += (nearHx - lx) * hullPull;
      fy += (nearHy - ly) * hullPull;
    } else {
      // No hull — fallback: pull toward above-centroid
      const gap = (currentK <= 2 ? 12 / currentK : 12 / (2 * Math.pow(currentK / 2, 0.75)));
      const minY = Math.min(...members.map(m => m.y - (m.radius || 4)));
      const defaultDy = (minY - gap) - mcy;
      fy += (defaultDy - p.dy) * 0.1;
      fx += (0 - p.dx) * 0.1;
    }

    // Decay rotation toward 0
    torque -= p.angle * 0.1;

    // Apply nudge
    p.dx += fx * nudgeStrength;
    p.dy += fy * nudgeStrength;
    p.angle += torque * nudgeStrength;
    p.angle = Math.max(-30, Math.min(30, p.angle));
  }

  // Apply the nudged positions to the DOM
  applyClusterLabelPlacements();
}

function applyClusterLabelPlacements() {
  gClusterLabels.selectAll('text:not(.user-cluster-label)').each(function(d) {
    if (!d || d.cid == null) return;
    const members = clusterMemberCache.get(d.cid);
    if (!members || !members.length) return;
    let cx = 0, cy = 0;
    for (const m of members) { cx += m.x; cy += m.y; }
    cx /= members.length; cy /= members.length;

    const p = clusterLabelPlacement.get(d.cid);
    if (p) {
      const x = cx + p.dx, y = cy + p.dy;
      d3.select(this)
        .attr('x', null).attr('y', null)
        .attr('transform', `translate(${x},${y}) rotate(${p.angle})`);
    } else {
      // No placement yet — fallback above cluster
      const minY = Math.min(...members.map(m => m.y - (m.radius || 4)));
      const gap = (currentK <= 2 ? 12 / currentK : 12 / (2 * Math.pow(currentK / 2, 0.75)));
      d3.select(this)
        .attr('transform', null)
        .attr('x', cx).attr('y', minY - gap);
    }
  });
}

function renderClusterLabels() {
  if (!currentNodes) return;
  rebuildClusterMemberCache();
  applyClusterLabelPlacements();
  // Debounce the full solver
  if (labelPlacementTimer) clearTimeout(labelPlacementTimer);
  labelPlacementTimer = setTimeout(computeClusterLabelPlacement, 200);
}

// ── Meta-edges: aggregated inter-cluster edges shown when zoomed out ──
let currentMetaLinks = []; // [{sourceCluster, targetCluster, weight, color1, color2}]

function computeMetaLinks() {
  currentMetaLinks = [];
  if (!currentGraph || !currentNodes) return;

  // Tally inter-cluster coupling, weighted by AI importance scores.
  // An edge between two importance-9 nodes counts ~9x more than one between importance-1 nodes.
  const coupling = new Map(); // "cid1\0cid2" → importanceWeightedScore
  const nodeMap = currentGraph.nodeMap;
  for (const l of currentGraph.links) {
    const sn = nodeMap.get(l.source);
    const tn = nodeMap.get(l.target);
    if (!sn || !tn || sn.cluster == null || tn.cluster == null) continue;
    if (sn.cluster === tn.cluster) continue;
    const [a, b] = sn.cluster < tn.cluster ? [sn.cluster, tn.cluster] : [tn.cluster, sn.cluster];
    const key = a + '\0' + b;
    // Geometric mean of the two endpoints' importance — emphasizes when both sides matter
    const sImp = codemapImportance.get(l.source) || 3;
    const tImp = codemapImportance.get(l.target) || 3;
    const impWeight = Math.sqrt(sImp * tImp) / 3; // normalize so imp=3 ≈ 1x
    coupling.set(key, (coupling.get(key) || 0) + (l.weight || 1) * impWeight);
  }

  const maxCoupling = Math.max(1, ...coupling.values());
  for (const [key, weight] of coupling) {
    const [a, b] = key.split('\0').map(Number);
    currentMetaLinks.push({
      sourceCluster: a,
      targetCluster: b,
      weight,
      normalizedWeight: weight / maxCoupling,
      color1: CLUSTER_COLORS[a % CLUSTER_COLORS.length],
      color2: CLUSTER_COLORS[b % CLUSTER_COLORS.length],
    });
  }
}

function clusterCentroid(cid) {
  if (!currentNodes) return { x: 0, y: 0 };
  // Only consider visible nodes for centroid
  const visible = currentNodes.filter(n =>
    n.cluster === cid &&
    !_hiddenNodes.has(n.id) &&
    !(n.minZoom && currentK < n.minZoom)
  );
  const members = visible.length > 0
    ? visible
    : currentNodes.filter(n => n.cluster === cid); // fallback to all
  if (members.length === 0) return { x: 0, y: 0 };
  let cx = 0, cy = 0;
  for (const m of members) { cx += m.x; cy += m.y; }
  return { x: cx / members.length, y: cy / members.length };
}

function renderMetaLinks() {
  if (!gMetaLinks) return;

  // Clean up old gradients
  svgDefs.selectAll('.meta-grad').remove();

  // Create a gradient for each meta-edge: opaque near clusters, translucent in the middle
  for (const d of currentMetaLinks) {
    const gradId = `meta-grad-${d.sourceCluster}-${d.targetCluster}`;
    d.gradId = gradId;
    const s = clusterCentroid(d.sourceCluster);
    const t = clusterCentroid(d.targetCluster);
    const blended = d3.interpolateRgb(d.color1, d.color2)(0.5);
    d.blendedColor = blended;

    const grad = svgDefs.append('linearGradient')
      .attr('class', 'meta-grad')
      .attr('id', gradId)
      .attr('gradientUnits', 'userSpaceOnUse')
      .attr('x1', s.x).attr('y1', s.y)
      .attr('x2', t.x).attr('y2', t.y);

    grad.append('stop').attr('offset', '0%')
      .attr('stop-color', d.color1).attr('stop-opacity', 0.7);
    grad.append('stop').attr('offset', '25%')
      .attr('stop-color', blended).attr('stop-opacity', 0.12);
    grad.append('stop').attr('offset', '50%')
      .attr('stop-color', blended).attr('stop-opacity', 0.05);
    grad.append('stop').attr('offset', '75%')
      .attr('stop-color', blended).attr('stop-opacity', 0.08);
    grad.append('stop').attr('offset', '100%')
      .attr('stop-color', d.color2).attr('stop-opacity', 0.7);
  }

  gMetaLinks.selectAll('line')
    .data(currentMetaLinks, d => d.sourceCluster + '\0' + d.targetCluster)
    .join('line')
    .attr('class', 'meta-link')
    .each(function(d) {
      const s = clusterCentroid(d.sourceCluster);
      const t = clusterCentroid(d.targetCluster);
      d3.select(this)
        .attr('x1', s.x).attr('y1', s.y)
        .attr('x2', t.x).attr('y2', t.y);
    })
    .attr('stroke', d => `url(#${d.gradId})`)
    .attr('stroke-width', d => 0.5 + d.normalizedWeight * 4)
    .attr('stroke-linecap', 'round');
}

function updateMetaLinkPositions() {
  gMetaLinks.selectAll('.meta-link').each(function(d) {
    const s = clusterCentroid(d.sourceCluster);
    const t = clusterCentroid(d.targetCluster);
    d3.select(this)
      .attr('x1', s.x).attr('y1', s.y)
      .attr('x2', t.x).attr('y2', t.y);

    // Update gradient endpoints to track cluster positions
    svgDefs.select(`#${d.gradId}`)
      .attr('x1', s.x).attr('y1', s.y)
      .attr('x2', t.x).attr('y2', t.y);
  });
}

function renderPositions() {
  if (!currentNodes || !currentGraph) return;
  const nodeMap = currentGraph.nodeMap;

  gLinks.selectAll('.link').each(function(d) {
    const sn = nodeMap.get(d.source);
    const tn = nodeMap.get(d.target);
    const sx = sn?.x || 0, sy = sn?.y || 0;
    const tx = tn?.x || 0, ty = tn?.y || 0;
    d3.select(this)
      .attr('x1', sx).attr('y1', sy)
      .attr('x2', tx).attr('y2', ty);

    // Update gradient endpoints and mid-opacity based on current distance
    if (d._gradId) {
      const dist = Math.hypot(tx - sx, ty - sy);
      const midOp = edgeMidOpacity(dist);
      const grad = svgDefs.select(`#${d._gradId}`);
      grad.attr('x1', sx).attr('y1', sy).attr('x2', tx).attr('y2', ty);
      const stops = grad.selectAll('stop').nodes();
      d3.select(stops[1]).attr('stop-opacity', midOp);
      d3.select(stops[2]).attr('stop-opacity', midOp * 0.7);
      d3.select(stops[3]).attr('stop-opacity', midOp);
    }
  });

  // Update arrowhead positions
  gLinks.selectAll('.arrow').each(function(d) {
    const sn = nodeMap.get(d.source), tn = nodeMap.get(d.target);
    if (!sn || !tn) return;
    const dx = tn.x - sn.x, dy = tn.y - sn.y;
    const len = Math.hypot(dx, dy);
    if (len < 1) return;
    const ux = dx / len, uy = dy / len;
    const tr = tn.radius || 4;
    const tipX = tn.x - ux * tr, tipY = tn.y - uy * tr;
    const sz = 3;
    const bx = tipX - ux * sz, by = tipY - uy * sz;
    const px = -uy * sz * 0.5, py = ux * sz * 0.5;
    d3.select(this).attr('d', `M${tipX},${tipY} L${bx + px},${by + py} L${bx - px},${by - py}Z`);
  });

  gNodes.selectAll('.node')
    .attr('transform', d => `translate(${d.x},${d.y})`);

  gLabels.selectAll('text')
    .attr('x', d => d.x)
    .attr('y', d => d.y);

  updateMetaLinkPositions();
  renderHulls();
  renderClusterLabels();
}

// ═══════════════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════════════
function bfsDistances(startId, adjacency, maxDepth) {
  const dist = new Map();
  dist.set(startId, 0);
  const queue = [startId];
  while (queue.length) {
    const cur = queue.shift();
    const d = dist.get(cur);
    if (d >= maxDepth) continue;
    for (const nb of (adjacency.get(cur) || [])) {
      if (!dist.has(nb)) {
        dist.set(nb, d + 1);
        queue.push(nb);
      }
    }
  }
  return dist;
}

function highlightNeighbors(d, graph) {}
function clearHighlight() {
  // Reset all node opacities to their default (respecting semantic zoom)
  gNodes.selectAll('.node').style('opacity', null);
  gLabels.selectAll('text').attr('opacity', null);
  // Re-apply semantic zoom to restore correct opacities
  applySemanticZoom();
  applyNodeHiding();
}

function affinityBarsHTML(d, clusterNames) {
  if (!d.affinities || d.affinities.size === 0) return '';
  const sorted = [...d.affinities.entries()].sort((a, b) => b[1] - a[1]);
  const bars = sorted.map(([cid, weight]) => {
    const pct = Math.round(weight * 100);
    const color = CLUSTER_COLORS[cid % CLUSTER_COLORS.length];
    const name = clusterNames.get(cid) || `system_${cid}`;
    return `<div style="display:flex;align-items:center;gap:6px;margin:2px 0">
      <div style="width:${Math.max(4, pct)}%;height:6px;background:${color};border-radius:3px;min-width:4px"></div>
      <span style="color:${color};white-space:nowrap">${name} ${pct}%</span>
    </div>`;
  }).join('');
  return `<div class="section"><div class="section-title">Affinities</div>${bars}</div>`;
}

function structBarsHTML(d, clusterNames) {
  if (!d.struct || d.struct.size === 0) return '';
  const sorted = [...d.struct.entries()].sort((a, b) => b[1] - a[1]);
  const bars = sorted.map(([cid, weight]) => {
    const pct = Math.round(weight * 100);
    const color = CLUSTER_COLORS[cid % CLUSTER_COLORS.length];
    const name = clusterNames.get(cid) || `system_${cid}`;
    return `<div style="display:flex;align-items:center;gap:6px;margin:2px 0">
      <div style="width:${Math.max(4, pct)}%;height:6px;background:${color};border-radius:3px;min-width:4px"></div>
      <span style="color:${color};white-space:nowrap">${name} ${pct}%</span>
    </div>`;
  }).join('');
  return `<div class="section"><div class="section-title">struct</div>${bars}</div>`;
}

function applyContextualEdgeWeights(focusId) {
  if (!currentGraph || !currentNodes) return;
  const adj = currentGraph.adjacency;
  const distances = bfsDistances(focusId, adj, 3);

  gLinks.selectAll('.link')
    .transition().duration(300)
    .attr('stroke-opacity', contextEdgeOp);
  const contextEdgeWidthFn = l => {
    const layerOp = pullLayerState.get(l.type) || 0;
    if (layerOp <= 0) return 0.3;
    const sd = distances.get(l.source) ?? 99;
    const td = distances.get(l.target) ?? 99;
    const maxD = Math.max(sd, td);
    const w = (l.weight || 1);
    if (maxD <= 1) return Math.min(4, 1.5 + w * 0.5) * layerOp;
    if (maxD <= 2) return Math.min(3, 0.8 + w * 0.3) * layerOp;
    return Math.min(2, 0.3 + w * 0.15);
  };
  gLinks.selectAll('.link').transition().duration(300).attr('stroke-width', contextEdgeWidthFn);
  gLinks.selectAll('.arrow')
    .transition().duration(300)
    .attr('fill-opacity', contextEdgeOp);

  function contextEdgeOp(l) {
    const layerOp = pullLayerState.get(l.type) || 0;
    if (layerOp <= 0) return 0.02;
    const sd = distances.get(l.source) ?? 99;
    const td = distances.get(l.target) ?? 99;
    const minD = Math.min(sd, td);
    const maxD = Math.max(sd, td);
    let base;
    if (maxD <= 1) base = 0.8;
    else if (maxD <= 2) base = 0.35;
    else if (minD <= 2) base = 0.12;
    else base = 0.03;
    return base * layerOp;
  }
}

function selectNode(d, analysis) {
  selectedNode = d;
  const panel = document.getElementById('info-panel');
  panel.classList.add('open');
  applyContextualEdgeWeights(d.id);
  document.getElementById('info-name').textContent = d.id;
  const clusterNames = currentClusterNames;
  const affinitySection = affinityBarsHTML(d, clusterNames);
  const structSection = structBarsHTML(d);
  // Collect ALL edges connected to this node from precomputed edges (complete set)
  const allEdges = analysisResult?.precomputedEdges || [];
  const edgesByType = new Map(); // type → [{ other, direction }]
  for (const e of allEdges) {
    if (e.source === d.id || e.target === d.id) {
      const other = e.source === d.id ? e.target : e.source;
      const direction = e.source === d.id ? 'out' : 'in';
      if (!edgesByType.has(e.type)) edgesByType.set(e.type, []);
      edgesByType.get(e.type).push({ other, direction });
    }
  }
  // Also check currentLinks for edges not in precomputedEdges
  if (currentLinks) {
    for (const e of currentLinks) {
      const src = typeof e.source === 'object' ? e.source.id : e.source;
      const tgt = typeof e.target === 'object' ? e.target.id : e.target;
      if (src === d.id || tgt === d.id) {
        const other = src === d.id ? tgt : src;
        const direction = src === d.id ? 'out' : 'in';
        const list = edgesByType.get(e.type);
        if (!list || !list.some(x => x.other === other && x.direction === direction)) {
          if (!edgesByType.has(e.type)) edgesByType.set(e.type, []);
          edgesByType.get(e.type).push({ other, direction });
        }
      }
    }
  }

  // Build edges HTML grouped by type
  const edgeLayerMap = new Map(EDGE_LAYERS.map(l => [l.id, l]));
  const edgesHTML = [...edgesByType.entries()]
    .sort((a, b) => b[1].length - a[1].length)
    .map(([type, edges]) => {
      const layer = edgeLayerMap.get(type);
      const color = layer ? layer.color : '#888';
      const label = layer ? layer.label : type;
      const tags = edges
        .sort((a, b) => a.other.localeCompare(b.other))
        .map(e => {
          const arrow = e.direction === 'out' ? '->' : '<-';
          return `<span class="tag" style="border-left:2px solid ${color}">${arrow} ${e.other}</span>`;
        }).join('');
      return `<div class="section"><div class="section-title">${label} (${edges.length})</div>${tags}</div>`;
    }).join('');

  // Type & system line
  const typeLabel = d.type || 'unknown';
  const systemLine = d.clusterName ? `<div class="section"><div class="section-title">System</div>${d.clusterName}</div>` : '';
  const info = d.info;
  const locationLine = info ? `<div class="section"><div class="section-title">Location</div>Line ${info.line} -- ${info.endLine} (${info.lines} lines)</div>` : '';

  document.getElementById('info-body').innerHTML = `
    <div class="section"><div class="section-title">Type</div>${typeLabel}</div>
    ${locationLine}
    ${systemLine}
    ${affinitySection}
    ${structSection}
    ${edgesHTML}
  `;
}

// ═══════════════════════════════════════════════════════
// ATTRACTOR (press-and-hold)
// ═══════════════════════════════════════════════════════
function startAttractor(d) {
  attractorNode = d;
  attractorStartTime = Date.now();
  attractorHoldStrength = 0;

  gNodes.selectAll('.node').filter(n => n.id === d.id)
    .select('circle').classed('attractor-glow', true);

  attractorRAF = requestAnimationFrame(attractorLoop);
}

function attractorLoop() {
  if (!attractorNode) return;
  const holdMs = Date.now() - attractorStartTime;
  attractorHoldStrength = Math.min(1, holdMs / 2000);
  const str = attractorHoldStrength;
  if (str < 0.05) { attractorRAF = requestAnimationFrame(attractorLoop); return; }

  const tx = attractorNode.x;
  const ty = attractorNode.y;
  const adj = currentGraph ? getPullAdjacency() : null;
  if (!adj) { attractorRAF = requestAnimationFrame(attractorLoop); return; }

  // Hold duration controls how many hops are affected:
  // 0-0.5s: n+1 only, 0.5-1.5s: n+1 and n+2, 1.5s+: n+1, n+2, n+3
  const maxHop = holdMs < 500 ? 1 : holdMs < 1500 ? 2 : 3;
  const distances = bfsDistances(attractorNode.id, adj, maxHop);

  // Only move nodes within the active BFS radius — everything else stays put
  const attractorIsSelected = selectedNodes.has(attractorNode.id);
  const movedNodes = [];
  for (const n of currentNodes) {
    if (n.id === attractorNode.id) continue;
    if (!attractorIsSelected && lockedNodes.has(n.id)) continue;
    const graphDist = distances.get(n.id);
    if (graphDist == null || graphDist > maxHop) continue;

    const dx = tx - n.x, dy = ty - n.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;

    let move = 0;
    if (graphDist === 1) {
      const targetDist = n.radius + attractorNode.radius + 12;
      move = (dist - targetDist) * str * 0.12;
    } else if (graphDist === 2) {
      // Ramp in: strength grows from 0 at 0.5s to full at 1.5s
      const hop2Str = Math.min(1, (holdMs - 500) / 1000);
      const targetDist = n.radius + attractorNode.radius + 50;
      if (dist > targetDist) {
        move = (dist - targetDist) * str * hop2Str * 0.025;
      }
    } else if (graphDist === 3) {
      const hop3Str = Math.min(1, (holdMs - 1500) / 1000);
      const targetDist = n.radius + attractorNode.radius + 100;
      if (dist > targetDist) {
        move = (dist - targetDist) * str * hop3Str * 0.01;
      }
    }

    if (Math.abs(move) > 0.01) {
      const maxMove = graphDist === 1 ? 4 : graphDist === 2 ? 2 : 1;
      move = Math.max(-maxMove, Math.min(maxMove, move));
      n.x += (dx / dist) * move;
      n.y += (dy / dist) * move;
      movedNodes.push(n);
    }
  }

  // Collision resolution only among moved nodes (prevent stacking)
  for (let i = 0; i < movedNodes.length; i++) {
    for (let j = i + 1; j < movedNodes.length; j++) {
      const a = movedNodes[i], b = movedNodes[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
      const minDist = a.radius + b.radius + 6;
      if (dist < minDist) {
        const push = (minDist - dist) * 0.4;
        a.x -= (dx / dist) * push;
        a.y -= (dy / dist) * push;
        b.x += (dx / dist) * push;
        b.y += (dy / dist) * push;
      }
    }
  }

  // Minimal node-node overlap resolution: only between moved nodes and
  // their immediate static neighbors (nodes they're now overlapping).
  // No cluster-level forces — uninvolved clusters stay perfectly still.
  const _movedSet = new Set(movedNodes.map(n => n.id));
  for (const m of movedNodes) {
    for (const n of currentNodes) {
      if (n.id === m.id || _movedSet.has(n.id)) continue;
      const dx = n.x - m.x, dy = n.y - m.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
      const minDist = m.radius + n.radius + 4;
      if (dist < minDist) {
        // Push the static node just enough to not overlap, very gently
        const push = (minDist - dist) * 0.3;
        n.x += (dx / dist) * push;
        n.y += (dy / dist) * push;
        if (currentK > 3.5) springDisplace(n);
      }
    }
  }

  renderPositions();
  attractorRAF = requestAnimationFrame(attractorLoop);
}

// ═══════════════════════════════════════════════════════
// CLICK-PULL: pull connected nodes toward clicked node
// ═══════════════════════════════════════════════════════
function clickPull(d) {
  if (!currentGraph || !currentNodes) return;
  if (clickPullRAF) cancelAnimationFrame(clickPullRAF);

  const adj = getPullAdjacency();
  const edgeWeights = currentGraph.edgeWeights;
  const distances = bfsDistances(d.id, adj, 2);
  const startTime = performance.now();
  const duration = 500;

  // Snapshot start positions for connected nodes
  const startPos = new Map();
  for (const n of currentNodes) {
    if (n.id !== d.id && distances.has(n.id)) {
      startPos.set(n.id, { x: n.x, y: n.y });
    }
  }

  function step(now) {
    const t = Math.min(1, (now - startTime) / duration);
    const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    // Rebuild spatial grid for collision queries
    if (currentK > 3.5 && currentNodes) {
      let maxR = 0;
      for (const n of currentNodes) if ((n.radius || 4) > maxR) maxR = n.radius || 4;
      _buildCollisionGrid(currentNodes, maxR);
    }

    for (const [id, from] of startPos) {
      const n = currentGraph.nodeMap.get(id);
      if (!n) continue;
      const graphDist = distances.get(id);

      // Compute target: pull toward d, with distance based on hop count and importance
      const importanceSep = (n.radius || 4) + (d.radius || 4) + 8;
      const edgeKey = d.id + '\0' + id;
      const ew = edgeWeights.get(edgeKey) || edgeWeights.get(id + '\0' + d.id) || 1;
      let targetDist;
      if (graphDist === 1) {
        targetDist = importanceSep + 15 / Math.min(3, ew);
      } else {
        targetDist = importanceSep + 60;
      }

      const dx = d.x - from.x, dy = d.y - from.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      if (dist <= targetDist) continue; // already close enough

      const pullAmount = (dist - targetDist) * (graphDist === 1 ? 0.6 : 0.25);
      const tx = from.x + (dx / dist) * pullAmount;
      const ty = from.y + (dy / dist) * pullAmount;

      n.x = from.x + (tx - from.x) * ease;
      n.y = from.y + (ty - from.y) * ease;
    }

    // Collision resolution among pulled nodes
    const pulled = [...startPos.keys()].map(id => currentGraph.nodeMap.get(id)).filter(Boolean);
    for (let i = 0; i < pulled.length; i++) {
      for (let j = i + 1; j < pulled.length; j++) {
        const a = pulled[i], b = pulled[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
        const minDist = a.radius + b.radius + 6;
        if (dist < minDist) {
          const push = (minDist - dist) * 0.3;
          a.x -= (dx / dist) * push;
          a.y -= (dy / dist) * push;
          b.x += (dx / dist) * push;
          b.y += (dy / dist) * push;
        }
      }
    }
    // When zoomed in, soft-push static nodes away from pulled nodes (they spring back)
    if (currentK > 3.5) {
      const pulledSet = new Set(pulled.map(n => n.id));
      pulledSet.add(d.id);
      for (const m of pulled) {
        const nearby = _nearbyNodes(m.x, m.y, m.radius + 30);
        for (let i = 0; i < nearby.length; i++) {
          const n = nearby[i];
          if (pulledSet.has(n.id)) continue;
          if (softCollide(n, m.x, m.y, m.radius, 4)) {
            springDisplace(n);
          }
        }
      }
    }

    renderPositions();
    if (t < 1) {
      clickPullRAF = requestAnimationFrame(step);
    } else {
      clickPullRAF = null;
      for (const n of currentNodes) {
        savedPositions.set(n.id, { x: n.x, y: n.y });
      }
      pushArrangement('click-pull', [d.id]);
    }
  }
  clickPullRAF = requestAnimationFrame(step);
}

function lockAttractor() {
  if (attractorRAF) { cancelAnimationFrame(attractorRAF); attractorRAF = null; }

  // Save positions for all moved nodes
  if (currentNodes) {
    for (const n of currentNodes) {
      savedPositions.set(n.id, { x: n.x, y: n.y });
    }
  }
  const id = attractorNode ? attractorNode.id : null;
  gNodes.selectAll('circle').classed('attractor-glow', false);
  attractorNode = null;
  attractorHoldStrength = 0;
  if (id) pushArrangement('attractor', [id]);
}

function releaseAttractor() {
  if (attractorRAF) { cancelAnimationFrame(attractorRAF); attractorRAF = null; }
  gNodes.selectAll('circle').classed('attractor-glow', false);
  attractorNode = null;
  attractorHoldStrength = 0;
}

// ═══════════════════════════════════════════════════════
// NODE LOCKING
// ═══════════════════════════════════════════════════════
function lockSelectedNodes() {
  if (selectedNodes.size === 0) return;
  for (const id of selectedNodes) {
    const wasLocked = lockedNodes.has(id);
    lockedNodes.add(id);
    stickyNodes.add(id);
    const n = currentGraph?.nodeMap.get(id);
    if (n) savedPositions.set(id, { x: n.x, y: n.y });
    if (window.streamClient && !wasLocked) {
      window.streamClient.emitAction('lock', id);
      window.streamClient.emitAction('stick', id);
    }
  }
  updateLockUI();
}

function unlockNodes() {
  if (window.streamClient) {
    for (const id of lockedNodes) window.streamClient.emitAction('unlock', id);
  }
  lockedNodes.clear();
  updateLockUI();
}

function updateLockUI() {
  const btn = document.getElementById('lock-btn');
  const indicator = document.getElementById('lock-indicator');
  if (lockedNodes.size > 0) {
    btn.classList.add('active');
    indicator.style.display = '';
    indicator.textContent = `Locked (${lockedNodes.size})`;
    // Show locked glow on locked nodes
    gNodes.selectAll('.node circle').classed('selected-glow', d => lockedNodes.has(d.id) || selectedNodes.has(d.id));
  } else {
    btn.classList.remove('active');
    indicator.style.display = 'none';
    gNodes.selectAll('.node circle').classed('selected-glow', d => selectedNodes.has(d.id));
  }
}

// ═══════════════════════════════════════════════════════
// X-KEY EDGE RELAXATION
// ═══════════════════════════════════════════════════════
let xRelaxFactor = 0; // 0 = current positions, 1 = fully back to T0
let xT0Positions = null; // snapshot: where nodes were at X-press (to lerp back toward)
let xStartPositions = null; // snapshot: where nodes are now (lerp from)

// singleNode: if provided, only this node lerps to T0
function startXForces(singleNode) {
  if (xKeyRAF) return;
  // Cancel any running arrangement animation to prevent position conflicts
  if (animationRAF) { cancelAnimationFrame(animationRAF); animationRAF = null; }
  xKeyHeld = true;
  const xStartTime = performance.now();

  // Snapshot current positions (start) and layout positions (T0)
  xStartPositions = new Map();
  xT0Positions = new Map();

  if (singleNode) {
    // Single-node mode: only move this one node
    xStartPositions.set(singleNode.id, { x: singleNode.x, y: singleNode.y });
    const t0 = initialLayoutPositions.get(singleNode.id);
    xT0Positions.set(singleNode.id, t0 ? { x: t0.x, y: t0.y } : { x: singleNode.x, y: singleNode.y });
  } else {
    // Bulk mode: all unlocked nodes
    for (const n of currentNodes) {
      if (lockedNodes.has(n.id)) continue;
      xStartPositions.set(n.id, { x: n.x, y: n.y });
      const t0 = initialLayoutPositions.get(n.id);
      xT0Positions.set(n.id, t0 ? { x: t0.x, y: t0.y } : { x: n.x, y: n.y });
    }
  }

  function xLoop() {
    if (!xKeyHeld || !currentNodes || !currentGraph) return;

    const now = performance.now();
    const elapsed = now - xStartTime;
    // Ramp relaxation from 0 to 1 — single node: 0.5s, bulk: 3s
    const duration = singleNode ? Math.min(500, xRewindDuration) : xRewindDuration;
    xRelaxFactor = Math.min(1, elapsed / duration);

    // Lerp target nodes from start positions back toward T0
    for (const n of currentNodes) {
      const start = xStartPositions.get(n.id);
      const t0 = xT0Positions.get(n.id);
      if (!start || !t0) continue;
      n.x = start.x + (t0.x - start.x) * xRelaxFactor;
      n.y = start.y + (t0.y - start.y) * xRelaxFactor;
    }

    renderPositions();
    xKeyRAF = requestAnimationFrame(xLoop);
  }
  xKeyRAF = requestAnimationFrame(xLoop);
}

function stopXForces() {
  xKeyHeld = false;
  if (xKeyRAF) { cancelAnimationFrame(xKeyRAF); xKeyRAF = null; }

  // Save positions of moved nodes
  if (xStartPositions && currentGraph) {
    for (const id of xStartPositions.keys()) {
      const n = currentGraph.nodeMap.get(id);
      if (n) {
        stickyNodes.add(n.id);
        savedPositions.set(n.id, { x: n.x, y: n.y });
      }
    }
  }

  pushArrangement('x-step', []);

  xRelaxFactor = 0;
  xStartPositions = null;
  xT0Positions = null;
}

// ═══════════════════════════════════════════════════════
// Z-KEY TIME TRAVEL (backwards through arrangement history)
// ═══════════════════════════════════════════════════════
function startZTimeTravel() {
  if (zKeyRAF || !currentNodes) return;
  if (spatialMemory.arrangements.length < 2) return;
  zKeyHeld = true;
  zTravelStartIndex = arrangementIndex;

  const stepDuration = zTravelStepDuration;
  let lastStepTime = performance.now();
  let currentLerpFrom = null; // positions at start of current step
  let currentLerpTo = null;   // target positions for current step
  let stepStart = performance.now();

  function snapshotCurrent() {
    const m = new Map();
    for (const n of currentNodes) {
      m.set(n.id, { x: n.x, y: n.y });
    }
    return m;
  }

  function arrPositions(idx) {
    const arr = spatialMemory.arrangements[idx];
    if (!arr) return null;
    const m = new Map();
    for (const [id, pos] of Object.entries(arr.positions)) {
      m.set(id, { x: pos[0], y: pos[1] });
    }
    return m;
  }

  // Snapshot current importance as the "from" for the first step
  let impFrom = {};
  for (const [cid, val] of clusterImportance) impFrom[cid] = val;
  let impTo = null;

  // Start first step: lerp from current positions to previous arrangement
  currentLerpFrom = snapshotCurrent();
  const prevIdx = arrangementIndex - 1;
  if (prevIdx < 0) { zKeyHeld = false; return; }
  currentLerpTo = arrPositions(prevIdx);
  impTo = spatialMemory.arrangements[prevIdx]?.clusterImportance || {};
  arrangementIndex = prevIdx;
  updateArrNav();

  function zLoop() {
    if (!zKeyHeld || !currentNodes) return;

    const now = performance.now();
    const elapsed = now - stepStart;
    const t = Math.min(1, elapsed / stepDuration);
    const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

    // Lerp nodes toward current target
    if (currentLerpFrom && currentLerpTo) {
      for (const n of currentNodes) {
        const from = currentLerpFrom.get(n.id);
        const to = currentLerpTo.get(n.id);
        if (from && to) {
          n.x = from.x + (to.x - from.x) * ease;
          n.y = from.y + (to.y - from.y) * ease;
        }
      }
      // Smoothly lerp cluster importance alongside positions
      lerpClusterImportance(impFrom, impTo, ease);
      renderPositions();
    }

    // When step completes, move to next arrangement back
    if (t >= 1 && arrangementIndex > 0) {
      currentLerpFrom = currentLerpTo;
      impFrom = impTo;
      const nextIdx = arrangementIndex - 1;
      currentLerpTo = arrPositions(nextIdx);
      impTo = spatialMemory.arrangements[nextIdx]?.clusterImportance || {};
      arrangementIndex = nextIdx;
      stepStart = now;
      updateArrNav();
    }

    zKeyRAF = requestAnimationFrame(zLoop);
  }
  zKeyRAF = requestAnimationFrame(zLoop);
}

function stopZTimeTravel() {
  zKeyHeld = false;
  if (zKeyRAF) { cancelAnimationFrame(zKeyRAF); zKeyRAF = null; }

  // Final full visual update (rebuilds hulls that were skipped during per-frame lerp)
  applyAllClusterImportanceVisuals();

  // Save current positions into savedPositions
  if (currentNodes && currentGraph) {
    for (const n of currentNodes) {
      if (n.x != null) savedPositions.set(n.id, { x: n.x, y: n.y });
    }
  }

  // Push a new arrangement capturing where we landed
  pushArrangement('z-travel', []);
}

// ═══════════════════════════════════════════════════════
// T-KEY TRACE (BFS propagation through visible edges)
// ═══════════════════════════════════════════════════════

function isNodeOnScreen(n) {
  const transform = d3.zoomTransform(svg.node());
  const sx = transform.applyX(n.x);
  const sy = transform.applyY(n.y);
  return sx >= -50 && sx <= width + 50 && sy >= -50 && sy <= height + 50;
}

function getTraceNeighbors(nodeId, mode) {
  if (!currentGraph || !currentLinks) return [];
  const enabledLayers = getEnabledEdgeLayers();
  const enabledIds = new Set(enabledLayers.map(l => l.id));
  const neighbors = [];

  for (const link of currentLinks) {
    if (!enabledIds.has(link.type)) continue;
    const layer = EDGE_LAYERS.find(l => l.id === link.type);
    if (!layer) continue;

    if (layer.directed) {
      if (mode === 'forward') {
        // Follow edge direction: source -> target
        if (link.source === nodeId) neighbors.push({ id: link.target, link });
      } else if (mode === 'backward') {
        // Follow reverse: target -> source, ignore bidirectional
        // Check if the reverse edge also exists (bidirectional) — if so, skip
        const reverseExists = currentLinks.some(l =>
          l.type === link.type && l.source === link.target && l.target === link.source
        );
        if (reverseExists) continue;
        if (link.target === nodeId) neighbors.push({ id: link.source, link });
      } else {
        // 'both': follow in both directions
        if (link.source === nodeId) neighbors.push({ id: link.target, link });
        if (link.target === nodeId) neighbors.push({ id: link.source, link });
      }
    } else {
      // Undirected: trace both connected nodes
      if (mode === 'backward') continue; // backward ignores undirected
      if (link.source === nodeId) neighbors.push({ id: link.target, link });
      if (link.target === nodeId) neighbors.push({ id: link.source, link });
    }
  }
  return neighbors;
}

function clearTraceVisuals() {
  gNodes.selectAll('circle').classed('trace-glow', false).classed('trace-wave', false);
  gLinks.selectAll('.link').classed('trace-active', false).each(function(d) {
    // Restore gradient stroke
    if (d._gradId) d3.select(this).attr('stroke', `url(#${d._gradId})`);
  });
  // Re-hide edges if they were only visible due to trace
  applySemanticZoom();
}

function startTrace(mode, flash) {
  if (traceRAF) stopTrace();
  if (!currentNodes || !currentGraph) return;

  traceMode = mode;
  traceFlash = flash;
  tKeyHeld = true;
  traceVisited = new Set();
  traceWavefront = new Set();
  traceStepIndex = 0;
  traceStartTime = performance.now();
  traceLastStepTime = performance.now();

  clearTraceVisuals();

  // Start from selected node, or pick a random on-screen node
  let startNode = selectedNode || forcePressDragNode;
  if (!startNode) {
    const onScreen = currentNodes.filter(n => isNodeOnScreen(n));
    if (onScreen.length === 0) return;
    startNode = onScreen[Math.floor(Math.random() * onScreen.length)];
  }

  traceWavefront.add(startNode.id);
  traceVisited.add(startNode.id);

  // Apply initial glow to start node
  gNodes.selectAll('.node').each(function(d) {
    if (d.id === startNode.id) {
      d3.select(this).select('circle').classed('trace-wave', true);
    }
  });

  if (flash) {
    // Flash mode: run entire BFS immediately with staggered visual timing
    const waves = [[startNode.id]];
    let frontier = new Set([startNode.id]);
    const allVisited = new Set([startNode.id]);
    const edgesPerWave = [[]];

    while (frontier.size > 0) {
      const nextFrontier = new Set();
      const waveEdges = [];
      for (const nid of frontier) {
        for (const { id: neighborId, link } of getTraceNeighbors(nid, mode)) {
          if (allVisited.has(neighborId)) continue;
          const neighborNode = currentGraph.nodeMap.get(neighborId);
          if (!neighborNode || !isNodeOnScreen(neighborNode)) continue;
          allVisited.add(neighborId);
          nextFrontier.add(neighborId);
          waveEdges.push(link);
        }
      }
      if (nextFrontier.size === 0) break;
      waves.push([...nextFrontier]);
      edgesPerWave.push(waveEdges);
      frontier = nextFrontier;
    }

    // Stagger the visuals: 80ms per wave for flash
    const flashDelay = 80;
    waves.forEach((wave, wi) => {
      setTimeout(() => {
        gNodes.selectAll('.node').each(function(d) {
          if (wave.includes(d.id)) {
            d3.select(this).select('circle').classed('trace-glow', true).classed('trace-wave', true);
          }
        });
        if (edgesPerWave[wi]) {
          gLinks.selectAll('.link').each(function(ld) {
            for (const el of edgesPerWave[wi]) {
              if (ld.source === el.source && ld.target === el.target && ld.type === el.type) {
                const layer = EDGE_LAYERS.find(l => l.id === ld.type);
                d3.select(this).classed('trace-active', true)
                  .attr('stroke', layer ? layer.color : ld._edgeColor);
              }
            }
          });
          applySemanticZoom();
        }
      }, wi * flashDelay);
    });

    // Clear after all waves complete + dwell time
    const totalDuration = waves.length * flashDelay + 600;
    setTimeout(() => {
      clearTraceVisuals();
      tKeyHeld = false;
      traceRAF = null;
    }, totalDuration);
    traceRAF = -1; // sentinel: flash in progress
  } else {
    // Hold mode: BFS one step at a time
    traceRAF = requestAnimationFrame(traceLoop);
  }
}

let traceLastStepTime = 0;

function traceLoop() {
  if (!tKeyHeld || !currentNodes || !currentGraph) return;

  const now = performance.now();
  // Speed ramps up linearly: starts at traceEdgeDuration, decreases to 1/3 over 10 steps
  const speedFactor = Math.max(0.33, 1.0 - traceStepIndex * 0.067);
  const stepDuration = traceEdgeDuration * speedFactor;

  if (now - traceLastStepTime >= stepDuration || traceStepIndex === 0) {
    traceLastStepTime = now;
    // Demote previous wavefront from wave -> glow
    gNodes.selectAll('.node').each(function(d) {
      if (traceWavefront.has(d.id)) {
        d3.select(this).select('circle').classed('trace-wave', false).classed('trace-glow', true);
      }
    });

    // Expand BFS by one hop
    const nextFrontier = new Set();
    for (const nid of traceWavefront) {
      for (const { id: neighborId, link } of getTraceNeighbors(nid, traceMode)) {
        if (traceVisited.has(neighborId)) continue;
        const neighborNode = currentGraph.nodeMap.get(neighborId);
        if (!neighborNode || !isNodeOnScreen(neighborNode)) continue;
        traceVisited.add(neighborId);
        nextFrontier.add(neighborId);

        // Highlight the edge in its layer color
        gLinks.selectAll('.link').each(function(ld) {
          if (ld.source === link.source && ld.target === link.target && ld.type === link.type) {
            const layer = EDGE_LAYERS.find(l => l.id === ld.type);
            d3.select(this).classed('trace-active', true)
              .attr('stroke', layer ? layer.color : ld._edgeColor);
          }
        });
      }
    }

    if (nextFrontier.size === 0) {
      // BFS exhausted — hold current visuals until key release
      traceRAF = null;
      return;
    }

    traceWavefront = nextFrontier;
    traceStepIndex++;

    // Apply wave glow to new frontier
    gNodes.selectAll('.node').each(function(d) {
      if (nextFrontier.has(d.id)) {
        d3.select(this).select('circle').classed('trace-wave', true);
      }
    });

    // Reveal newly-active edges when edges are toggled off
    applySemanticZoom();
  }

  traceRAF = requestAnimationFrame(traceLoop);
}

function pauseTrace() {
  // Stop the loop but keep visuals and BFS state intact
  if (traceRAF && traceRAF !== -1) { cancelAnimationFrame(traceRAF); }
  traceRAF = null;
}

function resumeTrace(mode) {
  // Resume BFS from existing wavefront in a new direction (no restart)
  if (!currentNodes || !currentGraph) return;
  if (traceWavefront.size === 0) return;
  pauseTrace();
  traceMode = mode;
  tKeyHeld = true;
  traceLastStepTime = performance.now();
  traceRAF = requestAnimationFrame(traceLoop);
}

function stopTrace() {
  tKeyHeld = false;
  pauseTrace();

  if (traceHeld) return; // H hold: keep visuals and BFS state

  // Fade out visuals after a short dwell
  setTimeout(() => {
    if (!tKeyHeld && !traceHeld) clearTraceVisuals();
  }, 400);

  traceWavefront = new Set();
  traceVisited = new Set();
  traceStepIndex = 0;
}

function releaseTraceHold() {
  traceHeld = false;
  tKeyHeld = false;
  pauseTrace();
  clearTraceVisuals();
  traceWavefront = new Set();
  traceVisited = new Set();
  traceStepIndex = 0;
}

// Repulse nearby nodes toward T0 from a point in SVG space
function repulseFromPoint(svgX, svgY) {
  if (!currentNodes || !currentGraph) return;
  const radius = 150; // affect nodes within this distance
  const strength = 80; // max push distance at center
  const duration = 300;

  // Find nearby unlocked nodes and push them away from click point
  const targets = [];
  for (const n of currentNodes) {
    if (lockedNodes.has(n.id) || n.pinned) continue;
    const dx = n.x - svgX, dy = n.y - svgY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > radius || dist < 0.1) continue;
    const proximity = 1 - dist / radius; // 1 at center, 0 at edge
    const push = strength * proximity * proximity; // quadratic falloff
    const nx = dx / dist, ny = dy / dist; // unit vector away from click
    targets.push({
      node: n,
      startX: n.x, startY: n.y,
      targetX: n.x + nx * push,
      targetY: n.y + ny * push,
    });
  }
  if (!targets.length) return;

  const startTime = performance.now();
  function step() {
    const t = Math.min(1, (performance.now() - startTime) / duration);
    const ease = 1 - (1 - t) * (1 - t);
    for (const { node, startX, startY, targetX, targetY } of targets) {
      node.x = startX + (targetX - startX) * ease;
      node.y = startY + (targetY - startY) * ease;
    }
    renderPositions();
    if (t < 1) {
      requestAnimationFrame(step);
    } else {
      for (const { node } of targets) {
        stickyNodes.add(node.id);
        savedPositions.set(node.id, { x: node.x, y: node.y });
      }
      pushArrangement('repulse', []);
    }
  }
  requestAnimationFrame(step);
}

// Dismiss a single node to T0 (independent animation, multiple can run at once)
function dismissNodeToT0(d) {
  const t0 = initialLayoutPositions.get(d.id);
  if (!t0) return;
  const startX = d.x, startY = d.y;
  const startTime = performance.now();
  const duration = 500;

  // Cancel any existing dismiss on this node
  if (xDismissRAFs.has(d.id)) cancelAnimationFrame(xDismissRAFs.get(d.id));

  function step() {
    const t = Math.min(1, (performance.now() - startTime) / duration);
    d.x = startX + (t0.x - startX) * t;
    d.y = startY + (t0.y - startY) * t;
    renderPositions();
    if (t < 1) {
      xDismissRAFs.set(d.id, requestAnimationFrame(step));
    } else {
      xDismissRAFs.delete(d.id);
      stickyNodes.add(d.id);
      savedPositions.set(d.id, { x: d.x, y: d.y });
    }
  }
  xDismissRAFs.set(d.id, requestAnimationFrame(step));
}

// ═══════════════════════════════════════════════════════
// STRANGER-GATHER (pull neighbors, except selected, toward a clicked node)
// ═══════════════════════════════════════════════════════
function startNeighborGather(anchorNode) {
  if (neighborGatherRAF || !currentGraph || groupMoveActive) return;
  neighborGatherHeld = true;
  const adj = getPullAdjacency();
  const neighborIds = adj.get(anchorNode.id);
  if (!neighborIds || neighborIds.size === 0) return;

  let lastFrameTime = performance.now();
  const startTime = performance.now();

  function loop() {
    if (!neighborGatherHeld || !currentNodes || !currentGraph) return;

    const now = performance.now();
    const dt = Math.min(now - lastFrameTime, 50) / 16.67;
    lastFrameTime = now;
    const ramp = Math.min(1, (now - startTime) / 1000);

    // Pin anchor position — restore after all physics
    const anchorX = anchorNode.x, anchorY = anchorNode.y;

    // Pull neighbors toward anchor node (skip selected and locked nodes)
    for (const nid of neighborIds) {
      const n = currentGraph.nodeMap.get(nid);
      if (!n || lockedNodes.has(n.id) || selectedNodes.has(n.id)) continue;
      const dx = anchorX - n.x, dy = anchorY - n.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const pull = dist * 0.03 * ramp * dt;
      n.x += (dx / dist) * pull;
      n.y += (dy / dist) * pull;
    }

    // Collision resolution among neighbors + against anchor (anchor never moves, skip selected)
    const neighbors = [...neighborIds].map(id => currentGraph.nodeMap.get(id)).filter(n => n && !selectedNodes.has(n.id));
    for (let i = 0; i < neighbors.length; i++) {
      for (let j = i + 1; j < neighbors.length; j++) {
        const a = neighbors[i], b = neighbors[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
        const minDist = a.radius + b.radius + 6;
        if (dist < minDist) {
          const push = (minDist - dist) * 0.4;
          a.x -= (dx / dist) * push;
          a.y -= (dy / dist) * push;
          b.x += (dx / dist) * push;
          b.y += (dy / dist) * push;
        }
      }
      // Push neighbor away from anchor (only neighbor moves)
      const dx = neighbors[i].x - anchorX, dy = neighbors[i].y - anchorY;
      const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
      const minDist = neighbors[i].radius + anchorNode.radius + 6;
      if (dist < minDist) {
        const push = (minDist - dist) * 0.5;
        neighbors[i].x += (dx / dist) * push;
        neighbors[i].y += (dy / dist) * push;
      }
    }
    // When zoomed in, soft-push static nodes away from gathered neighbors (they spring back)
    if (currentK > 3.5) {
      let maxR = 0;
      for (const n of currentNodes) if ((n.radius || 4) > maxR) maxR = n.radius || 4;
      _buildCollisionGrid(currentNodes, maxR);
      const neighborSet = new Set(neighbors.map(n => n.id));
      neighborSet.add(anchorNode.id);
      for (const m of neighbors) {
        const nearby = _nearbyNodes(m.x, m.y, m.radius + 30);
        for (let i = 0; i < nearby.length; i++) {
          const n = nearby[i];
          if (neighborSet.has(n.id) || selectedNodes.has(n.id)) continue;
          if (softCollide(n, m.x, m.y, m.radius, 4)) {
            springDisplace(n);
          }
        }
      }
    }

    // Force anchor back to pinned position (in case anything else touched it)
    anchorNode.x = anchorX;
    anchorNode.y = anchorY;

    renderPositions();
    neighborGatherRAF = requestAnimationFrame(loop);
  }
  neighborGatherRAF = requestAnimationFrame(loop);
}

function stopNeighborGather() {
  neighborGatherHeld = false;
  if (neighborGatherRAF) { cancelAnimationFrame(neighborGatherRAF); neighborGatherRAF = null; }
  // Save positions of pulled neighbors
  if (currentGraph) {
    for (const n of currentNodes) {
      if (n.x != null) {
        stickyNodes.add(n.id);
        savedPositions.set(n.id, { x: n.x, y: n.y });
      }
    }
  }
  pushArrangement('stranger-gather', []);
}

// ═══════════════════════════════════════════════════════
// CLUSTER-GATHER (Click cluster label + Hold Space)
// Pull all clusters connected via meta-edges toward the clicked cluster.
// Uninvolved clusters are gently repulsed.
// ═══════════════════════════════════════════════════════
function clusterBounds(cid) {
  // Compute centroid and bounding radius for a cluster
  const members = currentNodes.filter(n => n.cluster === cid);
  if (members.length === 0) return { cx: 0, cy: 0, r: 0, members };
  let cx = 0, cy = 0;
  for (const m of members) { cx += m.x; cy += m.y; }
  cx /= members.length; cy /= members.length;
  let maxR = 0;
  for (const m of members) {
    const dx = m.x - cx, dy = m.y - cy;
    maxR = Math.max(maxR, Math.sqrt(dx * dx + dy * dy) + (m.radius || 4));
  }
  return { cx, cy, r: maxR + 10, members }; // +10 padding
}

function clusterIslands(cid, nodeList) {
  // Split a cluster into spatial islands — groups of nodes that are physically
  // close together. Prevents phantom-centroid forces when nodes are scattered.
  const members = (nodeList || currentNodes).filter(n => n.cluster === cid);
  if (members.length === 0) return [];
  if (members.length === 1) {
    return [{ members, cx: members[0].x, cy: members[0].y, r: (members[0].radius || 4) + 10, cid }];
  }

  // Adaptive gap threshold: 2.5x average nearest-neighbor distance, min 100px
  let totalNND = 0;
  for (let i = 0; i < members.length; i++) {
    let minD = Infinity;
    for (let j = 0; j < members.length; j++) {
      if (i === j) continue;
      const dx = members[i].x - members[j].x, dy = members[i].y - members[j].y;
      minD = Math.min(minD, Math.sqrt(dx * dx + dy * dy));
    }
    totalNND += minD;
  }
  const maxGap = Math.max(100, (totalNND / members.length) * 2.5);

  // Union-find by proximity
  const par = members.map((_, i) => i);
  function find(i) { while (par[i] !== i) { par[i] = par[par[i]]; i = par[i]; } return i; }
  function unite(a, b) { par[find(a)] = find(b); }

  for (let i = 0; i < members.length; i++) {
    for (let j = i + 1; j < members.length; j++) {
      const dx = members[i].x - members[j].x, dy = members[i].y - members[j].y;
      if (Math.sqrt(dx * dx + dy * dy) < maxGap) unite(i, j);
    }
  }

  // Group by root
  const groups = new Map();
  for (let i = 0; i < members.length; i++) {
    const root = find(i);
    if (!groups.has(root)) groups.set(root, []);
    groups.get(root).push(members[i]);
  }

  // Compute bounds for each island
  return [...groups.values()].map(g => {
    let cx = 0, cy = 0;
    for (const m of g) { cx += m.x; cy += m.y; }
    cx /= g.length; cy /= g.length;
    let maxR = 0;
    for (const m of g) {
      const dx = m.x - cx, dy = m.y - cy;
      maxR = Math.max(maxR, Math.sqrt(dx * dx + dy * dy) + (m.radius || 4));
    }
    return { members: g, cx, cy, r: maxR + 10, cid };
  });
}

function separateClusters(cidList, anchorCid, dt, islandCache) {
  // Island-aware collision: each cluster may have multiple spatial islands,
  // so we collide island-vs-island across different clusters instead of using
  // one giant bounding circle per cluster (which creates phantom collisions
  // when nodes are scattered).
  const allIslands = [];
  for (const cid of cidList) {
    const islands = islandCache ? (islandCache.get(cid) || clusterIslands(cid)) : clusterIslands(cid);
    for (const isl of islands) allIslands.push(isl);
  }

  for (let i = 0; i < allIslands.length; i++) {
    for (let j = i + 1; j < allIslands.length; j++) {
      const a = allIslands[i], b = allIslands[j];
      if (a.cid === b.cid) continue; // same cluster islands don't collide
      if (a.members.length === 0 || b.members.length === 0) continue;
      const dx = b.cx - a.cx, dy = b.cy - a.cy;
      const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
      const minDist = a.r + b.r;
      if (dist >= minDist) continue;

      const overlap = minDist - dist;
      const push = Math.min(overlap * 0.15, 15);
      const nx = dx / dist, ny = dy / dist;

      const aIsAnchor = a.cid === anchorCid;
      const bIsAnchor = b.cid === anchorCid;
      const aShare = aIsAnchor ? 0 : bIsAnchor ? 1 : 0.5;
      const bShare = bIsAnchor ? 0 : aIsAnchor ? 1 : 0.5;

      for (const n of a.members) {
        if (lockedNodes.has(n.id)) continue;
        n.x -= nx * push * aShare;
        n.y -= ny * push * aShare;
      }
      for (const n of b.members) {
        if (lockedNodes.has(n.id)) continue;
        n.x += nx * push * bShare;
        n.y += ny * push * bShare;
      }
    }
  }
}

function startClusterGather(anchorCid) {
  if (clusterGatherRAF || !currentGraph || !currentNodes) return;
  clusterGatherHeld = true;
  clusterGatherAnchorCid = anchorCid;

  // Snapshot current anchor-cluster positions so the gather loop pins them
  // where they are NOW (not where savedPositions last recorded them — which
  // may be stale if the user dragged the cluster before pressing Space).
  for (const n of currentNodes) {
    if (n.cluster === anchorCid) {
      savedPositions.set(n.id, { x: n.x, y: n.y });
    }
  }

  // Find connected cluster IDs via meta-links
  const connectedCids = new Set();
  for (const ml of currentMetaLinks) {
    if (ml.sourceCluster === anchorCid) connectedCids.add(ml.targetCluster);
    if (ml.targetCluster === anchorCid) connectedCids.add(ml.sourceCluster);
  }
  if (connectedCids.size === 0) { clusterGatherHeld = false; return; }

  // All cluster IDs present in the graph
  const allCids = [...new Set(currentNodes.filter(n => n.cluster != null && n.cluster >= 0).map(n => n.cluster))];

  // Uninvolved clusters (not anchor, not connected)
  const uninvolvedCids = new Set();
  for (const cid of allCids) {
    if (cid !== anchorCid && !connectedCids.has(cid)) uninvolvedCids.add(cid);
  }

  // Highlight meta-edges for involved clusters
  focusedClusterId = anchorCid;
  applyMetaLinkFocus();

  // Clear any spring-back entries for nodes that will be moved by the gather,
  // so springs don't fight the gather forces
  for (const n of currentNodes) {
    if (n.cluster !== anchorCid) springNodes.delete(n.id);
  }

  let lastFrameTime = performance.now();
  const startTime = performance.now();

  function loop() {
    if (!clusterGatherHeld || !currentNodes || !currentGraph) return;

    const now = performance.now();
    const dt = Math.min(now - lastFrameTime, 50) / 16.67;
    lastFrameTime = now;
    const ramp = Math.min(1, (now - startTime) / 800);

    // Compute islands once per frame and cache for reuse
    const islandCache = new Map();
    for (const cid of allCids) islandCache.set(cid, clusterIslands(cid));

    // Anchor islands (tracks drag movement via recomputation each frame)
    const anchorIslands = islandCache.get(anchorCid) || [];

    // Pull connected clusters toward anchor — island-aware: each island in the
    // connected cluster pulls toward the nearest anchor island, not a phantom
    // whole-cluster centroid that may be far from any actual node.
    for (const cid of connectedCids) {
      const islands = islandCache.get(cid) || [];
      let coupling = 1;
      for (const ml of currentMetaLinks) {
        if ((ml.sourceCluster === anchorCid && ml.targetCluster === cid) ||
            (ml.targetCluster === anchorCid && ml.sourceCluster === cid)) {
          coupling = 0.5 + ml.normalizedWeight * 1.5;
          break;
        }
      }
      for (const isl of islands) {
        // Find nearest anchor island to pull toward
        let nearest = anchorIslands[0];
        let nearestDist = Infinity;
        for (const ai of anchorIslands) {
          const dx = ai.cx - isl.cx, dy = ai.cy - isl.cy;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < nearestDist) { nearestDist = d; nearest = ai; }
        }
        if (!nearest) continue;

        const dx = nearest.cx - isl.cx, dy = nearest.cy - isl.cy;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const pull = Math.min(Math.sqrt(dist) * 0.4 * ramp * dt * coupling, dist * 0.3);
        const mx = (dx / dist) * pull, my = (dy / dist) * pull;
        for (const n of isl.members) {
          if (!lockedNodes.has(n.id)) { n.x += mx; n.y += my; }
        }
      }
    }

    // Gently repulse uninvolved clusters — island-aware: repulse each island
    // from the nearest anchor island, not a phantom centroid.
    for (const cid of uninvolvedCids) {
      const islands = islandCache.get(cid) || [];
      for (const isl of islands) {
        let nearest = anchorIslands[0];
        let nearestDist = Infinity;
        for (const ai of anchorIslands) {
          const dx = isl.cx - ai.cx, dy = isl.cy - ai.cy;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < nearestDist) { nearestDist = d; nearest = ai; }
        }
        if (!nearest) continue;

        const dx = isl.cx - nearest.cx, dy = isl.cy - nearest.cy;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const repulse = Math.max(0, 250 - dist) * 0.002 * ramp * dt;
        if (repulse > 0) {
          const mx = (dx / dist) * repulse, my = (dy / dist) * repulse;
          for (const n of isl.members) {
            if (!lockedNodes.has(n.id)) { n.x += mx; n.y += my; }
          }
        }
      }
    }

    // Island-aware collision: prevent overlapping bounding circles
    separateClusters(allCids, anchorCid, dt, islandCache);

    // Pin anchor cluster nodes to their saved (drag-updated) positions
    for (const n of currentNodes) {
      if (n.cluster === anchorCid) {
        const saved = savedPositions.get(n.id);
        if (saved) { n.x = saved.x; n.y = saved.y; }
      }
    }

    renderPositions();
    clusterGatherRAF = requestAnimationFrame(loop);
  }
  clusterGatherRAF = requestAnimationFrame(loop);
}

function stopClusterGather() {
  clusterGatherHeld = false;
  clusterGatherAnchorCid = null;
  if (clusterGatherRAF) { cancelAnimationFrame(clusterGatherRAF); clusterGatherRAF = null; }
  focusedClusterId = null;
  applyMetaLinkFocus();
  if (currentNodes) {
    for (const n of currentNodes) {
      if (n.x != null) {
        stickyNodes.add(n.id);
        savedPositions.set(n.id, { x: n.x, y: n.y });
      }
    }
  }
  pushArrangement('cluster-gather', []);
}

// ═══════════════════════════════════════════════════════
// INTRA-CLUSTER GATHER (pull cluster nodes toward cluster centroid)
// ═══════════════════════════════════════════════════════

function startIntraClusterGather(anchorCid) {
  if (intraClusterGatherRAF || !currentNodes) return;
  intraClusterGatherHeld = true;

  // Clear spring-back entries for cluster nodes so springs don't fight
  for (const n of currentNodes) {
    if (n.cluster === anchorCid) springNodes.delete(n.id);
  }

  let lastFrameTime = performance.now();
  const startTime = performance.now();

  function loop() {
    if (!intraClusterGatherHeld || !currentNodes) return;

    const now = performance.now();
    const dt = Math.min(now - lastFrameTime, 50) / 16.67;
    lastFrameTime = now;
    const ramp = Math.min(1, (now - startTime) / 800);

    // Gather cluster members toward their centroid
    const members = currentNodes.filter(n => n.cluster === anchorCid);
    if (members.length < 2) { stopIntraClusterGather(); return; }

    let cx = 0, cy = 0;
    for (const m of members) { cx += m.x; cy += m.y; }
    cx /= members.length; cy /= members.length;

    for (const n of members) {
      if (lockedNodes.has(n.id)) continue;
      const dx = cx - n.x, dy = cy - n.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const pull = Math.min(Math.sqrt(dist) * 0.5 * ramp * dt, dist * 0.3);
      n.x += (dx / dist) * pull;
      n.y += (dy / dist) * pull;
    }

    renderPositions();
    intraClusterGatherRAF = requestAnimationFrame(loop);
  }
  intraClusterGatherRAF = requestAnimationFrame(loop);
}

function stopIntraClusterGather() {
  intraClusterGatherHeld = false;
  if (intraClusterGatherRAF) { cancelAnimationFrame(intraClusterGatherRAF); intraClusterGatherRAF = null; }
  focusedClusterId = null;
  applyMetaLinkFocus();
  if (currentNodes) {
    for (const n of currentNodes) {
      if (n.x != null) {
        stickyNodes.add(n.id);
        savedPositions.set(n.id, { x: n.x, y: n.y });
      }
    }
  }
  pushArrangement('intra-cluster-gather', []);
}

// ═══════════════════════════════════════════════════════
// QUICK-GATHER / GROUP-GATHER (pull selected nodes toward centroid or target)
// ═══════════════════════════════════════════════════════
let spacePullIsGroupGather = false;
function startSpacePull(targetNode) {
  if (spacePullRAF || selectedNodes.size < 2 || groupMoveActive) return;
  spacePullHeld = true;
  spacePullIsGroupGather = !!targetNode;
  let lastFrameTime = performance.now();
  const startTime = performance.now();

  function loop() {
    if (!spacePullHeld || !currentNodes || !currentGraph) return;

    const now = performance.now();
    const dt = Math.min(now - lastFrameTime, 50) / 16.67;
    lastFrameTime = now;
    const ramp = Math.min(1, (now - startTime) / 1000);

    // Pull toward target node if provided, otherwise toward centroid
    let cx, cy;
    if (targetNode) {
      cx = targetNode.x;
      cy = targetNode.y;
    } else {
      cx = 0; cy = 0; let count = 0;
      for (const n of currentNodes) {
        if (!selectedNodes.has(n.id)) continue;
        cx += n.x; cy += n.y; count++;
      }
      if (count < 2) { spacePullRAF = requestAnimationFrame(loop); return; }
      cx /= count; cy /= count;
    }

    // Pull selected nodes toward target
    for (const n of currentNodes) {
      if (!selectedNodes.has(n.id) || n === targetNode) continue;
      const dx = cx - n.x, dy = cy - n.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const pull = dist * 0.03 * ramp * dt;
      n.x += (dx / dist) * pull;
      n.y += (dy / dist) * pull;
    }

    // Collision resolution among selected nodes
    const selected = currentNodes.filter(n => selectedNodes.has(n.id));
    for (let i = 0; i < selected.length; i++) {
      for (let j = i + 1; j < selected.length; j++) {
        const a = selected[i], b = selected[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
        const minDist = a.radius + b.radius + 6;
        if (dist < minDist) {
          const push = (minDist - dist) * 0.4;
          a.x -= (dx / dist) * push;
          a.y -= (dy / dist) * push;
          b.x += (dx / dist) * push;
          b.y += (dy / dist) * push;
        }
      }
    }
    // When zoomed in, soft-push static nodes away from gathered selected nodes (they spring back)
    if (currentK > 3.5) {
      let maxR = 0;
      for (const n of currentNodes) if ((n.radius || 4) > maxR) maxR = n.radius || 4;
      _buildCollisionGrid(currentNodes, maxR);
      for (const m of selected) {
        const nearby = _nearbyNodes(m.x, m.y, m.radius + 30);
        for (let i = 0; i < nearby.length; i++) {
          const n = nearby[i];
          if (n.id === m.id || selectedNodes.has(n.id)) continue;
          if (targetNode && n.id === targetNode.id) continue;
          if (softCollide(n, m.x, m.y, m.radius, 4)) {
            springDisplace(n);
          }
        }
      }
    }

    renderPositions();
    spacePullRAF = requestAnimationFrame(loop);
  }
  spacePullRAF = requestAnimationFrame(loop);
}

function stopSpacePull() {
  spacePullHeld = false;
  if (spacePullRAF) { cancelAnimationFrame(spacePullRAF); spacePullRAF = null; }
  // Save positions of pulled nodes
  for (const id of selectedNodes) {
    const n = currentGraph?.nodeMap.get(id);
    if (n) {
      stickyNodes.add(n.id);
      savedPositions.set(n.id, { x: n.x, y: n.y });
    }
  }
  pushArrangement(spacePullIsGroupGather ? 'group-gather' : 'quick-gather', [...selectedNodes].slice(0, 5));
}

// ═══════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', (e) => {
  // ESC: clear search bar from anywhere
  if (e.code === 'Escape') {
    const searchEl = document.getElementById('search');
    if (searchEl.value) {
      searchEl.value = '';
      clearHighlight();
    }
    searchEl.blur();
    return;
  }

  // Skip keyboard shortcuts when typing in an input or select
  if (e.target.closest('input, select, textarea')) return;

  // P: toggle stream pause/resume
  if (e.code === 'KeyP' && !e.repeat && streamMode) {
    e.preventDefault();
    toggleStreamPause();
    return;
  }

  // SPACEBAR: gather neighbors, pull selected, cluster-gather, or unlock
  if (e.code === 'Space') {
    e.preventDefault();
    spaceKeyDown = true;
    if (!e.repeat && streamMode && !streamPaused) pauseStream();  // auto-pause stream during controls
    if (!e.repeat) {
      // Cluster gather: active drag or previously clicked cluster label
      if (focusedClusterId != null) {
        if (e.shiftKey) {
          startIntraClusterGather(focusedClusterId);
        } else {
          startClusterGather(focusedClusterId);
        }
        return;
      }
      const anchorNode = forcePressDragNode || selectedNode;
      if (anchorNode && e.shiftKey && selectedNodes.size >= 2) {
        // Click node + Shift+Space: pull selected nodes toward clicked node
        startSpacePull(anchorNode);
      } else if (anchorNode) {
        // Click node + Space: pull neighbors (except selected) toward clicked node
        startNeighborGather(anchorNode);
      } else if (selectedNodes.size >= 2) {
        startSpacePull(null);
      } else if (lockedNodes.size > 0) {
        unlockNodes();
      }
    }
    return;
  }

  // X: hold to relax
  if (e.code === 'KeyX' && !e.repeat && currentNodes) {
    e.preventDefault();
    xKeyDown = true;
    if (streamMode && !streamPaused) pauseStream();
    if (e.shiftKey) return; // Shift+X: dismiss-on-click mode, don't start bulk
    if (!attractorNode) {
      startXForces(forcePressDragNode || null);
    }
    return;
  }

  // Z: hold to time-travel backwards through arrangement history
  if (e.code === 'KeyZ' && !e.repeat && currentNodes && !e.metaKey && !e.ctrlKey) {
    e.preventDefault();
    zKeyDown = true;
    if (streamMode && !streamPaused) pauseStream();
    startZTimeTravel();
    return;
  }

  // T: trace through visible graph edges
  // T alone = hold to traverse (quick tap = flash); T+B = backward only; T+F = forward only
  if (e.code === 'KeyT' && !e.repeat && currentNodes) {
    e.preventDefault();
    tKeyDown = true;
    if (streamMode && !streamPaused) pauseStream();
    traceMode = 'both';
    traceBKeyDown = false;
    traceFKeyDown = false;
    if (traceHeld) { traceHeld = false; clearTraceVisuals(); }
    // Defer start briefly to detect T+B / T+F combos
    if (!traceRAF) {
      setTimeout(() => {
        if (!tKeyDown) return; // already released (flash handled in keyup)
        if (traceBKeyDown || traceFKeyDown) return; // B/F took over
        startTrace('both', false);
      }, 50);
    }
    return;
  }
  // H while tracing or trace paused: toggle hold
  if (e.code === 'KeyH' && !e.repeat && (tKeyHeld || tKeyDown || traceHeld)) {
    e.preventDefault();
    if (traceHeld) {
      releaseTraceHold();
    } else {
      traceHeld = true;
    }
    return;
  }
  // B while T held or trace held: restart/resume trace in backward mode
  if (e.code === 'KeyB' && !e.repeat && (tKeyDown || traceHeld) && currentNodes) {
    e.preventDefault();
    traceBKeyDown = true;
    traceMode = 'backward';
    if (traceHeld && !tKeyDown) {
      resumeTrace('backward');
    } else {
      startTrace('backward', false);
    }
    return;
  }
  // F while T held or trace held: restart/resume trace in forward mode
  if (e.code === 'KeyF' && !e.repeat && (tKeyDown || traceHeld) && currentNodes) {
    e.preventDefault();
    traceFKeyDown = true;
    traceMode = 'forward';
    if (traceHeld && !tKeyDown) {
      resumeTrace('forward');
    } else {
      startTrace('forward', false);
    }
    return;
  }

  // Alt+Left / Alt+Right: arrangement navigation
  if (e.altKey && e.code === 'ArrowLeft') {
    e.preventDefault();
    navigateArrangement(-1);
    return;
  }
  if (e.altKey && e.code === 'ArrowRight') {
    e.preventDefault();
    navigateArrangement(1);
    return;
  }

  // Enter: create user cluster from selected nodes
  if (e.code === 'Enter' && selectedNodes.size >= 2 && !e.target.closest('input, select')) {
    e.preventDefault();
    createUserCluster([...selectedNodes]);
    return;
  }

  // Escape: clear held trace, close info panel, exit comparison mode, or clear selection
  if (e.code === 'Escape') {
    if (traceHeld) { releaseTraceHold(); return; }
    if (focusedClusterId != null) { focusedClusterId = null; applyMetaLinkFocus(); }
    if (comparisonMode) { exitComparisonMode(); return; }
    if (selectedNodes.size > 0) {
      selectedNodes.clear();
      lockedNodes.clear();
      gNodes.selectAll('circle').classed('selected-glow', false);
      updateLockUI();
      return;
    }
    document.getElementById('info-panel').classList.remove('open');
    selectedNode = null;
    updateEdgeOpacities();
  }
});

document.addEventListener('keyup', (e) => {
  if (e.code === 'KeyX') {
    xKeyDown = false;
    if (xKeyHeld) stopXForces();
  }
  if (e.code === 'KeyZ') {
    zKeyDown = false;
    if (zKeyHeld) stopZTimeTravel();
  }
  if (e.code === 'KeyT') {
    const wasTKeyDown = tKeyDown;
    tKeyDown = false;
    traceBKeyDown = false;
    traceFKeyDown = false;
    if (tKeyHeld) {
      stopTrace();
    } else if (wasTKeyDown && !traceRAF) {
      // Quick tap: flash trace
      startTrace('both', true);
    }
  }
  if (e.code === 'KeyB' && (tKeyDown || traceHeld)) {
    traceBKeyDown = false;
    // Pause trace but keep visuals
    if (tKeyHeld || traceHeld) pauseTrace();
  }
  if (e.code === 'KeyF' && (tKeyDown || traceHeld)) {
    traceFKeyDown = false;
    // Pause trace but keep visuals
    if (tKeyHeld || traceHeld) pauseTrace();
  }
  if (e.code === 'Space') {
    spaceKeyDown = false;
    if (spacePullHeld) stopSpacePull();
    if (neighborGatherHeld) stopNeighborGather();
    if (clusterGatherHeld) stopClusterGather();
    if (intraClusterGatherHeld) stopIntraClusterGather();
  }

});

// ═══════════════════════════════════════════════════════
// FORCE TOUCH / PRESSURE (document-level for drag+force-press)
// ═══════════════════════════════════════════════════════
// Webkit Force Touch (Safari)
document.addEventListener('webkitmouseforcewillbegin', (e) => {
  if (forcePressDragNode) e.preventDefault();
  hasForceTouch = true;
});
document.addEventListener('webkitmouseforcedown', (e) => {
  if (forcePressDragNode && !attractorNode) {
    startAttractor(forcePressDragNode);
  }
});
document.addEventListener('webkitmouseforceup', (e) => {
  if (attractorNode) lockAttractor();
});
// Pointer Events pressure fallback (Chrome/Firefox) — for drag+force-press
document.addEventListener('pointermove', (e) => {
  if (hasForceTouch || !forcePressDragNode) return;
  if (e.pressure > 0 && e.pressure !== 0.5) hasPressure = true;
  if (!hasPressure) return;
  if (e.pressure >= PRESSURE_THRESHOLD && !pressureActive) {
    pressureActive = true;
    if (!attractorNode) startAttractor(forcePressDragNode);
  } else if (e.pressure < PRESSURE_THRESHOLD && pressureActive) {
    pressureActive = false;
    if (attractorNode) lockAttractor();
  }
});
// Full release cleanup
document.addEventListener('mouseup', () => {
  pressureActive = false;
  if (attractorNode) lockAttractor();
});
document.addEventListener('pointerup', () => {
  pressureActive = false;
  if (attractorNode) lockAttractor();
});

// ═══════════════════════════════════════════════════════
// RE-LAYOUT
// ═══════════════════════════════════════════════════════
function reLayout() {
  if (!currentNodes || !currentLinks) return;

  // Save old positions
  const oldPositions = new Map();
  for (const n of currentNodes) oldPositions.set(n.id, { x: n.x, y: n.y });

  // Compute fresh layout (skip sticky nodes will be handled after)
  const tempSticky = new Set(stickyNodes);
  computeLayout(currentNodes, currentLinks, {
    isWarmRestart: false,
    spatialEdgesMap: spatialMemory.spatialEdges,
  });

  // Sticky nodes: blend toward new position but stay mostly where they are
  for (const n of currentNodes) {
    if (tempSticky.has(n.id) && oldPositions.has(n.id)) {
      const old = oldPositions.get(n.id);
      n.x = old.x * 0.7 + n.x * 0.3;
      n.y = old.y * 0.7 + n.y * 0.3;
    }
  }

  // Collect target positions
  const targetPositions = new Map();
  for (const n of currentNodes) targetPositions.set(n.id, { x: n.x, y: n.y });

  // Restore old positions (we'll animate to new)
  for (const n of currentNodes) {
    const old = oldPositions.get(n.id);
    if (old) { n.x = old.x; n.y = old.y; }
  }

  animateToPositions(targetPositions, 400);
  pushArrangement('relayout');
}

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  if (!q) { clearHighlight(); return; }
  const matches = new Set();
  gNodes.selectAll('.node').each(d => {
    if (d.id.toLowerCase().includes(q)) matches.add(d.id);
  });
  gNodes.selectAll('.node').style('opacity', d => matches.has(d.id) ? 1 : 0.08);
  gLabels.selectAll('text').attr('opacity', d => matches.has(d.id) ? 1 : 0.05);
  gLinks.selectAll('.link').attr('stroke-opacity', l => {
    if (matches.has(l.source) || matches.has(l.target)) return 0.4;
    return 0.01;
  });
  gLinks.selectAll('.arrow').attr('fill-opacity', l => {
    if (matches.has(l.source) || matches.has(l.target)) return 0.4;
    return 0.01;
  });
});
